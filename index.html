<!DOCTYPE html>
<html lang="es" id="html-root">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="pragma" content="no-cache"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="theme-color" content="#f97316">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Bitcoin tracker: precio, análisis técnico, mempool, cajeros y alertas">
  <title>SatsFlow</title>
  <!-- RUTAS RELATIVAS para GitHub Pages subdirectorio -->
  <link rel="manifest" href="/Satsfow2/manifest.json">
  <link rel="icon" type="image/png" href="./icon-96.png">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--border:#334155;--card-bg:#1e293b;--input-bg:#0f172a;--input-border:#475569;}
    .light{--bg:#f8fafc;--bg2:#ffffff;--bg3:#e2e8f0;--text:#0f172a;--text2:#475569;--text3:#94a3b8;--border:#e2e8f0;--card-bg:#ffffff;--input-bg:#f8fafc;--input-border:#cbd5e1;}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);overscroll-behavior-y:none;min-height:100vh}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
    input,select{font-family:'Inter',sans-serif;font-size:15px;color:var(--text);background:var(--input-bg);border:1px solid var(--input-border);border-radius:10px;padding:8px 10px;outline:none;width:100%}
    input:focus,select:focus{border-color:#f97316}
    button{cursor:pointer;font-family:'Inter',sans-serif}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .fade{animation:fadeIn .3s ease-out}
    @keyframes spin2{to{transform:rotate(360deg)}}
    .spin{animation:spin2 1s linear infinite;display:inline-block}
    .card{background:var(--card-bg);border:1px solid var(--border);border-radius:18px;padding:18px}
    #header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
    .logo{width:34px;height:34px;background:#f97316;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 0 12px rgba(249,115,22,.3)}
    #tabbar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg2);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:auto auto}
    .tab-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;border:none;background:transparent;color:var(--text3);font-size:9px;font-weight:500;position:relative;cursor:pointer}
    .tab-btn.active{color:#f97316}
    .tab-btn:nth-child(n+6){border-top:1px solid var(--border)}
    .tab-btn.active::before{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:20px;height:2px;background:#f97316;border-radius:2px}
    .tab-icon{font-size:18px;line-height:1}
    #content{padding:14px 14px 90px;max-width:700px;margin:0 auto}
    .space-y>*+*{margin-top:14px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
    .stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center}
    .stat-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
    .stat-val{font-size:14px;font-weight:700;margin-top:2px}
    .fee-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:8px 4px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px}
    .cong-track{background:var(--bg3);border-radius:999px;height:8px;overflow:hidden}
    .cong-bar{height:100%;border-radius:999px;transition:width 1.2s ease}
    .btn-orange{background:#f97316;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-weight:600;font-size:14px}
    .btn-ghost{background:var(--bg2);color:var(--text2);border:1px solid var(--border);border-radius:10px;padding:6px 10px;font-size:12px}
    .btn-icon{background:var(--bg2);color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:6px 8px;display:flex;align-items:center;justify-content:center;font-size:15px}
    .alert-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:var(--bg2);margin-bottom:8px}
    .alert-item.triggered{background:rgba(234,179,8,.08);border-color:rgba(234,179,8,.4)}
    .news-item{display:block;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:var(--bg2);margin-bottom:8px;text-decoration:none;color:var(--text)}
    .signal-banner{border-radius:14px;padding:14px;border:1px solid;margin-bottom:14px}
    .signal-buy{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3)}
    .signal-sell{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3)}
    .signal-neutral{background:rgba(234,179,8,.08);border-color:rgba(234,179,8,.3)}
    .sr-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:10px;border:1px solid;margin-bottom:6px}
    #map-container{height:360px;border-radius:12px;overflow:hidden;margin-top:10px}
    .prog-track{background:var(--bg3);border-radius:999px;height:6px;overflow:hidden;margin:4px 0}
    .prog-bar{height:100%;border-radius:999px;transition:width 1s ease}
    .period-wrap{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:3px;gap:2px;overflow-x:auto;margin-bottom:10px}
    .period-btn{flex:1;min-width:36px;padding:5px 8px;border:none;border-radius:7px;background:transparent;color:var(--text3);font-size:11px;font-weight:500;white-space:nowrap}
    .period-btn.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.2)}
    .chart-type-wrap{display:flex;gap:4px;margin-bottom:8px}
    .chart-type-btn{padding:4px 10px;border-radius:7px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:11px;cursor:pointer}
    .chart-type-btn.active{background:#f97316;color:#fff;border-color:#f97316}
    .input-row{display:flex;gap:8px;margin-bottom:12px}
    .input-row input{flex:1}
    .input-row select{width:auto;min-width:70px}
    .notif-banner{background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.3);border-radius:12px;padding:10px 12px;display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
    .notif-ok{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
    .modal-box{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:22px;max-width:360px;width:100%}
    .modal-step{background:var(--bg3);border-radius:10px;padding:10px 12px;display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
    .step-num{width:22px;height:22px;border-radius:50%;background:#f97316;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .mini-chart{width:100%;height:70px}
    /* Leaflet dark mode */
    #html-root.dark-mode .leaflet-tile-pane{filter:brightness(.6) invert(1) contrast(3) hue-rotate(200deg) saturate(.3) brightness(.7)}
    #html-root.dark-mode .leaflet-container{background:#1e293b}
    .leaflet-container{border-radius:12px}
    .leaflet-popup-content-wrapper{background:var(--card-bg);color:var(--text);border:1px solid var(--border);border-radius:10px}
    .leaflet-popup-tip{background:var(--card-bg)}
  </style>
</head>
<body>
<div id="app">

    <div style="display:flex;align-items:center;gap:10px">
      <img src="./icon-96.png" style="width:34px;height:34px;border-radius:50%;box-shadow:0 0 12px rgba(249,115,22,.3)" alt="SatsFlow"/>
      <div>
        <div style="font-size:17px;font-weight:800;line-height:1.1">SatsFlow</div>

    </div>
    <div style="display:flex;align-items:center;gap:8px">

      </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const S={price:{usd:0,eur:0},change24h:0,marketCap:0,history:[],ohlc:[],mempool:null,marketData:null,miningData:null,news:[],alerts:[],days:'30',chartType:'area',dark:localStorage.getItem('sf-theme')!=='light',notifPerm:window.Notification?.permission||'unsupported',atmLoaded:false,leafletMap:null,lastUpdated:null,feeLevel:'hour',txSize:250,currentTab:'home',corrData:null,corrPeriod:'30',dominanceHistory:[],rainbowData:null,dominanceYearData:null};
function applyTheme(){
  if(S.dark){document.documentElement.classList.remove('light');document.getElementById('html-root').classList.add('dark-mode');document.getElementById('theme-btn').textContent='☀️';}
  else{document.documentElement.classList.add('light');document.getElementById('html-root').classList.remove('dark-mode');document.getElementById('theme-btn').textContent='🌙';}
  document.body.style.background=S.dark?'#0f172a':'#f8fafc';
  document.body.style.color=S.dark?'#f1f5f9':'#0f172a';
}
function toggleTheme(){S.dark=!S.dark;localStorage.setItem('sf-theme',S.dark?'dark':'light');applyTheme();renderCurrentTab();}
applyTheme();
function switchTab(tab){
  S.currentTab=tab;
  document.querySelectorAll('.tab-content').forEach(el=>el.style.display='none');
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.toggle('active',el.dataset.tab===tab));
  const el=document.getElementById('tab-'+tab);
  el.style.display='block';
  el.classList.remove('fade');void el.offsetWidth;el.classList.add('fade');
  renderTab(tab);
  if(tab==='atm'&&S.leafletMap)setTimeout(()=>S.leafletMap.invalidateSize(),150);
}
function renderCurrentTab(){renderTab(S.currentTab);}
const fmtN=(v,d=2)=>isNaN(v)?'—':Number(v).toLocaleString('en-US',{maximumFractionDigits:d});
const fmtBig=v=>{if(!v)return'—';if(v>=1e12)return`$${(v/1e12).toFixed(2)}T`;if(v>=1e9)return`$${(v/1e9).toFixed(1)}B`;return`$${v.toLocaleString()}`;};
const timeAgo=d=>{const s=Math.floor((Date.now()-d)/1000);if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';};
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open('satsflow',1);r.onupgradeneeded=e=>{if(!e.target.result.objectStoreNames.contains('alerts'))e.target.result.createObjectStore('alerts',{keyPath:'id'});};r.onsuccess=e=>res(e.target.result);r.onerror=rej;});}
async function saveAlerts(){try{const db=await openDB();const tx=db.transaction('alerts','readwrite');const s=tx.objectStore('alerts');s.clear();S.alerts.forEach(a=>s.put(a));}catch{}}
async function loadAlertsDB(){try{const db=await openDB();const tx=db.transaction('alerts','readonly');return new Promise(res=>{const q=tx.objectStore('alerts').getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=()=>res([]);});}catch{return[];}}
if('serviceWorker' in navigator){
  window.addEventListener('load',async()=>{
    try{
      const base=window.location.pathname.replace(/\/[^/]*$/,'/');
      const swUrl=base+'sw.js';
      const reg=await navigator.serviceWorker.register(swUrl,{scope:base});
      console.log('[SW] registrado:',reg.scope);
      if('periodicSync' in reg){try{const p=await navigator.permissions.query({name:'periodic-background-sync'});if(p.state==='granted')await reg.periodicSync.register('price-check',{minInterval:15*60*1000});}catch{}}
    }catch(e){console.warn('[SW]',e.message);}
  });
}
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-btn').style.display='flex';});
async function handleInstall(){if(deferredPrompt){deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById('install-btn').style.display='none';}else showInstallModal();}
function showInstallModal(){
  const o=document.createElement('div');o.className='modal-overlay';
  o.innerHTML=`<div class="modal-box"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div style="font-size:16px;font-weight:700">⬇️ Instalar SatsFlow</div><button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2)">✕</button></div><div class="modal-step"><div class="step-num">1</div><div style="font-size:13px;color:var(--text2)">Pulsa el menú del navegador (⋮ o compartir).</div></div><div class="modal-step"><div class="step-num">2</div><div style="font-size:13px;color:var(--text2)">Selecciona <b>"Instalar aplicación"</b> o <b>"Añadir a pantalla de inicio"</b>.</div></div><div class="modal-step"><div class="step-num">3</div><div style="font-size:13px;color:var(--text2)">Funciona con notificaciones aunque esté cerrada.</div></div><button class="btn-orange" style="width:100%;margin-top:14px" onclick="this.closest('.modal-overlay').remove()">Entendido</button></div>`;
  document.body.appendChild(o);
}
async function requestNotifPerm(){if(!window.Notification)return'unsupported';const r=await Notification.requestPermission();S.notifPerm=r;return r;}
function showNotif(title,body){
  playAlertSound();
  if(Notification.permission!=='granted')return;
  const opts={body,icon:'./icon-192.png',vibrate:[300,100,300,100,300],tag:'sf-alert',renotify:true,silent:false};
  if('serviceWorker' in navigator)navigator.serviceWorker.ready.then(r=>r.showNotification(title,opts));
  else new Notification(title,opts);
}
function playAlertSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const notes=[523,659,784]; // Do-Mi-Sol
    notes.forEach((freq,i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type='sine';
      osc.frequency.setValueAtTime(freq,ctx.currentTime+i*0.18);
      gain.gain.setValueAtTime(0,ctx.currentTime+i*0.18);
      gain.gain.linearRampToValueAtTime(0.4,ctx.currentTime+i*0.18+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.18+0.18);
      osc.start(ctx.currentTime+i*0.18);
      osc.stop(ctx.currentTime+i*0.18+0.18);
    });
    setTimeout(()=>ctx.close(),1000);
  }catch(e){console.warn('Audio:',e);}
}
const MEM='https://mempool.space/api';
async function fetchPrice(){
  try{
    const[tickerR,klineR,eurR]=await Promise.all([
      fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT'),
      fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=${S.days==='1'?'1h':S.days==='7'?'4h':S.days==='30'?'1d':S.days==='90'?'3d':'1w'}&limit=${S.days==='1'?'24':S.days==='7'?'42':S.days==='90'?'30':'52'}`),
      fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCEUR'),
    ]);
    const ticker=await tickerR.json();
    const klines=await klineR.json();
    const eur=await eurR.json();
    S.price={usd:parseFloat(ticker.lastPrice),eur:parseFloat(eur.price)};
    S.change24h=parseFloat(ticker.priceChangePercent)||0;
    S.marketCap=0;
    if(!Array.isArray(klines))throw new Error('klines not array');
    S.history=klines.map(k=>{
      const d=new Date(k[0]);
      const label=S.days==='1'?d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}):
        S.days==='7'||S.days==='30'?d.toLocaleDateString('es-ES',{month:'numeric',day:'numeric'}):
        d.toLocaleDateString('es-ES',{month:'short',year:'2-digit'});
      return{date:label,price:parseFloat(k[4])}; // close price
    });
    S.ohlc=klines.map(k=>({
      ts:k[0],
      date:new Date(k[0]).toLocaleDateString('es-ES',{month:'numeric',day:'numeric'}),
      open:parseFloat(k[1]),high:parseFloat(k[2]),low:parseFloat(k[3]),close:parseFloat(k[4])
    }));
    S.lastUpdated=new Date();
    updateHeader();
  }catch(e){console.error('fetchPrice',e);}
}
async function fetchOHLC(){} // ya incluido en fetchPrice con Binance
async function fetchMempool(){
  try{
    const[fr,sr,br]=await Promise.all([fetch(`${MEM}/v1/fees/recommended`),fetch(`${MEM}/mempool`),fetch(`${MEM}/v1/blocks`)]);
    const fees=await fr.json(),stats=await sr.json(),blocks=await br.json();
    const txCount=stats.count||0,last=blocks[0]||{},height=last.height||0,next=Math.ceil(height/210000)*210000;
    S.mempool={fees:{fastest:fees.fastestFee||0,halfHour:fees.halfHourFee||0,hour:fees.hourFee||0,economy:fees.economyFee||0,minimum:fees.minimumFee||1},mempool:{txCount,vsize:Math.round((stats.vsize||0)/1e6),congestion:Math.min(100,Math.round((txCount/150000)*100))},network:{height,nextHalving:next,blocksToHalving:next-height}};
  }catch{}
}
async function fetchMarket(){
  try{
    const fgR=await fetch('https://api.alternative.me/fng/');
    const fg=await fgR.json();
    const fng=fg.data?.[0];
    S.marketData={fearGreed:{value:parseInt(fng?.value||50),label:fng?.value_classification||'Neutral'},dominance:{btc:'—',eth:'—'},totalMcap:0};
  }catch(e){console.error('fetchMarket',e);}
  try{
    const[btcR,ethR,totR]=await Promise.all([
      fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT'),
      fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=ETHUSDT'),
      fetch('https://api.coingecko.com/api/v3/global')
    ]);
    const btc=await btcR.json(),eth=await ethR.json();
    const btcMcap=parseFloat(btc.lastPrice)*19700000;
    const ethMcap=parseFloat(eth.lastPrice)*120000000;
    let totalMcap=0,btcPct='—',ethPct='—';
    try{
      const tot=await totR.json();
      totalMcap=tot.data?.total_market_cap?.usd||0;
      btcPct=totalMcap>0?(btcMcap/totalMcap*100).toFixed(1):'—';
      ethPct=totalMcap>0?(ethMcap/totalMcap*100).toFixed(1):'—';
    }catch{

async function tryFetchRSS(url){
  const proxies=[
    'https://api.allorigins.win/get?url=',
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?',
  ];
  for(const proxy of proxies){
    try{
      const r=await fetch(proxy+encodeURIComponent(url),{signal:AbortSignal.timeout(8000)});
      if(!r.ok)continue;
      let text='';
      if(proxy.includes('allorigins.win/get')){
        const j=await r.json();
        text=j.contents||'';
      } else {
        text=await r.text();
      }
      if(text.includes('<item'))return text;
    }catch(e){continue;}
  }
  return '';
}
function parseRSS(xml,source){
  const items=xml.match(/<item[\s\S]*?<\/item>/g)||[];
  const results=[];
  items.forEach(item=>{
    const title=(item.match(/<title><!\[CDATA\[([\s\S]*?)\]\]><\/title>/)||item.match(/<title>([^<]*)<\/title>/))?.[1]||'';
    const link=(item.match(/<link>([^<]*)<\/link>/)||item.match(/<guid[^>]*>(https?[^<]+)<\/guid>/))?.[1]||'';
    const pubDate=item.match(/<pubDate>([^<]*)<\/pubDate>/)?.[1]||'';
    const clean=title.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#\d+;/g,'').replace(/<[^>]+>/g,'').trim();
    if(clean&&link)results.push({id:link,title:clean,url:link,source,date:pubDate?new Date(pubDate):new Date()});
  });
  return results;
}
async function fetchNews(){
  const feeds=[
    {url:'https://es.cointelegraph.com/tags/bitcoin/rss',source:'CoinTelegraph ES'},
    {url:'https://www.criptonoticias.com/category/bitcoin/feed/',source:'CriptoNoticias'},
    {url:'https://www.criptonoticias.com/feed/',source:'CriptoNoticias'},
    {url:'https://es.cointelegraph.com/rss',source:'CoinTelegraph ES'},
    {url:'https://bitcoin.es/feed/',source:'Bitcoin.es'},
  ];
  const seen=new Set();
  let results=[];
  for(const feed of feeds){
    if(results.length>=12)break;
    try{
      const xml=await tryFetchRSS(feed.url);
      if(!xml)continue;
      const items=parseRSS(xml,feed.source);
      items.forEach(item=>{
        if(!seen.has(item.id)&&isBitcoinNews(item.title)){
          seen.add(item.id);
          results.push(item);
        }
      });
    }catch(e){console.warn('feed error',feed.source,e);}
  }
  if(results.length<3){
    try{
      const urls=[
        'https://es.cointelegraph.com/tags/bitcoin/rss',
        'https://www.criptonoticias.com/feed/',
      ];
      for(const rssUrl of urls){
        if(results.length>=8)break;
        const r=await fetch('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(rssUrl)+'&count=10',{signal:AbortSignal.timeout(8000)});
        const j=await r.json();
        if(j.status==='ok'&&j.items?.length){
          j.items.forEach(n=>{
            if(n.title&&n.link&&!seen.has(n.link)&&isBitcoinNews(n.title)){
              seen.add(n.link);
              results.push({id:n.link,title:n.title,url:n.link,source:j.feed?.title||'Bitcoin News',date:new Date(n.pubDate)});
            }
          });
        }
      }
    }catch(e){console.warn('rss2json fallback',e);}
  }
  results=results.sort((a,b)=>b.date-a.date).slice(0,15);
  if(results.length>0)S.news=results;
  else if(S.news.length===0)S.news=[{id:'err',title:'No se pudieron cargar noticias. Inténtalo de nuevo.',url:'#',source:'Error',date:new Date()}];
}
function calcEMA(p,k){const m=2/(k+1),e=[];p.forEach((v,i)=>{e.push(i===0?v:v*m+e[i-1]*(1-m));});return e;}
function calcRSI(p,k=14){const r=new Array(k).fill(null);let g=0,l=0;for(let i=1;i<=k;i++){const d=p[i]-p[i-1];d>0?g+=d:l+=Math.abs(d);}let ag=g/k,al=l/k;for(let i=k;i<p.length;i++){const d=p[i]-p[i-1];ag=(ag*(k-1)+(d>0?d:0))/k;al=(al*(k-1)+(d<0?Math.abs(d):0))/k;r.push(100-(100/(1+(al===0?100:ag/al))));}return r;}
function analyze(){
  const prices=S.history.map(h=>h.price);
  if(prices.length<30)return null;
  const last=prices[prices.length-1];
  const rsiArr=calcRSI(prices),lastRSI=rsiArr[rsiArr.length-1];
  const e12=calcEMA(prices,12),e26=calcEMA(prices,26);
  const macd=e12.map((v,i)=>v-e26[i]);
  const sig=calcEMA(macd.slice(26),9);
  const padSig=[...new Array(26).fill(null),...new Array(macd.length-26-sig.length).fill(null),...sig];
  const lMACD=macd[macd.length-1],lSig=padSig[padSig.length-1];
  const sma7=prices.slice(-7).reduce((a,b)=>a+b,0)/7;
  const sma30=prices.slice(-30).reduce((a,b)=>a+b,0)/30;
  const sl20=prices.slice(-20),m20=sl20.reduce((a,b)=>a+b,0)/20;
  const std=Math.sqrt(sl20.reduce((a,b)=>a+(b-m20)**2,0)/sl20.length);
  const bbU=m20+2*std,bbL=m20-2*std;
  const recent=prices.slice(-30);
  const support=Math.min(...recent)*0.98,resistance=Math.max(...recent)*1.02;
  let bull=0,bear=0;
  if(lastRSI<30)bull+=3;else if(lastRSI<45)bull+=1;else if(lastRSI>70)bear+=3;else if(lastRSI>55)bear+=1;
  if(sma7>sma30)bull+=2;else bear+=2;
  if(lMACD>lSig)bull+=2;else bear+=2;
  if(last<bbL)bull+=2;else if(last>bbU)bear+=2;
  const total=bull+bear,bullPct=total>0?Math.round((bull/total)*100):50;
  const signal=bullPct>=65?'COMPRAR':bullPct<=35?'VENDER':'NEUTRAL';
  return{lastRSI,sma7,sma30,lMACD,lSig,bbU,bbL,support,resistance,bullPct,bearPct:100-bullPct,signal,last,rsiData:rsiArr.slice(-40).filter(v=>v!=null),macdData:macd.slice(-40),sigData:padSig.slice(-40)};
}
function miniLine(data,color,h=65,refs=[]){
  const v=data.filter(x=>x!=null);if(!v.length)return'';
  const min=Math.min(...v),max=Math.max(...v),range=max-min||1;
  const W=300,H=h,P=4;
  const pts=data.map((x,i)=>{if(x==null)return null;return`${P+(i/(data.length-1))*(W-P*2)},${P+(1-(x-min)/range)*(H-P*2)}`;}).filter(Boolean).join(' ');
  const rls=refs.map(({val,color:rc})=>{const y=P+(1-(val-min)/range)*(H-P*2);return`<line x1="${P}" y1="${y}" x2="${W-P}" y2="${y}" stroke="${rc}" stroke-dasharray="4 3" stroke-width="1" opacity=".7"/>`;}).join('');
  return`<svg viewBox="0 0 ${W} ${H}" class="mini-chart" preserveAspectRatio="none">${rls}<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/></svg>`;
}
function areaSVG(data){
  if(!data.length)return'';
  const prices=data.map(d=>d.price),min=Math.min(...prices),max=Math.max(...prices),range=max-min||1;
  const W=300,H=100,P=4,last=prices[prices.length-1],first=prices[0],color=last>=first?'#10b981':'#ef4444';
  const pts=data.map((d,i)=>`${P+(i/(data.length-1))*(W-P*2)},${P+(1-(d.price-min)/range)*(H-P*2)}`);
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:120px" preserveAspectRatio="none"><defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".3"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><polygon points="${P},${H} ${pts.join(' ')} ${W-P},${H}" fill="url(#ag)"/><polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/></svg>`;
}
function candleSVG(data){
  if(!data.length)return'';
  const ps=data.flatMap(d=>[d.high,d.low]),min=Math.min(...ps),max=Math.max(...ps),range=max-min||1;
  const W=300,H=120,P=4,cW=Math.max(2,Math.floor((W-P*2)/data.length)-2);
  const toY=v=>P+(1-(v-min)/range)*(H-P*2),toX=i=>P+(i+.5)*((W-P*2)/data.length);
  const c=data.map((d,i)=>{const up=d.close>=d.open,x=toX(i),col=up?'#10b981':'#ef4444';const yH=toY(d.high),yL=toY(d.low),yO=toY(d.open),yC=toY(d.close),bT=Math.min(yO,yC),bH=Math.max(1,Math.abs(yO-yC));return`<line x1="${x}" y1="${yH}" x2="${x}" y2="${yL}" stroke="${col}" stroke-width="1"/><rect x="${x-cW/2}" y="${bT}" width="${cW}" height="${bH}" fill="${col}" rx="1"/>`;}).join('');
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:120px" preserveAspectRatio="none">${c}</svg>`;
}

function calcConv(f,raw){

  let btc=S.conv_btc||1,sats=S.conv_sats||1e8,usd=S.conv_usd||0,eur=S.conv_eur||0;
  if(f==='btc'){btc=v;sats=(v*1e8).toFixed(0);usd=(v*pU).toFixed(2);eur=(v*pE).toFixed(2);}
  else if(f==='sats'){const b=v/1e8;btc=b.toFixed(8).replace(/\.?0+$/,'');sats=v;usd=(b*pU).toFixed(2);eur=(b*pE).toFixed(2);}

  else if(f==='eur'&&pE){const b=v/pE;btc=b.toFixed(8);sats=(b*1e8).toFixed(0);usd=(b*pU).toFixed(2);eur=v;}
  S.conv_btc=btc;S.conv_sats=sats;S.conv_usd=usd;S.conv_eur=eur;
  ['btc','sats','usd','eur'].filter(x=>x!==f).forEach(x=>setI(x,S['conv_'+x]));
}

function calcRainbow(price){
  const genesis=new Date('2009-01-03').getTime();
  const days=(Date.now()-genesis)/(1000*60*60*24);
  const log10Days=Math.log10(days); // IMPORTANTE: log10, no logaritmo natural
  const a=5.84,b=-17.01;
  const center=Math.pow(10,a*log10Days+b);
  const step=0.38;
  const bands=[
    {label:'Zona de venta máxima',color:'#ef4444',mult:Math.pow(10,step*4)},
    {label:'Muy caro — vende',color:'#f97316',mult:Math.pow(10,step*3)},
    {label:'FOMO intenso',color:'#fb923c',mult:Math.pow(10,step*2)},
    {label:'Caro',color:'#eab308',mult:Math.pow(10,step*1)},
    {label:'Precio justo',color:'#84cc16',mult:1},
    {label:'Todavía barato',color:'#22c55e',mult:Math.pow(10,-step*1)},
    {label:'Acumula',color:'#10b981',mult:Math.pow(10,-step*2)},
    {label:'Oferta histórica',color:'#06b6d4',mult:Math.pow(10,-step*3)},
    {label:'Compra máximo',color:'#3b82f6',mult:Math.pow(10,-step*4)},
  ];
  const priceBands=bands.map(b=>({...b,price:center*b.mult}));
  let currentBand=priceBands[priceBands.length-1];
  for(let i=0;i<priceBands.length-1;i++){
    if(price>=priceBands[i].price){currentBand=priceBands[i];break;}
  }
  return{bands:priceBands,currentBand,center};
}
function analyzeSentiment(title){
  const t=title.toLowerCase();
  const bull=['sube','subida','máximo','record','supera','alcanza','adopción','aprueba','compra','acumula','bull','rally','verde','crece','positivo','boom','logro','avance','dispara','eleva','histórico','etf','institucional'];
  const bear=['baja','caída','cae','mínimo','pierde','pérdida','bear','rojo','colapso','crash','crisis','prohibe','vende','hackeo','robo','fraude','multa','investigación','prohibición','negativo','desplome','hunde','riesgo','problema'];
  let score=0;
  bull.forEach(w=>{if(t.includes(w))score++;});
  bear.forEach(w=>{if(t.includes(w))score--;});
  if(score>0)return{label:'Alcista',color:'#10b981',icon:'📈',score};
  if(score<0)return{label:'Bajista',color:'#ef4444',icon:'📉',score};
  return{label:'Neutral',color:'#94a3b8',icon:'➖',score};
}

async function fetchCorr(){
  S.corrError=null;
  try{
    const days=parseInt(S.corrPeriod)||30;
    const limit=days<=30?35:days<=90?95:370;
    const btcR=await fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=${limit}`);
    const btcJ=await btcR.json();
    const btcPrices=btcJ.map(k=>parseFloat(k[4]));
    const range=days<=30?'1mo':days<=90?'3mo':'1y';
    const proxy='https://corsproxy.io/?';
    const spyUrl=`https://query1.finance.yahoo.com/v8/finance/chart/SPY?interval=1d&range=${range}`;
    const gldUrl=`https://query1.finance.yahoo.com/v8/finance/chart/GLD?interval=1d&range=${range}`;
    const mstrUrl=`https://query1.finance.yahoo.com/v8/finance/chart/MSTR?interval=1d&range=${range}`;
    const[spyR,goldR,mstrR]=await Promise.all([
      fetch(proxy+encodeURIComponent(spyUrl),{signal:AbortSignal.timeout(12000)}),
      fetch(proxy+encodeURIComponent(gldUrl),{signal:AbortSignal.timeout(12000)}),
      fetch(proxy+encodeURIComponent(mstrUrl),{signal:AbortSignal.timeout(12000)})
    ]);
    const spyJ=await spyR.json();
    const goldJ=await goldR.json();
    const mstrJ=await mstrR.json();
    const spyPrices=(spyJ.chart?.result?.[0]?.indicators?.quote?.[0]?.close||[]).filter(v=>v!=null);
    const goldPrices=(goldJ.chart?.result?.[0]?.indicators?.quote?.[0]?.close||[]).filter(v=>v!=null);
    const mstrPrices=(mstrJ.chart?.result?.[0]?.indicators?.quote?.[0]?.close||[]).filter(v=>v!=null);
    if(!spyPrices.length||!goldPrices.length) throw new Error('Sin datos de mercado');
    const normalize=arr=>{const base=arr[0]||1;return arr.map(v=>(v/base)*100);};
    const minLen=Math.min(btcPrices.length,spyPrices.length,goldPrices.length,mstrPrices.length||999);
    if(minLen<5){S.corrData=null;S.corrError='Datos insuficientes';return;}
    const btcN=normalize(btcPrices.slice(-minLen));
    const spyN=normalize(spyPrices.slice(-minLen));
    const goldN=normalize(goldPrices.slice(-minLen));
    const mstrN=mstrPrices.length>=5?normalize(mstrPrices.slice(-minLen)):null;
    const pearson=(a,b)=>{
      if(!a||!b||a.length<2||b.length<2)return 0;
      const n=Math.min(a.length,b.length);
      const an=a.slice(-n),bn=b.slice(-n);
      const ma=an.reduce((s,v)=>s+v,0)/n,mb=bn.reduce((s,v)=>s+v,0)/n;
      const num=an.reduce((s,v,i)=>s+(v-ma)*(bn[i]-mb),0);
      const da=Math.sqrt(an.reduce((s,v)=>s+(v-ma)**2,0));
      const db=Math.sqrt(bn.reduce((s,v)=>s+(v-mb)**2,0));
      return(da&&db)?num/(da*db):0;
    };
    const w=Math.min(14,minLen);
    const rollCorr=(a,b)=>{
      if(!a||!b)return[];
      return a.map((_,i)=>i<w-1?null:pearson(a.slice(i-w+1,i+1),b.slice(i-w+1,i+1)));
    };
    S.corrData={
      btc:btcN,spy:spyN,gold:goldN,mstr:mstrN,
      corrBtcSpy:pearson(btcN,spyN),
      corrBtcGold:pearson(btcN,goldN),
      corrBtcMstr:mstrN?pearson(btcN,mstrN):null,
      corrSpyGold:pearson(spyN,goldN),
      rollBtcSpy:rollCorr(btcN,spyN),
      rollBtcGold:rollCorr(btcN,goldN),
      rollBtcMstr:mstrN?rollCorr(btcN,mstrN):null,
      len:minLen,
      mstrLastPrice:mstrPrices.length?mstrPrices[mstrPrices.length-1]:null,
      mstrChange:mstrPrices.length>=2?((mstrPrices[mstrPrices.length-1]-mstrPrices[0])/mstrPrices[0]*100):null
    };
  }catch(e){
    console.error('fetchCorr',e);
    S.corrData=null;
    await fetchCorrFallback();
  }

async function loadWorldMap(){
  const wrap=document.getElementById('world-map-wrap');
  if(!wrap)return;
  const svgDiv=document.getElementById('world-map-svg');
  if(!svgDiv)return;
  try{
    const res=await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json',{signal:AbortSignal.timeout(8000)});
    if(!res.ok)throw new Error('No se pudo cargar');
    const topo=await res.json();
    if(!window.topojson){
      await new Promise((resolve,reject)=>{
        const s=document.createElement('script');
        s.src='https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js';
        s.onload=resolve; s.onerror=reject;
        document.head.appendChild(s);
      });
    }
    const countries=topojson.feature(topo,topo.objects.countries);
    const W=500,H=250;
    const project=([lng,lat])=>[((lng+180)/360)*W, ((90-lat)/180)*H];
    const pathStr=geo=>{
      if(!geo||!geo.coordinates)return'';
      const parts=geo.type==='Polygon'?[geo.coordinates]:geo.coordinates;
      return parts.map(rings=>rings.map((ring,ri)=>{
        const pts=ring.map(project);
        return pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')+'Z';
      }).join(' ')).join(' ');
    };
    const paths=countries.features.map(f=>'<path d="'+pathStr(f.geometry)+'" fill="#1e3a5f" stroke="#2d5a8e" stroke-width="0.4"/>').join('');
    const svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block" id="world-svg">'
      +'<rect width="'+W+'" height="'+H+'" fill="#0d1b2a"/>'
      +'<line x1="0" y1="125" x2="500" y2="125" stroke="#1a3a5c" stroke-width="0.5" stroke-dasharray="3 3"/>'
      +paths
      +'</svg>';
    svgDiv.innerHTML=svg;
    renderMapDots(W,H);
  }catch(e){
    console.warn('World map CDN failed, using static fallback',e);
    svgDiv.innerHTML=getStaticWorldSVG();
    renderMapDots(500,250);
  }
}

    else{frScore=0.10;frDesc='Funding Rate '+fr.toFixed(3)+'% — Muy negativo. Mercado apostando fuerte a la baja. Históricamente señal de rebote.';}
  } else { frScore=0.01; frDesc='Funding Rate: cargando desde Binance Futures...'; }
  let netflowScore=0, netflowDesc='';
  if(OC.exchangeNetflow){
    const dir=OC.exchangeNetflow.direction;
    const trend=OC.exchangeNetflow.trend;
    if(dir==='outflow'){netflowScore=0.09;netflowDesc='BTC saliendo de exchanges ('+trend.toFixed(1)+'% vs semana anterior). HODLers acumulando en wallets frías — señal alcista fuerte.';}
    else if(dir==='neutral'){netflowScore=0.02;netflowDesc='Flujo BTC en exchanges estable. Sin señal clara de acumulación o distribución.';}
    else{netflowScore=-0.08;netflowDesc='BTC entrando en exchanges (+'+trend.toFixed(1)+'%). Posibles vendedores preparándose — señal de precaución.';}
  } else { netflowScore=0.03; netflowDesc='Netflow exchanges: cargando datos on-chain...'; }
  let corrScore=0, corrDesc='';
  if(S.corrData){
    const spCorr=S.corrData.corrBtcSpy||0;
    const goldCorr=S.corrData.corrBtcGold||0;
    const spyArr=S.corrData.spy||[];
    const change30dSP=spyArr.length>=2?((spyArr[spyArr.length-1]-spyArr[0])/spyArr[0]*100):0;
    if(spCorr>0.7&&change30dSP>2){corrScore=0.07;corrDesc='Alta correlación con S&P500 (r='+spCorr.toFixed(2)+') subiendo (+'+change30dSP.toFixed(1)+'%). BTC tiende a seguirlo.';}
    else if(spCorr>0.7&&change30dSP<-2){corrScore=-0.07;corrDesc='Alta correlación con S&P500 (r='+spCorr.toFixed(2)+') bajando ('+change30dSP.toFixed(1)+'%). Presión bajista por contagio.';}
    else if(spCorr<0.3&&goldCorr>0.5){corrScore=0.04;corrDesc='BTC desacoplado del S&P500. Correlando más con oro (r='+goldCorr.toFixed(2)+') — comportamiento reserva de valor.';}
    else{corrScore=0.01;corrDesc='Correlaciones mixtas (S&P r='+spCorr.toFixed(2)+', Oro r='+goldCorr.toFixed(2)+'). Sin señal clara.';}
  } else { corrScore=0.01; corrDesc='Correlación S&P/Oro: visita la pestaña Correlación para cargar estos datos.'; }
  const halvingMonthsAgo=10;
  let halvingScore=halvingMonthsAgo<6?0.10:halvingMonthsAgo<12?0.20:halvingMonthsAgo<18?0.15:halvingMonthsAgo<24?0.05:-0.02;
  const halvingDesc='Mes '+halvingMonthsAgo+' post-halving (abril 2024). '+(halvingMonthsAgo<18?'Históricamente el período más alcista del ciclo de 4 años.':'Impulso post-halving agotándose.');
  const institutionalScore=0.12;
  const institutionalDesc='ETFs BTC acumulan >$50B AUM. MicroStrategy, tesoros corporativos y países comprando activamente.';
  const macroScore=0.06;
  const macroDesc='Fed en pausa/bajada leve. Inflación ~2.5%. Liquidez global moderadamente favorable para activos de riesgo.';
  const fgScore=fg<25?0.12:fg<40?0.08:fg<55?0.02:fg<70?-0.03:-0.08;
  const fgDesc='Fear & Greed: '+fg+'/100 — '+(fg<40?'Zona de miedo = oportunidad histórica de acumulación.':fg>70?'Codicia alta = precaución, posible corrección.':'Zona neutral.');
  const domScore=dom>58?0.08:dom>50?0.04:dom>42?0.00:-0.04;
  const domDesc='Dominancia BTC: '+dom.toFixed(1)+'%. '+(dom>55?'Alta dominancia: capital en Bitcoin, señal alcista para BTC.':'Altcoins compitiendo por capital.');
  const regulationScore=0.05;
  const regulationDesc='Marco regulatorio en EE.UU. más claro. MiCA en vigor en Europa. Tendencia global positiva.';
  const riskScore=-0.06;
  const riskDesc='Descuento por riesgos: geopolítica, deuda global, posible recesión, guerra comercial EE.UU.-China.';
  const taTotal=rsiScore+macdScore+bbScore+smaScore+taCompositeScore+stochRsiScore+obvScore+adxScore;
  const onChainTotal=hashrateScore+addressScore+volumeScore+oiScore+frScore+netflowScore;
  const macroTotal=halvingScore+institutionalScore+macroScore+fgScore+domScore+regulationScore+riskScore+corrScore;
  const netScore=taTotal*0.35 + onChainTotal*0.30 + macroTotal*0.35;
  const volWeek=0.06, volMonth=0.18, vol6M=0.45, volYear=0.75;
  const horizons=[
    {
      label:'1 semana', days:7, icon:'📅',
      localScore: taTotal*0.70 + (fgScore+domScore)*0.30,
      vol: volWeek,
      note:'Basado principalmente en RSI, MACD y Bollinger. Horizonte muy sensible a noticias.'
    },
    {
      label:'1 mes', days:30, icon:'📆',
      localScore: taTotal*0.40 + onChainTotal*0.35 + macroTotal*0.25,
      vol: volMonth,
      note:'Equilibrio entre técnico, on-chain y macro. Ciclo halving y ETFs empiezan a pesar.'
    },
    {
      label:'6 meses', days:180, icon:'🗓️',
      localScore: taTotal*0.10 + onChainTotal*0.40 + macroTotal*0.50,
      vol: vol6M,
      note:'El ciclo post-halving, adopción institucional y on-chain dominan sobre el TA.'
    },
    {
      label:'1 año', days:365, icon:'📊',
      localScore: taTotal*0.05 + onChainTotal*0.35 + macroTotal*0.60,
      vol: volYear,
      note:'Factores estructurales y ciclo de 4 años son los determinantes principales.'
    }
  ];
  const factors=[
    {group:'📐 Técnico',name:'RSI',score:rsiScore,desc:rsiDesc},
    {group:'📐 Técnico',name:'Stochastic RSI',score:stochRsiScore,desc:stochRsiDesc},
    {group:'📐 Técnico',name:'MACD',score:macdScore,desc:macdDesc},
    {group:'📐 Técnico',name:'OBV (Volumen)',score:obvScore,desc:obvDesc},
    {group:'📐 Técnico',name:'ADX (Tendencia)',score:adxScore,desc:adxDesc},
    {group:'📐 Técnico',name:'Bollinger Bands',score:bbScore,desc:bbDesc},
    {group:'📐 Técnico',name:'Medias móviles SMA',score:smaScore,desc:smaDesc},
    {group:'📐 Técnico',name:'Señal compuesta',score:taCompositeScore,desc:taCompositeDesc},
    {group:'⛓️ On-chain & Futuros',name:'Hashrate mineros',score:hashrateScore,desc:hashrateDesc},
    {group:'⛓️ On-chain & Futuros',name:'Direcciones activas',score:addressScore,desc:addressDesc},
    {group:'⛓️ On-chain & Futuros',name:'Volumen on-chain',score:volumeScore,desc:volumeDesc},
    {group:'⛓️ On-chain & Futuros',name:'Exchange Netflow',score:netflowScore,desc:netflowDesc},
    {group:'⛓️ On-chain & Futuros',name:'Open Interest',score:oiScore,desc:oiDesc},
    {group:'⛓️ On-chain & Futuros',name:'Funding Rate',score:frScore,desc:frDesc},
    {group:'🌐 Macro/Ciclo',name:'Ciclo Halving',score:halvingScore,desc:halvingDesc},
    {group:'🌐 Macro/Ciclo',name:'Institucional',score:institutionalScore,desc:institutionalDesc},
    {group:'🌐 Macro/Ciclo',name:'Macro global',score:macroScore,desc:macroDesc},
    {group:'🌐 Macro/Ciclo',name:'Fear & Greed',score:fgScore,desc:fgDesc},
    {group:'🌐 Macro/Ciclo',name:'Dominancia BTC',score:domScore,desc:domDesc},
    {group:'🌐 Macro/Ciclo',name:'Regulación',score:regulationScore,desc:regulationDesc},
    {group:'🌐 Macro/Ciclo',name:'Correlación S&P/Oro',score:corrScore,desc:corrDesc},
    {group:'🌐 Macro/Ciclo',name:'Riesgos sistémicos',score:riskScore,desc:riskDesc},
  ];
  return{horizons,factors,netScore,taTotal,onChainTotal,macroTotal,ta};
}
function renderForecast(){
  const price=S.price.usd;
  if(!price)return'<div class="card" style="text-align:center;padding:40px;color:var(--text3)"><span class="spin">⏳</span><br><br>Esperando precio...</div>';
  if(S.history.length<10)return'<div class="card" style="text-align:center;padding:40px;color:var(--text3)"><span class="spin">📊</span><br><br>Cargando datos...<br><small style="color:var(--text3);font-size:11px">Esperando historial de precio</small></div>';
  const{horizons,factors,netScore,taTotal,onChainTotal,macroTotal,ta}=calcForecast(price);
  if(!OC.loaded)fetchOnChain();
  const fmt=p=>'$'+(p>=1e6?(p/1e6).toFixed(2)+'M':p>=1000?(p/1000).toFixed(0)+'K':p.toFixed(0));
  const fmtPct=p=>(p>=0?'+':'')+p.toFixed(1)+'%';
  const horizonCards=horizons.map(h=>{
    const bias=h.localScore;
    const bullMult=1+h.vol*(1+bias*2);
    const baseMult=1+h.vol*0.3*bias;
    const bearMult=1-h.vol*(1-bias*1.5);
    const bullP=Math.round(price*Math.max(bullMult,1.01));
    const baseP=Math.round(price*Math.max(Math.min(baseMult,bullMult*0.9),bearMult*1.1));
    const bearP=Math.round(price*Math.min(bearMult,0.99));
    const bullPct=(bullMult-1)*100;
    const basePct=(baseMult-1)*100;
    const bearPct=(bearMult-1)*100;
    const biasColor=bias>0.05?'#10b981':bias<-0.05?'#ef4444':'#eab308';
    const biasLabel=bias>0.1?'Alcista':bias>0.02?'Lev. alcista':bias<-0.1?'Bajista':bias<-0.02?'Lev. bajista':'Neutral';
    const rawBull=Math.max(5, Math.round(30 + bias*80));
    const rawBear=Math.max(5, Math.round(25 - bias*65));
    const rawBase=Math.max(5, 100-rawBull-rawBear);
    const total=rawBull+rawBear+rawBase;
    const pBull=Math.round(rawBull/total*100);
    const pBear=Math.round(rawBear/total*100);
    const pBase=100-pBull-pBear;
    const mostLikely=pBull>=pBear&&pBull>=pBase?'bull':pBase>=pBear?'base':'bear';
    const cardBorder=(s)=>s===mostLikely?'2px solid':'1px solid';
    const cardBg=(s)=>s==='bull'?'rgba(16,185,129,.08)':s==='base'?'rgba(234,179,8,.08)':'rgba(239,68,68,.08)';
    const cardBorderColor=(s)=>s===mostLikely?(s==='bull'?'#10b981':s==='base'?'#eab308':'#ef4444'):(s==='bull'?'rgba(16,185,129,.25)':s==='base'?'rgba(234,179,8,.3)':'rgba(239,68,68,.25)');
    const probBar=(pct,col)=>'<div style="background:rgba(255,255,255,.08);border-radius:999px;height:4px;margin:4px 2px 0">'
      +'<div style="height:100%;border-radius:999px;background:'+col+';width:'+pct+'%"></div></div>';
    const mostLikelyLabel=mostLikely==='bull'?'📈 Alcista':mostLikely==='base'?'📊 Base':'📉 Bajista';
    const mostLikelyColor=mostLikely==='bull'?'#10b981':mostLikely==='base'?'#eab308':'#ef4444';
    const mostLikelyP=mostLikely==='bull'?pBull:mostLikely==='base'?pBase:pBear;
    return '<div style="background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
      +'<div style="font-size:14px;font-weight:700">'+h.icon+' '+h.label+'</div>'
      +'<div style="font-size:11px;color:'+biasColor+';font-weight:700;background:'+biasColor+'22;padding:2px 8px;border-radius:999px">'+biasLabel+'</div>'
      +'</div>'
      +'<div style="background:'+mostLikelyColor+'18;border:1.5px solid '+mostLikelyColor+'55;border-radius:10px;padding:8px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">'
      +'<div>'
      +'<div style="font-size:9px;color:'+mostLikelyColor+';font-weight:700;letter-spacing:.5px;margin-bottom:2px">⭐ MÁS PROBABLE (estimado)</div>'
      +'<div style="font-size:13px;font-weight:800;color:'+mostLikelyColor+'">'+mostLikelyLabel+'</div>'
      +'</div>'
      +'<div style="text-align:right">'
      +'<div style="font-size:22px;font-weight:900;color:'+mostLikelyColor+'">'+mostLikelyP+'%</div>'
      +'<div style="font-size:9px;color:var(--text3)">prob. estimada</div>'
      +'</div>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px">'
      +'<div style="text-align:center;padding:10px 4px;background:'+cardBg('bear')+';border:'+cardBorder('bear')+' '+cardBorderColor('bear')+';border-radius:10px">'
      +(mostLikely==='bear'?'<div style="font-size:8px;color:#ef4444;font-weight:800;margin-bottom:2px">⭐ MÁS PROBABLE</div>':'')
      +'<div style="font-size:9px;color:#ef4444;font-weight:700;margin-bottom:4px">📉 BAJISTA</div>'
      +'<div style="font-size:14px;font-weight:800;color:#ef4444">'+fmt(bearP)+'</div>'
      +'<div style="font-size:10px;color:#ef4444">'+fmtPct(bearPct)+'</div>'
      +probBar(pBear,'#ef4444')
      +'<div style="font-size:10px;color:#ef4444;font-weight:700;margin-top:3px">'+pBear+'%</div>'
      +'</div>'
      +'<div style="text-align:center;padding:10px 4px;background:'+cardBg('base')+';border:'+cardBorder('base')+' '+cardBorderColor('base')+';border-radius:10px">'
      +(mostLikely==='base'?'<div style="font-size:8px;color:#eab308;font-weight:800;margin-bottom:2px">⭐ MÁS PROBABLE</div>':'')
      +'<div style="font-size:9px;color:#eab308;font-weight:700;margin-bottom:4px">📊 BASE</div>'
      +'<div style="font-size:14px;font-weight:800;color:#eab308">'+fmt(baseP)+'</div>'
      +'<div style="font-size:10px;color:#eab308">'+fmtPct(basePct)+'</div>'
      +probBar(pBase,'#eab308')
      +'<div style="font-size:10px;color:#eab308;font-weight:700;margin-top:3px">'+pBase+'%</div>'
      +'</div>'
      +'<div style="text-align:center;padding:10px 4px;background:'+cardBg('bull')+';border:'+cardBorder('bull')+' '+cardBorderColor('bull')+';border-radius:10px">'
      +(mostLikely==='bull'?'<div style="font-size:8px;color:#10b981;font-weight:800;margin-bottom:2px">⭐ MÁS PROBABLE</div>':'')
      +'<div style="font-size:9px;color:#10b981;font-weight:700;margin-bottom:4px">📈 ALCISTA</div>'
      +'<div style="font-size:14px;font-weight:800;color:#10b981">'+fmt(bullP)+'</div>'
      +'<div style="font-size:10px;color:#10b981">'+fmtPct(bullPct)+'</div>'
      +probBar(pBull,'#10b981')
      +'<div style="font-size:10px;color:#10b981;font-weight:700;margin-top:3px">'+pBull+'%</div>'
      +'</div>'
      +'</div>'
      +'<div style="font-size:10px;color:var(--text3);line-height:1.4">'+h.note+'</div>'
      +'</div>';
  }).join('');
  const blockColor=s=>s>0.05?'#10b981':s<-0.05?'#ef4444':'#eab308';
  const blockLabel=s=>s>0.08?'Alcista':s>0.02?'Lev. alcista':s<-0.08?'Bajista':s<-0.02?'Lev. bajista':'Neutral';
  const blockBar=s=>{
    const pct=Math.min(100,Math.abs(s)*400);
    const col=blockColor(s);
    return '<div style="background:var(--bg3);border-radius:999px;height:6px;margin-top:4px">'
      +'<div style="height:100%;border-radius:999px;background:'+col+';width:'+pct+'%"></div></div>';
  };
  const signalPct=Math.min(100,Math.max(0,(netScore+0.25)*200));
  const signalColor=signalPct>60?'#10b981':signalPct>40?'#eab308':'#ef4444';
  const signalLabel=signalPct>72?'Muy alcista':signalPct>58?'Alcista':signalPct>48?'Neutral-alcista':signalPct>38?'Neutral':signalPct>25?'Bajista':'Muy bajista';
  const groups=[...new Set(factors.map(f=>f.group))];
  const factorsHTML=groups.map(g=>{
    const gFactors=factors.filter(f=>f.group===g);
    const gScore=gFactors.reduce((a,f)=>a+f.score,0);
    return '<div style="margin-bottom:16px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
      +'<div style="font-size:12px;font-weight:700;color:var(--text)">'+g+'</div>'
      +'<div style="font-size:11px;font-weight:700;color:'+blockColor(gScore)+'">'+blockLabel(gScore)+'</div>'
      +'</div>'
      +gFactors.map(f=>{
        const col=f.score>=0?'#10b981':'#ef4444';
        const barW=Math.min(100,Math.abs(f.score)*350);
        return '<div style="margin-bottom:8px;padding:8px 10px;background:var(--bg);border-radius:8px">'
          +'<div style="display:flex;justify-content:space-between;margin-bottom:3px">'
          +'<div style="font-size:11px;font-weight:600">'+f.name+'</div>'
          +'<div style="font-size:10px;color:'+col+';font-weight:700">'+(f.score>=0?'+':'')+(f.score*100).toFixed(0)+'pts</div>'
          +'</div>'
          +'<div style="background:var(--bg3);border-radius:999px;height:4px;margin-bottom:4px">'
          +'<div style="height:100%;border-radius:999px;background:'+col+';width:'+barW+'%"></div></div>'
          +'<div style="font-size:10px;color:var(--text3);line-height:1.4">'+f.desc+'</div>'
          +'</div>';
      }).join('')
      +'</div>';
  }).join('');
  const onChainBadge=OC.loaded
    ?'<span style="font-size:10px;color:#10b981;font-weight:600">✅ Datos on-chain en tiempo real</span>'
    :'<span style="font-size:10px;color:#eab308;font-weight:600"><span class="spin" style="font-size:10px">⏳</span> Cargando datos on-chain...</span>';
  return '<div class="space-y">'
    +'<div style="background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.3);border-radius:12px;padding:12px;display:flex;gap:10px">'
    +'<div style="font-size:20px">⚠️</div>'
    +'<div style="font-size:11px;color:var(--text2);line-height:1.5"><b style="color:#eab308">Esto no es consejo financiero.</b> Son rangos probabilísticos. Bitcoin es extremadamente volátil. Nunca inviertas más de lo que puedas perder.</div>'
    +'</div>'
    +'<div class="card">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
    +'<div style="font-size:15px;font-weight:700">🔮 Señal global</div>'
    +onChainBadge
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">'
    +[
      {l:'Técnico',s:taTotal,i:'📐',tip:'RSI, Stoch RSI, MACD, OBV, ADX, Bollinger y SMA calculados con precio real.'},
      {l:'On-chain',s:onChainTotal,i:'⛓️',tip:'Hashrate, direcciones activas, volumen, netflow, Open Interest y Funding Rate.'},
      {l:'Macro',s:macroTotal,i:'🌐',tip:'Ciclo halving, ETFs, Fear & Greed, dominancia, correlación S&P500/Oro y política monetaria.'}
    ].map(b=>'<div style="padding:10px 8px;background:var(--bg);border-radius:10px;border:1px solid '+blockColor(b.s)+'44">'
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'
      +'<span style="font-size:18px">'+b.i+'</span>'
      +'<span style="font-size:12px;font-weight:700;color:var(--text)">'+b.l+'</span>'
      +'</div>'
      +'<div style="font-size:13px;font-weight:800;color:'+blockColor(b.s)+';margin-bottom:4px">'+blockLabel(b.s)+'</div>'
      +blockBar(b.s)
      +'<div style="font-size:10px;color:var(--text3);margin-top:6px;line-height:1.4">'+b.tip+'</div>'
      +'</div>'
    ).join('')
    +'</div>'
    +'<div style="background:var(--bg3);border-radius:999px;height:12px;overflow:hidden;margin-bottom:6px;position:relative">'
    +'<div style="height:100%;background:linear-gradient(90deg,#ef4444 0%,#eab308 50%,#10b981 100%)"></div>'
    +'<div style="position:absolute;top:0;left:'+signalPct+'%;transform:translateX(-50%);width:3px;height:100%;background:white;border-radius:2px"></div>'
    +'</div>'
    +'<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-bottom:6px"><span>Muy bajista</span><span>Neutral</span><span>Muy alcista</span></div>'
    +'<div style="text-align:center;font-size:14px;font-weight:800;color:'+signalColor+'">'+signalLabel+'</div>'
    +'</div>'
    +'<div class="card">'
    +'<div style="font-size:15px;font-weight:700;margin-bottom:4px">📅 Rangos por horizonte</div>'
    +'<div style="font-size:11px;color:var(--text3);margin-bottom:14px">Precio actual: <b style="color:#f97316;font-size:13px">$'+Math.round(price).toLocaleString()+'</b>'+(ta?' · RSI: <b style="color:var(--text)">'+ta.lastRSI.toFixed(0)+'</b> · Señal TA: <b style="color:var(--text)">'+ta.signal+'</b>':'')+'</div>'
    +horizonCards
    +'</div>'
    +'<div style="background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.3);border-radius:12px;padding:12px">'
    +'<div style="font-size:12px;font-weight:700;color:#818cf8;margin-bottom:8px">⛓️ ¿Qué es el análisis on-chain?</div>'
    +'<div style="display:flex;flex-direction:column;gap:8px">'
    +'<div style="display:flex;gap:10px;align-items:flex-start">'
    +'<div style="font-size:18px;flex-shrink:0">⚡</div>'
    +'<div><div style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:2px">Hashrate</div>'

async function init(){

  setInterval(async()=>{await fetchPrice();checkAlerts();renderCurrentTab();},60000);
  setInterval(async()=>{await fetchMempool();if(S.currentTab==='mempool')renderTab('mempool');},30000);
  setInterval(async()=>{await Promise.all([fetchMarket(),fetchMining()]);if(S.currentTab==='market')renderTab('market');},120000);
  setInterval(async()=>{await fetchNews();if(S.currentTab==='news')renderTab('news');},300000);
}

/* ══════ WAKE-UP DETECTION ══════ */
// Detecta cuando la app lleva mucho tiempo inactiva y se reactiva
// Soluciona la pantalla en blanco al abrir la app por la mañana
let _lastActiveTime = Date.now();
let _appVisible = true;

// Registrar actividad
function _touchActivity() { _lastActiveTime = Date.now(); }
document.addEventListener('touchstart', _touchActivity, {passive:true});
document.addEventListener('click', _touchActivity, {passive:true});

// Cuando la app vuelve al primer plano
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    _appVisible = false;
    return;
  }
  // App vuelve a ser visible
  const inactiveMs = Date.now() - _lastActiveTime;
  const inactiveHours = inactiveMs / 3600000;
  _appVisible = true;
  _lastActiveTime = Date.now();

  if (inactiveHours > 1) {
    // Más de 1 hora inactiva → recargar para evitar pantalla en blanco
    console.log('[SatsFlow] Inactiva', inactiveHours.toFixed(1), 'h — recargando...');
    window.location.reload();
    return;
  }

  // Menos de 1 hora → solo refrescar precio si la app está cargada
  if (typeof renderCurrentTab === 'function' && typeof S !== 'undefined' && S.price?.usd > 0) {
    fetchPrice().then(() => renderCurrentTab()).catch(() => {});
  }
});

// Detectar "salto de tiempo" (el móvil estuvo en suspensión profunda)
// El setInterval se retrasa si el CPU estaba dormido
let _lastHeartbeat = Date.now();
setInterval(() => {
  const now = Date.now();
  const gap = now - _lastHeartbeat;
  // Si han pasado más de 5 minutos reales entre ticks de 30s → el móvil estuvo dormido
  if (gap > 300000) {
    console.log('[SatsFlow] Detectado sleep de', (gap/60000).toFixed(1), 'min — recargando...');
    window.location.reload();
    return;
  }
  _lastHeartbeat = now;
}, 30000);

init();
</script>
