  document.documentElement.lang=lang;

}

function saveMorningAlert(hour,minute){
  S.morningAlert={hour,minute,enabled:true};
  localStorage.setItem('sf-morning',JSON.stringify(S.morningAlert));
  scheduleMorningCheck();
}
function disableMorningAlert(){
  S.morningAlert=null;
  localStorage.setItem('sf-morning','null');
  if(window._morningInterval)clearInterval(window._morningInterval);
}
function scheduleMorningCheck(){
  // Comprobar en el momento actual (al abrir la app o al configurar)
  _checkMorningNow();
  // También comprobar cada minuto POR SI la app sigue abierta a la hora exacta
  if(window._morningInterval)clearInterval(window._morningInterval);
  window._morningInterval=setInterval(_checkMorningNow, 60000);
}
async function _checkMorningNow(){
  if(!S.morningAlert?.enabled)return;
  if(S.notifPerm!=='granted')return;
  const now=new Date();
  const todayKey=now.toISOString().slice(0,10);
  const lastSent=localStorage.getItem('sf-morning-sent');
  if(lastSent===todayKey)return; // ya enviado hoy
  // Enviar si ya pasó la hora configurada (con margen de 2h para cuando abren tarde)
  const configH=S.morningAlert.hour, configM=S.morningAlert.minute||0;
  const nowMins=now.getHours()*60+now.getMinutes();
  const cfgMins=configH*60+configM;
  if(nowMins>=cfgMins && nowMins<=cfgMins+120){
    localStorage.setItem('sf-morning-sent',todayKey);
    await sendMorningBriefing();
  }
}
async function sendMorningBriefing(){
  try{await fetchPrice();}catch{}
  try{await fetchMarket();}catch{}
  const tr=t();
  const price=S.price.usd||0;
  const change=S.change24h||0;
  const fg=S.marketData?.fearGreed?.value||50;
  const dom=parseFloat(S.marketData?.dominance?.btc)||0;
  const ta=typeof analyze==='function'?analyze():null;
  const sigKey=ta?.signal==='COMPRAR'?'buy':ta?.signal==='VENDER'?'sell':'neutral';
  const sig=tr[sigKey]||tr.neutral;
  const title=S.lang==='ca'?'☀️ Resum matinal BTC':S.lang==='en'?'☀️ BTC Morning Briefing':'☀️ Resumen matutino BTC';
  const body=tr.morningMsg(Math.round(price),change,fg,sig);
  const detail=tr.morningDetail(dom,change);
  showNotif(title,body+'\n'+detail);

function buildSnapshot(){
  // Genera un snapshot de la predicción actual
  if(!S.price.usd||S.price.usd===0)return null;
  try{
    const{horizons,netScore,taTotal,onChainTotal,macroTotal,regime,wTA,wOC,wMacro}=calcForecast(S.price.usd);
    const week=horizons.find(h=>h.label==='1 semana');
    const month=horizons.find(h=>h.label==='1 mes');
    if(!week)return null;
    const now=new Date();
    const dateKey=now.toISOString().slice(0,10); // YYYY-MM-DD
    return{
      date:dateKey,
      ts:now.getTime(),
      price:Math.round(S.price.usd),
      priceEur:Math.round(S.price.eur||0),
      netScore:parseFloat(netScore.toFixed(4)),
      taTotal:parseFloat(taTotal.toFixed(4)),
      onChainTotal:parseFloat(onChainTotal.toFixed(4)),
      macroTotal:parseFloat(macroTotal.toFixed(4)),
      regime,
      wTA:parseFloat(wTA.toFixed(2)),wOC:parseFloat(wOC.toFixed(2)),wMacro:parseFloat(wMacro.toFixed(2)),
      week:{
        bear:Math.round(week.bear),
        base:Math.round(week.base),
        bull:Math.round(week.bull),
        mostLikely:week.mostLikely,
        signal:week.signal
      },
      month:month?{
        bear:Math.round(month.bear),
        base:Math.round(month.base),
        bull:Math.round(month.bull),
        mostLikely:month.mostLikely,
        signal:month.signal
      }:null,
      fg:S.marketData?.fearGreed?.value||null,
      dom:parseFloat(S.marketData?.dominance?.btc||0)||null,
      manual:false
    };
  }catch(e){console.warn('buildSnapshot:',e);return null;}
}

async function saveSnapshotIfNeeded(manual=false){
  const snap=buildSnapshot();
  if(!snap){console.warn('[snapshot] buildSnapshot devolvió null — precio:',S.price?.usd);return;}
  if(manual){
    snap.manual=true;
    snap.date=snap.date+'_m'+Date.now(); // evitar sobreescribir el auto del mismo día
    await savePrediction(snap);
    if(S.currentTab==='forecast')renderTab('forecast');
    showNotif('📸 SatsFlow',t().snapSaved+snap.price.toLocaleString());
    return;
  }
  // Auto: solo guardar si no existe ya una entrada de hoy
  try{
    const db=await openDB();
    const tx=db.transaction('predictions','readonly');
    const existing=await new Promise(res=>{const q=tx.objectStore('predictions').get(snap.date);q.onsuccess=()=>res(q.result);q.onerror=()=>res(null);});
    if(!existing){
      await savePrediction(snap);
      // Guardar preu diari en log per resolució futura de prediccions
      try{
        const log=JSON.parse(localStorage.getItem('sf-pricelog')||'{}');
        log[snap.date]=snap.price;
        // Mantenir màxim 400 dies (~13 mesos)
        const keys=Object.keys(log).sort();
        if(keys.length>400)keys.slice(0,keys.length-400).forEach(k=>delete log[k]);
        localStorage.setItem('sf-pricelog',JSON.stringify(log));
      }catch{}
      console.log('[SatsFlow] Snapshot diario guardado:',snap.date,'BTC $'+snap.price.toLocaleString());
      if(S.currentTab==='forecast')renderTab('forecast');
    }
  }catch(e){console.warn('autoSnapshot:',e);}
}

// Scheduler diario a las 9:00
function scheduleDailySnapshot(){
  // Las PWA en Android NO ejecutan código en background — el setTimeout de las 9:00
  // solo funciona si la app está abierta en ese momento.
  // Estrategia robusta: comprobar al arrancar y al volver al primer plano
  // si falta el snapshot de hoy y ya son las 9:00 o más → guardar.

  async function checkAndSave(){
    const now=new Date();
    if(now.getHours()<9)return; // antes de las 9 no guardar
    const dateKey=now.toISOString().slice(0,10);
    try{
      const db=await openDB();
      const tx=db.transaction('predictions','readonly');
      const existing=await new Promise(res=>{
        const q=tx.objectStore('predictions').get(dateKey);
        q.onsuccess=()=>res(q.result);q.onerror=()=>res(null);
      });
      if(!existing){
        // No hay snapshot de hoy todavía → intentar guardar
        // Esperar a que los datos estén listos (precio > 0)
        if(S.price?.usd>0){
          await saveSnapshotIfNeeded(false);
        }
      }
    }catch(e){console.warn('checkAndSave:',e);}
  }

  // Al arrancar: esperar 15s para que fetchPrice y fetchOnChain terminen
  setTimeout(checkAndSave, 15000);

  // También comprobar cada hora mientras la app está abierta
  // Esto captura el caso de que la app esté abierta exactamente a las 9:00
  setInterval(checkAndSave, 3600000);
}

// Obtenir preu real d'una data (del log o preu actual si és recent)
function getPriceAtDate(targetDate){
  try{
    const log=JSON.parse(localStorage.getItem('sf-pricelog')||'{}');
    // Buscar la data exacta o les 3 dates properes
    if(log[targetDate]) return log[targetDate];
    const keys=Object.keys(log).sort();
    // Buscar la data més propera
    let closest=null,minDiff=Infinity;
    for(const k of keys){
      const diff=Math.abs(new Date(k)-new Date(targetDate));
      if(diff<minDiff&&diff<3*86400000){minDiff=diff;closest=k;}
    }
    return closest?log[closest]:null;
  }catch{return null;}
}

    if(!range) return;

    const inside=resolved.length-aboves-belows;
    const bias=aboves>belows?tr.histConservative:
               belows>aboves?tr.histPessimistic:

      +'<div style="background:rgba(16,185,129,.1);border-radius:8px;padding:6px"><div style="font-size:18px;font-weight:800;color:#10b981">'+inside+'</div><div style="font-size:9px;color:var(--text3)">'+tr.histInsideRange+'</div></div>'

      +'</div>'
      +'<div style="font-size:11px;color:'+biasColor+'">'+bias+'</div>'
      +'</div>';
  }

  return'<div class="card">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
    +'<div style="font-size:15px;font-weight:700">📜 '+tr.histPredTitle+'</div>'
    +'<div style="text-align:right">'+accuracyBadge+'</div>'
    +'</div>'
    +filterBar

    +'<div style="margin-bottom:10px;display:flex;gap:8px;flex-wrap:wrap">'

    +'</div>'
    +rows

    +'</div>';

if('serviceWorker' in navigator){
  window.addEventListener('load',async()=>{
    try{
      const base=window.location.pathname.replace(/\/[^/]*$/,'/');
      // Usar BUILD_TS del HTML para invalidar caché del CDN de GitHub Pages
      const swUrl=base+'sw.js?v='+BUILD_TS;
      // updateViaCache:'none' → el navegador SIEMPRE comprueba sw.js en red, nunca desde caché
      const reg=await navigator.serviceWorker.register(swUrl,{scope:base,updateViaCache:'none'});
      console.log('[SW] registrado:',reg.scope);

      // Forzar comprobación de actualización cada vez que carga la app
      reg.update().catch(()=>{});

      // Si hay un SW nuevo esperando → activarlo inmediatamente sin esperar a cerrar tabs
      if(reg.waiting){
        reg.waiting.postMessage({type:'SKIP_WAITING'});
      }
      reg.addEventListener('updatefound',()=>{
        const newSW=reg.installing;
        if(!newSW)return;
        newSW.addEventListener('statechange',()=>{
          if(newSW.state==='installed'&&navigator.serviceWorker.controller){
            console.log('[SW] nueva versión disponible — activando');
            newSW.postMessage({type:'SKIP_WAITING'});
            // Recargar la página para que use la nueva versión
            navigator.serviceWorker.addEventListener('controllerchange',()=>{
              window.location.reload();
            },{once:true});
          }
        });
      });

      if('periodicSync' in reg){try{const p=await navigator.permissions.query({name:'periodic-background-sync'});if(p.state==='granted')await reg.periodicSync.register('price-check',{minInterval:15*60*1000});}catch{}}
    }catch(e){console.warn('[SW]',e.message);}
  });
}

async function showNotif(title,body){
  playAlertSound();
  if(Notification.permission!=='granted')return;
  const opts={body,icon:'./icon-192.png',badge:'./icon-96.png',vibrate:[300,100,300,100,300],tag:'sf-alert',renotify:true,silent:false};
  // Android necesita SW para notificaciones — con timeout de seguridad
  if('serviceWorker' in navigator){
    try{
      const swReady=await Promise.race([
        navigator.serviceWorker.ready,
        new Promise((_,rej)=>setTimeout(()=>rej(new Error('SW timeout')),3000))
      ]);
      await swReady.showNotification(title,opts);
      return;
    }catch(e){console.warn('[Notif] SW falló:',e.message);}
  }
  // Fallback directo (funciona en PC)
  try{new Notification(title,opts);}catch(e){console.warn('[Notif] Fallback falló:',e);}
}
function playAlertSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const notes=[523,659,784]; // Do-Mi-Sol
    notes.forEach((freq,i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type='sine';
      osc.frequency.setValueAtTime(freq,ctx.currentTime+i*0.18);
      gain.gain.setValueAtTime(0,ctx.currentTime+i*0.18);
      gain.gain.linearRampToValueAtTime(0.4,ctx.currentTime+i*0.18+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.18+0.18);
      osc.start(ctx.currentTime+i*0.18);
      osc.stop(ctx.currentTime+i*0.18+0.18);
    });
    setTimeout(()=>ctx.close(),1000);
  }catch(e){console.warn('Audio:',e);}
}

async function tryFetchRSS(url){
  // rss2json.com: convierte RSS a JSON, sin problemas CORS desde GitHub Pages
  try{
    const r=await fetch('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(url)+'&count=10',{signal:AbortSignal.timeout(8000)});
    if(r.ok){
      const j=await r.json();
      if(j.status==='ok'&&j.items?.length>0){
        // Convertir formato rss2json a XML simulado para parseRSS
        const fakeXml=j.items.map(it=>{
          const d=it.pubDate||new Date().toISOString();
          const link=it.link||'';
          const title=it.title||'';
          const desc=(it.description||it.content||'').replace(/<[^>]+>/g,'').slice(0,200);
          return '<item><title><![CDATA['+title+']]></title><link>'+link+'</link><description><![CDATA['+desc+']]></description><pubDate>'+d+'</pubDate></item>';
        }).join('');
        return '<rss>'+fakeXml+'</rss>';
      }
    }
  }catch{}
  // Fallback: intentar fetch directo (funciona para algunos feeds con CORS abierto)
  try{
    const r=await fetch(url,{signal:AbortSignal.timeout(6000)});
    if(r.ok){const t=await r.text();if(t.includes('<item'))return t;}
  }catch{}
  return '';
}
function parseRSS(xml,source){
  const items=xml.match(/<item[\s\S]*?<\/item>/g)||[];
  const results=[];
  items.forEach(item=>{
    const title=(item.match(/<title><!\[CDATA\[([\s\S]*?)\]\]><\/title>/)||item.match(/<title>([^<]*)<\/title>/))?.[1]||'';
    const link=(item.match(/<link>([^<]*)<\/link>/)||item.match(/<guid[^>]*>(https?[^<]+)<\/guid>/))?.[1]||'';
    const pubDate=item.match(/<pubDate>([^<]*)<\/pubDate>/)?.[1]||'';
    const clean=title.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#\d+;/g,'').replace(/<[^>]+>/g,'').trim();
    if(clean&&link)results.push({id:link,title:clean,url:link,source,date:pubDate?new Date(pubDate):new Date()});
  });
  return results;
}
async function fetchNews(){
  const feeds=[
    {url:'https://news.google.com/rss/search?q=bitcoin&hl=es&gl=ES&ceid=ES:es',source:'Google Noticias ES'},
    {url:'https://news.google.com/rss/search?q=bitcoin&hl=ca&gl=ES&ceid=ES:ca',source:'Google Notícies CA'},
    {url:'https://news.google.com/rss/search?q=bitcoin+precio+adopcion&hl=es&gl=ES&ceid=ES:es',source:'Google Noticias ES'},
    {url:'https://news.google.com/rss/search?q=bitcoin+BTC+halving&hl=es&gl=ES&ceid=ES:es',source:'Google Noticias ES'},
  ];
  const seen=new Set();
  let results=[];
  for(const feed of feeds){
    if(results.length>=12)break;
    try{
      const xml=await tryFetchRSS(feed.url);
      if(!xml)continue;
      const items=parseRSS(xml,feed.source);
      items.forEach(item=>{
        if(!seen.has(item.id)&&isBitcoinNews(item.title)){
          seen.add(item.id);

  }
  if(results.length<3){
    try{
      const urls=[
        'https://news.google.com/rss/search?q=bitcoin&hl=es&gl=ES&ceid=ES:es',
        'https://news.google.com/rss/search?q=bitcoin&hl=ca&gl=ES&ceid=ES:ca',
      ];
      for(const rssUrl of urls){
        if(results.length>=8)break;
        const r=await fetch('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(rssUrl)+'&count=10',{signal:AbortSignal.timeout(8000)});
        const j=await r.json();
        if(j.status==='ok'&&j.items?.length){
          j.items.forEach(n=>{
            if(n.title&&n.link&&!seen.has(n.link)&&isBitcoinNews(n.title)){
              seen.add(n.link);
              results.push({id:n.link,title:n.title,url:n.link,source:j.feed?.title||'Bitcoin News',date:new Date(n.pubDate)});
            }
          });
        }
      }
    }catch(e){console.warn('rss2json fallback',e);}
  }
  results=results.sort((a,b)=>b.date-a.date).slice(0,15);
  if(results.length>0)S.news=results;
  else if(S.news.length===0)S.news=[{id:'err',title:'No se pudieron cargar noticias. Inténtalo de nuevo.',url:'#',source:'Error',date:new Date()}];
}
function calcEMA(p,k){const m=2/(k+1),e=[];p.forEach((v,i)=>{e.push(i===0?v:v*m+e[i-1]*(1-m));});return e;}
function calcRSI(p,k=14){const r=new Array(k).fill(null);let g=0,l=0;for(let i=1;i<=k;i++){const d=p[i]-p[i-1];d>0?g+=d:l+=Math.abs(d);}let ag=g/k,al=l/k;for(let i=k;i<p.length;i++){const d=p[i]-p[i-1];ag=(ag*(k-1)+(d>0?d:0))/k;al=(al*(k-1)+(d<0?Math.abs(d):0))/k;r.push(100-(100/(1+(al===0?100:ag/al))));}return r;}
function analyze(){
  // Usar historial de 60 velas diarias si está disponible — siempre suficiente para TA
  const src=S.historyTA&&S.historyTA.length>=30?S.historyTA:S.history;
  const prices=src.map(h=>h.price);
  if(prices.length<14)return null;
  const last=prices[prices.length-1];
  const rsiArr=calcRSI(prices),lastRSI=rsiArr[rsiArr.length-1];
  const e12=calcEMA(prices,12),e26=calcEMA(prices,26);
  const macd=e12.map((v,i)=>v-e26[i]);
  const sig=calcEMA(macd.slice(26),9);
  const padSig=[...new Array(26).fill(null),...new Array(macd.length-26-sig.length).fill(null),...sig];
  const lMACD=macd[macd.length-1],lSig=padSig[padSig.length-1];
  const sma7=prices.slice(-7).reduce((a,b)=>a+b,0)/7;
  const sma30=prices.slice(-30).reduce((a,b)=>a+b,0)/30;
  const sl20=prices.slice(-20),m20=sl20.reduce((a,b)=>a+b,0)/20;
  const std=Math.sqrt(sl20.reduce((a,b)=>a+(b-m20)**2,0)/sl20.length);
  const bbU=m20+2*std,bbL=m20-2*std;
  const recent=prices.slice(-30);
  const support=Math.min(...recent)*0.98,resistance=Math.max(...recent)*1.02;
  let bull=0,bear=0;
  if(lastRSI<30)bull+=3;else if(lastRSI<45)bull+=1;else if(lastRSI>70)bear+=3;else if(lastRSI>55)bear+=1;
  if(sma7>sma30)bull+=2;else bear+=2;
  if(lMACD>lSig)bull+=2;else bear+=2;
  if(last<bbL)bull+=2;else if(last>bbU)bear+=2;
  const total=bull+bear,bullPct=total>0?Math.round((bull/total)*100):50;
  const signal=bullPct>=65?'COMPRAR':bullPct<=35?'VENDER':'NEUTRAL';
  return{lastRSI,sma7,sma30,lMACD,lSig,bbU,bbL,support,resistance,bullPct,bearPct:100-bullPct,signal,last,rsiData:rsiArr.slice(-40).filter(v=>v!=null),macdData:macd.slice(-40),sigData:padSig.slice(-40)};
}

  const rls=refs.map(({val,color:rc})=>{const y=P+(1-(val-min)/range)*(H-P*2);return`<line x1="${P}" y1="${y}" x2="${W-P}" y2="${y}" stroke="${rc}" stroke-dasharray="4 3" stroke-width="1" opacity=".7"/>`;}).join('');
  return`<svg viewBox="0 0 ${W} ${H}" class="mini-chart" preserveAspectRatio="none">${rls}<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/></svg>`;

function fmtPrice(v){if(v>=1e6)return(v/1e6).toFixed(2)+'M';if(v>=1e3)return(v/1e3).toFixed(1)+'k';return v.toFixed(0);}

function areaSVG(data){
  if(!data.length)return'';
  const prices=data.map(d=>d.price);
  const min=Math.min(...prices),max=Math.max(...prices),range=max-min||1;
  const W=320,H=180,PL=52,PR=6,PT=14,PB=26;
  const cw=W-PL-PR,ch=H-PT-PB;
  const last=prices[prices.length-1],first=prices[0];
  const color=last>=first?'#10b981':'#ef4444';
  const toX=i=>PL+(i/(data.length-1||1))*cw;
  const toY=v=>PT+ch-((v-min)/range)*ch;
  let gridLines='',yLabels='';
  const levels=4;
  for(let i=0;i<=levels;i++){
    const v=min+(range/levels)*i;
    const y=toY(v);
    gridLines+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#1e293b" stroke-width="1"/>`;
    yLabels+=`<text x="${PL-4}" y="${y+4}" font-size="9" fill="#64748b" text-anchor="end">${fmtPrice(v)}</text>`;
  }
  let xLabels='';
  const nLabels=Math.min(5,data.length);
  const step=Math.floor((data.length-1)/(nLabels-1||1));
  for(let i=0;i<nLabels;i++){
    const idx=Math.min(i*step,data.length-1);
    const d=data[idx];
    const x=toX(idx);
    const label=d.time?new Date(d.time).toLocaleDateString('ca-ES',{day:'2-digit',month:'2-digit'}):d.date||'';
    if(label) xLabels+=`<text x="${x}" y="${H-PB+14}" font-size="8" fill="#64748b" text-anchor="middle">${label}</text>`;
  }
  const pts=data.map((d,i)=>`${toX(i)},${toY(d.price)}`);
  const area=`<polygon points="${PL},${PT+ch} ${pts.join(' ')} ${toX(data.length-1)},${PT+ch}" fill="url(#ag${color==='#10b981'?'g':'r'})"/>`;
  const line=`<polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
  const cx=toX(data.length-1),cy=toY(last);
  const dot=`<circle cx="${cx}" cy="${cy}" r="3.5" fill="${color}" stroke="#0f172a" stroke-width="1.5"><animate attributeName="r" values="3.5;5;3.5" dur="2s" repeatCount="indefinite"/></circle>`;
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:195px;display:block" preserveAspectRatio="none">
    <defs>
      <linearGradient id="agg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10b981" stop-opacity=".25"/><stop offset="100%" stop-color="#10b981" stop-opacity="0"/></linearGradient>
      <linearGradient id="agr" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ef4444" stop-opacity=".25"/><stop offset="100%" stop-color="#ef4444" stop-opacity="0"/></linearGradient>
    </defs>
    ${gridLines}${area}${line}${dot}${yLabels}${xLabels}
  </svg>`;
}

function candleSVG(data){
  if(!data.length)return'';
  const ps=data.flatMap(d=>[d.high,d.low]);
  const min=Math.min(...ps),max=Math.max(...ps),range=max-min||1;
  const W=320,H=210,PL=52,PR=6,PT=14,PB=26;
  const cw=W-PL-PR,ch=H-PT-PB;
  const toY=v=>PT+ch-((v-min)/range)*ch;
  const toX=i=>PL+(i+.5)*(cw/data.length);
  const cW=Math.max(2,Math.floor(cw/data.length)-2);
  let gridLines='',yLabels='';
  const levels=4;
  for(let i=0;i<=levels;i++){
    const v=min+(range/levels)*i;
    const y=toY(v);
    gridLines+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#1e293b" stroke-width="1"/>`;
    yLabels+=`<text x="${PL-4}" y="${y+4}" font-size="9" fill="#64748b" text-anchor="end">${fmtPrice(v)}</text>`;
  }
  let xLabels='';
  const nLabels=Math.min(5,data.length);
  const step=Math.floor((data.length-1)/(nLabels-1||1));
  for(let i=0;i<nLabels;i++){
    const idx=Math.min(i*step,data.length-1);
    const d=data[idx];
    const x=toX(idx);
    const label=d.time?new Date(d.time).toLocaleDateString('ca-ES',{day:'2-digit',month:'2-digit'}):d.date||'';
    if(label) xLabels+=`<text x="${x}" y="${H-PB+14}" font-size="8" fill="#64748b" text-anchor="middle">${label}</text>`;
  }
  const candles=data.map((d,i)=>{
    const up=d.close>=d.open,x=toX(i),col=up?'#10b981':'#ef4444';
    const yH=toY(d.high),yL=toY(d.low),yO=toY(d.open),yC=toY(d.close);
    const bT=Math.min(yO,yC),bH=Math.max(1.5,Math.abs(yO-yC));
    return`<line x1="${x}" y1="${yH}" x2="${x}" y2="${yL}" stroke="${col}" stroke-width="1" opacity=".8"/><rect x="${x-cW/2}" y="${bT}" width="${cW}" height="${bH}" fill="${col}" rx="1"/>`;
  }).join('');
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:225px;display:block" preserveAspectRatio="none">
    ${gridLines}${candles}${yLabels}${xLabels}
  </svg>`;
}

// Ciclo 2020: halving 11 May 2020, ATH ~$69k Nov 2021 (día ~549)
// Ciclo 2024: halving 20 Abr 2024 (en curso)
const CYCLE_DATA = {
  c2016:{
    label:'Ciclo 2016–2017',color:'#818cf8',
    // [día, multiplicador desde precio halving] puntos clave interpolados
    points:[
      [0,1],[30,1.1],[60,1.3],[90,1.5],[120,1.8],[150,2.2],[180,2.8],
      [210,3.5],[240,4.5],[270,6],[300,8],[330,12],[360,18],[390,25],
      [420,30],[450,28],[480,22],[510,26],[525,32],[540,20],[570,10],[600,8],
      [630,7],[660,6],[700,5],[730,4.5]
    ]
  },
  c2020:{
    label:'Ciclo 2020–2021',color:'#10b981',
    points:[
      [0,1],[30,1.2],[60,1.5],[90,2],[120,2.8],[150,3.5],[180,4.5],
      [210,5],[240,4.2],[270,3.5],[300,4],[330,5.5],[360,7],[390,8.5],
      [420,10],[450,11],[480,12.5],[510,13],[540,13.5],[549,14],
      [570,10],[600,7],[630,5],[660,4],[700,3.5],[730,3]
    ]
  },
  c2024:{
    label:'Ciclo 2024 (actual)',color:'#f97316',
    halvingDate: new Date('2024-04-20'),
    // Se calcula dinámicamente con precio real
  }
};

function getCycleDay2024(){
  const halving=new Date('2024-04-20');
  return Math.floor((Date.now()-halving.getTime())/(1000*60*60*24));
}

async function fetchCycleHistory(){
  // Precio en el halving 2024 (~$63,800) y precio actual
  // Intentar obtener historial desde Binance
  if(S.cycleHistory&&S.cycleHistory.length>10)return;
  try{
    // 365 días de velas diarias desde el halving
    const r=await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=365&startTime='+new Date('2024-04-20').getTime(),{signal:AbortSignal.timeout(8000)});
    if(r.ok){
      const raw=await r.json();
      S.cycleHistory=raw.map((k,i)=>({day:i,price:parseFloat(k[4])})); // close price
      S.halvingPrice2024=parseFloat(raw[0][1]); // open del día halving
    }
  }catch{}
}

function renderCyclesChart(){
  const W=340,H=200,PX=40,PY=12,PB=28;
  const cw=W-PX,ch=H-PY-PB;

  // Calcular máximo de días a mostrar
  const day2024=getCycleDay2024();
  const maxDays=Math.max(730,day2024+30);

  // Escala Y: multiplicadores 0.5 → máximo (~35)
  const allMults=[...CYCLE_DATA.c2016.points,...CYCLE_DATA.c2020.points].map(p=>p[1]);
  const yMax=Math.min(35,Math.max(...allMults)*1.1);
  const yMin=0.5;

  const tx=d=>PX+(d/maxDays)*cw;
  const ty=m=>PY+ch-(((m-yMin)/(yMax-yMin))*ch);

  // Líneas de cuadrícula
  let grid='';
  [1,2,5,10,15,20,30].forEach(m=>{
    if(m>yMax)return;
    const y=ty(m);
    grid+=`<line x1="${PX}" y1="${y}" x2="${W}" y2="${y}" stroke="#334155" stroke-width="0.5" stroke-dasharray="4 3"/>`;
    grid+=`<text x="${PX-4}" y="${y+4}" font-size="8" fill="#64748b" text-anchor="end">${m}x</text>`;
  });
  // Líneas verticales año
  [180,365,545,730].forEach(d=>{
    const x=tx(d);
    grid+=`<line x1="${x}" y1="${PY}" x2="${x}" y2="${H-PB}" stroke="#334155" stroke-width="0.5" stroke-dasharray="3 3"/>`;
    grid+=`<text x="${x}" y="${H-PB+12}" font-size="7" fill="#475569" text-anchor="middle">${d===180?'6m':d===365?'1a':d===545?'18m':'2a'}</text>`;
  });

  function makePath(points,color,dash=''){
    const pts=points.map(([d,m])=>`${tx(d)},${ty(m)}`).join(' ');
    return `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" ${dash?'stroke-dasharray="'+dash+'"':''}/>`;
  }

  // Ciclo 2024 desde historial real
  let path2024='',dot2024='',currentMultEl='';
  const halvingPrice=S.halvingPrice2024||63800;
  if(S.cycleHistory&&S.cycleHistory.length>1){
    const pts2024=S.cycleHistory
      .filter(p=>p.day<=day2024)
      .map(p=>`${tx(p.day)},${ty(p.price/halvingPrice)}`).join(' ');
    if(pts2024) path2024=`<polyline points="${pts2024}" fill="none" stroke="#f97316" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
    const curMult=(S.price.usd/halvingPrice).toFixed(2);
    const cx2=tx(day2024),cy2=ty(S.price.usd/halvingPrice);
    dot2024=`<circle cx="${cx2}" cy="${cy2}" r="4" fill="#f97316" stroke="#0f172a" stroke-width="1.5"/>`;
    currentMultEl=`<text x="${Math.min(cx2+6,W-30)}" y="${Math.max(cy2-6,14)}" font-size="9" fill="#f97316" font-weight="bold">${curMult}x</text>`;
  } else {
    // Sin historial: usar punto actual
    const curMult=S.price.usd/halvingPrice;
    const cx2=tx(day2024),cy2=ty(curMult);
    dot2024=`<circle cx="${cx2}" cy="${cy2}" r="5" fill="#f97316" stroke="#0f172a" stroke-width="2"/>`;
    path2024=`<line x1="${tx(0)}" y1="${ty(1)}" x2="${cx2}" y2="${cy2}" stroke="#f97316" stroke-width="2" stroke-dasharray="5 3"/>`;
    currentMultEl=`<text x="${Math.min(cx2+7,W-30)}" y="${Math.max(cy2-7,14)}" font-size="9" fill="#f97316" font-weight="bold">${curMult.toFixed(2)}x</text>`;
  }

  // Línea de referencia halving (día 0 = 1x)
  grid+=`<line x1="${PX}" y1="${ty(1)}" x2="${W}" y2="${ty(1)}" stroke="#f97316" stroke-width="0.8" stroke-dasharray="6 3" opacity="0.4"/>`;

  // Línea vertical día actual ciclo 2024
  const todayX=tx(day2024);
  grid+=`<line x1="${todayX}" y1="${PY}" x2="${todayX}" y2="${H-PB}" stroke="#f97316" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>`;
  grid+=`<text x="${Math.min(todayX+3,W-50)}" y="${PY+9}" font-size="8" fill="#f97316" opacity="0.8">Hoy (día ${day2024})</text>`;

  const svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:200px;overflow:visible" preserveAspectRatio="none">
    <rect x="${PX}" y="${PY}" width="${cw}" height="${ch}" fill="#0f172a" rx="4"/>
    ${grid}
    ${makePath(CYCLE_DATA.c2016.points,'#818cf8')}
    ${makePath(CYCLE_DATA.c2020.points,'#10b981')}
    ${path2024}
    ${dot2024}
    ${currentMultEl}
  </svg>`;
  return svg;
}

function renderCycles(){
  const tr=t();
  const day=getCycleDay2024();
  const halvingPrice=S.halvingPrice2024||63800;
  const currentMult=(S.price.usd/halvingPrice);

  // Día equivalente en ciclos anteriores
  const get2016mult=d=>{const pts=CYCLE_DATA.c2016.points;for(let i=0;i<pts.length-1;i++){if(d>=pts[i][0]&&d<=pts[i+1][0]){const t=(d-pts[i][0])/(pts[i+1][0]-pts[i][0]);return pts[i][1]+(pts[i+1][1]-pts[i][1])*t;}}return null;};
  const get2020mult=d=>{const pts=CYCLE_DATA.c2020.points;for(let i=0;i<pts.length-1;i++){if(d>=pts[i][0]&&d<=pts[i+1][0]){const t=(d-pts[i][0])/(pts[i+1][0]-pts[i][0]);return pts[i][1]+(pts[i+1][1]-pts[i][1])*t;}}return null;};

  const mult2016=get2016mult(day);
  const mult2020=get2020mult(day);

  // Precio proyectado si siguiera ciclos anteriores
  const proj16=mult2016?Math.round(halvingPrice*mult2016):null;
  const proj20=mult2020?Math.round(halvingPrice*mult2020):null;

  // ATH proyectado para ciclo 2024 (promedio ponderado 2016/2020 con decremento ~45%)
  const athMult2016=32, athMult2020=14;
  const projATHMult=(athMult2016*0.3+athMult2020*0.7)*0.6; // decrecimiento de ciclo
  const projATH=Math.round(halvingPrice*projATHMult);
  const projATHDay=Math.round((549*0.4+525*0.6)); // ~día 535 aprox

  const daysToATH=projATHDay-day;
  const dateATH=new Date(new Date('2024-04-20').getTime()+(projATHDay*86400000));

  // Comparativa en día actual
  const compCards=[
    {label:'2016 ('+tr.cyclesDayLabel+' '+day+')',val:proj16?'$'+proj16.toLocaleString():'—',mult:mult2016?mult2016.toFixed(1)+'x':'—',color:'#818cf8'},
    {label:'2020 ('+tr.cyclesDayLabel+' '+day+')',val:proj20?'$'+proj20.toLocaleString():'—',mult:mult2020?mult2020.toFixed(1)+'x':'—',color:'#10b981'},
    {label:tr.cyclesCurrent,val:'$'+S.price.usd.toLocaleString(),mult:currentMult.toFixed(2)+'x',color:'#f97316'},
  ].map(r=>`
    <div style="background:#1e293b;border-radius:10px;padding:12px;border-left:3px solid ${r.color}">

      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:15px;font-weight:700;color:${r.color}">${r.val}</div>
        <div style="font-size:20px;font-weight:800;color:${r.color};opacity:.8">${r.mult}</div>
      </div>
    </div>`).join('');

  // Posición del ciclo actual vs histórico
  let posLabel='', posColor='', posIcon='';
  if(mult2020&&currentMult>mult2020*1.2){posLabel=tr.cyclesAbove20;posColor='#10b981';posIcon='🚀';}
  else if(mult2020&&currentMult>mult2020*0.9){posLabel=tr.cyclesInLine20;posColor='#eab308';posIcon='📊';}
  else if(mult2020&&currentMult>mult2020*0.6){posLabel=tr.cyclesBelow20;posColor='#f97316';posIcon='📉';}
  else{posLabel=tr.cyclesFarBelow;posColor='#ef4444';posIcon='⚠️';}

  // Datos técnicos
  const halvingDate='20 Abr 2024';
  const halvingPriceStr='$'+halvingPrice.toLocaleString();

  return `<div class="space-y">
  <div class="card">
    <div style="font-size:15px;font-weight:700;margin-bottom:4px">🔄 ${tr.cyclesTitle}</div>
    <div style="font-size:11px;color:#64748b;margin-bottom:14px">${tr.cyclesSubtitle}</div>
    ${renderCyclesChart()}
    <div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:5px"><div style="width:16px;height:3px;background:#818cf8;border-radius:2px"></div><span style="font-size:10px;color:#94a3b8">2016–2017</span></div>
      <div style="display:flex;align-items:center;gap:5px"><div style="width:16px;height:3px;background:#10b981;border-radius:2px"></div><span style="font-size:10px;color:#94a3b8">2020–2021</span></div>
      <div style="display:flex;align-items:center;gap:5px"><div style="width:16px;height:3px;background:#f97316;border-radius:2px"></div><span style="font-size:10px;color:#94a3b8">2024 (actual)</span></div>
    </div>
  </div>

  <div class="card">
    <div style="font-size:14px;font-weight:700;margin-bottom:10px">📍 ${tr.cyclesPosition}</div>
    <div style="background:#1e293b;border-radius:10px;padding:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:12px;color:#64748b">${tr.cyclesDayLabel}</div>
        <div style="font-size:26px;font-weight:800;color:#f97316">${day}</div>
        <div style="font-size:10px;color:#64748b">${tr.cyclesSinceHalving} ${halvingDate}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:12px;color:#64748b">${tr.cyclesMultLabel}</div>
        <div style="font-size:26px;font-weight:800;color:#f97316">${currentMult.toFixed(2)}x</div>
        <div style="font-size:10px;color:#64748b">${tr.cyclesHalvingPrice} ${halvingPriceStr}</div>
      </div>
    </div>
    <div style="background:#263045;border-radius:10px;padding:10px;text-align:center">
      <div style="font-size:18px">${posIcon}</div>
      <div style="font-size:12px;font-weight:700;color:${posColor};margin-top:2px">${posLabel}</div>
    </div>
  </div>

  <div class="card">
    <div style="font-size:14px;font-weight:700;margin-bottom:10px">📊 ${tr.cyclesDayOf} ${day} ${tr.cyclesEachCycle}</div>
    <div style="display:flex;flex-direction:column;gap:8px">${compCards}</div>
  </div>

  <div class="card">
    <div style="font-size:14px;font-weight:700;margin-bottom:10px">🎯 ${tr.cyclesAthTitle}</div>
    <div style="background:#1e293b;border-radius:10px;padding:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:11px;color:#94a3b8">${tr.cyclesAthModel}</span>
        <span style="font-size:14px;font-weight:700;color:#eab308">$${projATH.toLocaleString()}</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:11px;color:#94a3b8">${tr.cyclesAthMult}</span>
        <span style="font-size:13px;font-weight:700;color:#eab308">${projATHMult.toFixed(1)}x</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:11px;color:#94a3b8">${tr.cyclesAthDate}</span>
        <span style="font-size:12px;font-weight:600;color:#94a3b8">${dateATH.toLocaleDateString(S.lang==='ca'?'ca-ES':'es-ES',{month:'long',year:'numeric'})}</span>
      </div>
      <div style="display:flex;justify-content:space-between">
        <span style="font-size:11px;color:#94a3b8">${tr.cyclesAthDays}</span>
        <span style="font-size:13px;font-weight:700;color:${daysToATH>0?'#10b981':'#ef4444'}">${daysToATH>0?'~'+daysToATH+(S.lang==='ca'?' dies':' días'):tr.cyclesAthPassed}</span>
      </div>
    </div>
    <div style="font-size:10px;color:#475569;margin-top:8px">${tr.cyclesDisclaimer}</div>
  </div>
</div>`;
}

function _updateTabFade(){
  const nav=document.getElementById('tabbar');
  const fade=document.getElementById('tab-scroll-fade');
  if(!nav||!fade)return;
  const canScroll=nav.scrollWidth>nav.clientWidth+4;
  const atEnd=nav.scrollLeft+nav.clientWidth>=nav.scrollWidth-4;
  fade.style.opacity=(canScroll&&!atEnd)?'1':'0';
}

// ─── WebSocket precio en tiempo real ─────────────────────────────────────────
let _ws=null, _wsRetries=0;
function startPriceWS(){
  if(_ws&&(_ws.readyState===0||_ws.readyState===1))return; // ya conectado
  try{
    _ws=new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@miniTicker');
    _ws.onopen=()=>{_wsRetries=0;console.log('[WS] Conectado');
      // Indicador visual
      const d=document.getElementById('ws-dot');if(d){d.style.background='#10b981';d.title='Precio en tiempo real';}
    };
    _ws.onmessage=(e)=>{
      try{
        const t=JSON.parse(e.data);
        const newPrice=parseFloat(t.c);
        if(!newPrice||newPrice<=0)return;
        const prev=S.price.usd;
        S.price.usd=newPrice;
        // Actualizar cambio 24h desde apertura
        if(t.o&&parseFloat(t.o)>0){
          S.change24h=((newPrice-parseFloat(t.o))/parseFloat(t.o))*100;
        }
        // Flash verde/rojo en header
        const hp=document.getElementById('header-price');
        const arrow=document.getElementById('header-arrow');
        if(hp&&prev>0&&prev!==newPrice){
          const up=newPrice>prev;
          const col=up?'#10b981':'#ef4444';
          hp.style.transition='color .4s';
          hp.style.color=col;
          // Animació flash de fons
          hp.style.textShadow=`0 0 12px ${col}88`;
          setTimeout(()=>{hp.style.color='';hp.style.textShadow='';},700);
          // Fletxa direccional
          if(arrow){
            arrow.textContent=up?'▲':'▼';
            arrow.style.color=col;
            arrow.style.opacity='1';
            arrow.style.transform=up?'translateY(-2px)':'translateY(2px)';
            setTimeout(()=>{arrow.style.opacity='0.5';arrow.style.transform='none';},700);
          }
        }
        S.dataAge.price=Date.now(); // Mejora 7: timestamp de último dato
        updateHeader();
        // Actualizar conversor si tab activo
        if(S.currentTab==='home'){
          const el=document.getElementById('tab-home');
          if(el){
            // Solo actualizar los valores del conversor y stats, no redibujar el gráfico
            const upd=new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
            const updEl=document.querySelector('.stat-val[data-upd]');
            if(updEl)updEl.textContent=upd;
          }
        }
      }catch{}
    };
    _ws.onerror=()=>{};
    _ws.onclose=()=>{
      const d=document.getElementById('ws-dot');if(d){d.style.background='#ef4444';d.title='Reconectando...';}
      _wsRetries++;
      const delay=Math.min(30000,1000*Math.pow(2,_wsRetries))+Math.floor(Math.random()*500); // backoff exponencial con jitter
      setTimeout(startPriceWS,delay);
    };
  }catch(e){console.warn('[WS]',e);}
}

function renderTab(tab){
  const el=document.getElementById('tab-'+tab);if(!el)return;
  // Skeleton map — mostra mentre carrega
  const skeletonMap={home:skeletonHome,analysis:skeletonAnalysis,market:skeletonMarket,mempool:skeletonGeneric,news:skeletonGeneric,corr:skeletonGeneric,global:skeletonGeneric,forecast:skeletonGeneric,cycles:skeletonGeneric};
  const map={home:renderHome,analysis:renderAnalysis,market:renderMarket,mempool:renderMempool,atm:renderATM,news:renderNews,alerts:renderAlerts,corr:renderCorr,global:renderGlobal,forecast:renderForecast,cycles:renderCycles,dca:renderDCA};const afterRender={'dca':()=>setTimeout(calcDCA,50)};
  // El tab ATM no se re-renderiza si el mapa ya está activo — evita destruir Leaflet
  if(tab==='atm'&&S.leafletMap){
    return;
  }
  if(map[tab]){
    // Mostrar skeleton si la tab no té dades encara
    const needsSkeleton=(tab==='home'&&S.price.usd===0)||(tab==='analysis'&&!S.historyTA?.length)||(tab==='market'&&!S.marketData)||(tab==='mempool'&&!S.mempool)||(tab==='news'&&!S.news.length)||(tab==='cycles'&&!S.cycleHistory);
    if(needsSkeleton&&skeletonMap[tab]){
      el.innerHTML=skeletonMap[tab]();
      // Tornar a renderitzar quan les dades arribin
      const waitAndRender=()=>{
        const stillNeeds=(tab==='home'&&S.price.usd===0)||(tab==='analysis'&&!S.historyTA?.length)||(tab==='market'&&!S.marketData)||(tab==='mempool'&&!S.mempool)||(tab==='news'&&!S.news.length)||(tab==='cycles'&&!S.cycleHistory);
        if(!stillNeeds||S.currentTab!==tab)return;
        setTimeout(waitAndRender,400);
      };
      setTimeout(()=>{if(S.currentTab===tab)try{el.innerHTML=map[tab]();}catch(e){el.innerHTML=skeletonMap[tab]();}},400);

function calcConv(f,raw){
  const v=parseFloat(raw),ok=!isNaN(v)&&v>=0,pU=S.price.usd,pE=S.price.eur;
  if(!ok){['btc','sats','usd','eur'].filter(x=>x!==f).forEach(x=>{const e=document.getElementById('inp-'+x);if(e)e.value='';});return;}
  let btc=S.conv_btc||1,sats=S.conv_sats||1e8,usd=S.conv_usd||0,eur=S.conv_eur||0;
  if(f==='btc'){btc=v;sats=(v*1e8).toFixed(0);usd=(v*pU).toFixed(2);eur=(v*pE).toFixed(2);}
  else if(f==='sats'){const b=v/1e8;btc=b.toFixed(8).replace(/\.?0+$/,'');sats=v;usd=(b*pU).toFixed(2);eur=(b*pE).toFixed(2);}
  else if(f==='usd'&&pU){const b=v/pU;btc=b.toFixed(8);sats=(b*1e8).toFixed(0);usd=v;eur=(b*pE).toFixed(2);}
  else if(f==='eur'&&pE){const b=v/pE;btc=b.toFixed(8);sats=(b*1e8).toFixed(0);usd=(b*pU).toFixed(2);eur=v;}
  S.conv_btc=btc;S.conv_sats=sats;S.conv_usd=usd;S.conv_eur=eur;
  ['btc','sats','usd','eur'].filter(x=>x!==f).forEach(x=>setI(x,S['conv_'+x]));
}

function showIndTooltip(btn, text){
  let tt=document.getElementById('ind-tt');
  if(!tt){tt=document.createElement('div');tt.id='ind-tt';document.body.appendChild(tt);}
  tt.textContent=text;
  tt.style.display='block';
  const r=btn.getBoundingClientRect();
  const left=Math.min(window.innerWidth-270,Math.max(8,r.left));
  const top=r.bottom+6;
  tt.style.left=left+'px';
  tt.style.top=(top+window.scrollY)+'px';
  tt.style.position='fixed';
  tt.style.top=top+'px';
  const hide=(e)=>{if(!tt.contains(e.target)&&e.target!==btn){tt.style.display='none';document.removeEventListener('click',hide);}};
  setTimeout(()=>document.addEventListener('click',hide),50);
}
function calcRainbow(price){
  const tr=t();
  const genesis=new Date('2009-01-03').getTime();
  const days=(Date.now()-genesis)/(1000*60*60*24);
  const log10Days=Math.log10(days); // IMPORTANTE: log10, no logaritmo natural
  const a=5.84,b=-17.01;
  const center=Math.pow(10,a*log10Days+b);
  const step=0.38;
  const bands=[
    {label:tr.rb_maxSell,color:'#ef4444',mult:Math.pow(10,step*4)},
    {label:tr.rb_veryCostly,color:'#f97316',mult:Math.pow(10,step*3)},
    {label:tr.rb_fomo,color:'#fb923c',mult:Math.pow(10,step*2)},
    {label:tr.rb_costly,color:'#eab308',mult:Math.pow(10,step*1)},
    {label:tr.rb_fair,color:'#84cc16',mult:1},
    {label:tr.rb_cheap,color:'#22c55e',mult:Math.pow(10,-step*1)},
    {label:tr.rb_accum,color:'#10b981',mult:Math.pow(10,-step*2)},
    {label:tr.rb_histOffer,color:'#06b6d4',mult:Math.pow(10,-step*3)},
    {label:tr.rb_maxBuy,color:'#3b82f6',mult:Math.pow(10,-step*4)},
  ];
  const priceBands=bands.map(b=>({...b,price:center*b.mult}));
  let currentBand=priceBands[priceBands.length-1];
  for(let i=0;i<priceBands.length-1;i++){
    if(price>=priceBands[i].price){currentBand=priceBands[i];break;}
  }
  return{bands:priceBands,currentBand,center};
}
function analyzeSentiment(title){

  const bear=['baja','caída','cae','mínimo','pierde','pérdida','bear','rojo','colapso','crash','crisis','prohibe','vende','hackeo','robo','fraude','multa','investigación','prohibición','negativo','desplome','hunde','riesgo','problema'];
  let score=0;
  bull.forEach(w=>{if(t.includes(w))score++;});
  bear.forEach(w=>{if(t.includes(w))score--;});

}

async function loadATM(){
  const st=document.getElementById('atm-status');
  if(!st)return;
  const tr=t();
  st.innerHTML=`<div style="font-size:13px;color:var(--text3)"><span class="spin">📍</span> ${tr.atmLocation}</div>`;
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:15000,enableHighAccuracy:false}));
    const{latitude:lat,longitude:lng}=pos.coords;
    st.innerHTML=`<div style="font-size:13px;color:var(--text3)"><span class="spin">🔍</span> ${tr.atmSearching}</div>`;

    // Destruir mapa anterior si existe
    if(S.leafletMap){S.leafletMap.remove();S.leafletMap=null;}

    // Mostrar contenedor ANTES de crear el mapa
    const mapWrapper=document.getElementById('map-wrapper');
    const mapDiv=document.getElementById('map-container');
    if(!mapDiv||!mapWrapper)return;
    mapWrapper.style.display='block';
    mapDiv.style.width='100%';
    mapDiv.style.height='100%';
    mapDiv.innerHTML=''; // limpiar cualquier mapa zombie

    // Esperar dos frames para que el DOM pinte el contenedor con sus dimensiones reales
    await new Promise(r=>setTimeout(r,50));
    await new Promise(r=>requestAnimationFrame(r));
    await new Promise(r=>requestAnimationFrame(r));

    // Crear mapa fresco
    S.leafletMap=L.map(mapDiv,{
      zoomControl:true,
      attributionControl:true,
      preferCanvas:true  // más rendimiento en móvil
    }).setView([lat,lng],13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>',
      maxZoom:19,
      keepBuffer:4
    }).addTo(S.leafletMap);

    // Forzar que el mapa sepa su tamaño real
    S.leafletMap.invalidateSize({animate:false});

    const uIcon=L.divIcon({html:`<div style="background:#f97316;width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.5)"></div>`,iconSize:[16,16],iconAnchor:[8,8],className:''});
    L.marker([lat,lng],{icon:uIcon}).addTo(S.leafletMap).bindPopup('<b>'+tr.myLocation+'</b>').openPopup();
    let atms=[];
    try{
      const delta=0.5;
      const url='https://api.btcmap.org/v2/elements?lat='+(lat-delta).toFixed(4)+'&lon='+(lng-delta).toFixed(4)+'&lat2='+(lat+delta).toFixed(4)+'&lon2='+(lng+delta).toFixed(4);
      const r=await fetch(url,{signal:AbortSignal.timeout(12000)});
      if(r.ok){
        const j=await r.json();
        const items=Array.isArray(j)?j:(j?.elements||j?.data||[]);
        console.log('BTCMap raw count:',items.length);
        atms=items.filter(e=>{
          const tags=e.osm_json?.tags||e.tags||{};
          return tags['payment:bitcoin']==='yes'||tags['payment:lightning']==='yes'||
                 tags['currency:XBT']==='yes'||tags['bitcoin']==='yes'||
                 tags['payment:onchain']==='yes'||tags['payment:lightning_contactless']==='yes';
        }).slice(0,100).map(e=>{
          const tags=e.osm_json?.tags||e.tags||{};
          const osm=e.osm_json||e;
          const elat=osm.lat??osm.center?.lat??null;
          const elng=osm.lon??osm.center?.lon??null;
          const amenity=tags.amenity||'';
          let type=amenity==='atm'?'🏧 ATM':amenity==='bank'?'🏦 Banco':'🏪 Comercio';
          return{lat:elat,lng:elng,name:tags.name||tags.operator||'Punto Bitcoin',op:tags.operator||tags.brand||'',type,lightning:tags['payment:lightning']==='yes'};
        }).filter(e=>e.lat!=null&&e.lng!=null);
        console.log('BTCMap filtered:',atms.length);
      }
    }catch(err){console.warn('BTCMap:',err);}
    if(atms.length===0){
      try{
        const q='[out:json][timeout:15];(node["payment:bitcoin"="yes"]('+( lat-0.5).toFixed(4)+','+(lng-0.5).toFixed(4)+','+(lat+0.5).toFixed(4)+','+(lng+0.5).toFixed(4)+');node["currency:XBT"="yes"]('+( lat-0.5).toFixed(4)+','+(lng-0.5).toFixed(4)+','+(lat+0.5).toFixed(4)+','+(lng+0.5).toFixed(4)+'););out body;';
        const r2=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:q,signal:AbortSignal.timeout(15000)});
        if(r2.ok){
          const j2=await r2.json();
          atms=(j2.elements||[]).map(e=>({lat:e.lat,lng:e.lon,name:e.tags?.name||e.tags?.operator||'Punto Bitcoin',op:e.tags?.operator||'',type:e.tags?.amenity==='atm'?'🏧 ATM':'🏪 Comercio',lightning:e.tags?.['payment:lightning']==='yes'})).filter(e=>e.lat&&e.lng);
          console.log('Overpass results:',atms.length);
        }
      }catch(err2){console.warn('Overpass:',err2);}
    }
    // Guardar datos para filtros (Mejora 13)
    S.atmData=atms;
    S.atmMarkers=[];
    atms.forEach(a=>{
      const bg=a.type.includes('ATM')?'#f97316':a.type.includes('Banco')?'#3b82f6':'#10b981';
      const shape=a.type.includes('ATM')?'3px':'50%';
      const aIcon=L.divIcon({html:'<div style="background:'+bg+';width:14px;height:14px;border-radius:'+shape+';border:2px solid white;box-shadow:0 2px 5px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;color:white;font-size:8px;font-weight:700">₿</div>',iconSize:[14,14],iconAnchor:[7,7],className:''});
      if(S.leafletMap){
        const mk=L.marker([a.lat,a.lng],{icon:aIcon})
          .addTo(S.leafletMap)
          .bindPopup('<b>'+a.name+'</b><br><small>'+a.type+(a.op?' · '+a.op:'')+'</small>'+(a.lightning?'<br><small style="color:#f97316">⚡ Lightning</small>':''));
        S.atmMarkers.push({marker:mk,data:a});
      }
    });
    // Forzar re-render del mapa después de añadir todos los marcadores
    setTimeout(()=>{
      if(S.leafletMap){
        S.leafletMap.invalidateSize({animate:false});
        // Ajustar vista para mostrar todos los marcadores si los hay
        if(atms.length>0){
          try{
            const group=L.featureGroup(
              atms.slice(0,50).map(a=>L.marker([a.lat,a.lng]))
            );
            const bounds=group.getBounds().pad(0.1);
            S.leafletMap.fitBounds(bounds,{maxZoom:14});
          }catch{}
        }
      }
    },400);
    const cnt=document.getElementById('atm-count');
    if(cnt){cnt.textContent=atms.length>0?`✅ ${atms.length} ${tr.atmFound}`:'ℹ️ '+tr.atmNone;cnt.style.display='block';}
    const tip=document.getElementById('atm-tip');if(tip)tip.style.display='block';
    st.style.display='none';
    S.atmLoaded=true;
    const card=st.closest('.card');
    if(card&&!card.querySelector('.btn-ghost')){
      const btn=document.createElement('button');
      btn.className='btn-ghost';btn.style.cssText='width:100%;margin-top:8px';
      btn.textContent=tr.atmRefresh;btn.onclick=reloadATM;
      card.appendChild(btn);
    }
  }catch(e){
    const msg=e.code===1?tr.atmErrPerm:e.name==='TimeoutError'?tr.atmErrTimeout:tr.atmErrMap;
    if(st)st.innerHTML=`<div style="color:#ef4444;font-size:13px;margin-bottom:14px;line-height:1.5">${msg}</div><button class="btn-orange" onclick="loadATM()">${tr.atmRetry}</button>`;
  }
}
// Mejora 13: filtrar marcadores ATM por tipo
function filterATM(type){
  S.atmFilter=type;
  // Actualizar clases activas en los pills
  document.querySelectorAll('#tab-atm .atm-pill').forEach(btn=>{
    const t=btn.getAttribute('onclick')||'';
    btn.classList.toggle('active', t.includes("'"+type+"'"));
  });
  if(!S.leafletMap||!S.atmMarkers.length)return;
  // Mostrar u ocultar marcadores según tipo
  S.atmMarkers.forEach(({marker,data})=>{
    const isAtm=data.type.includes('ATM');
    const show=type==='all'||(type==='atm'&&isAtm)||(type==='shop'&&!isAtm);
    if(show){if(!S.leafletMap.hasLayer(marker))marker.addTo(S.leafletMap);}

async function fetchCorr(){
  S.corrError=null;
  const days=parseInt(S.corrPeriod)||30;
  const limit=days<=30?35:days<=90?95:370;
  const range=days<=30?'1mo':days<=90?'3mo':'1y';

  // 1. BTC de Binance (sempre funciona)
  let btcPrices=[];
  try{
    const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=${limit}`);
    const j=await r.json();
    btcPrices=j.map(k=>parseFloat(k[4]));
  }catch(e){console.warn('BTC klines:',e);}

  // 2. OR via PAXG/USDT de Binance (or tokenitzat, 24/7, sense CORS, fiable)
  let paxgPrices=[];
  if(S.corrLoadMsg!==undefined) S.corrLoadMsg='Obtenint Or via PAXG/Binance...';
  try{
    const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=1d&limit=${limit}`);
    const j=await r.json();
    if(Array.isArray(j)&&j.length>=5) paxgPrices=j.map(k=>parseFloat(k[4]));
  }catch(e){console.warn('PAXG klines:',e);}

  // 3. MSTR via Binance (MSTR ETF/token — usa proxy Yahoo com a fallback)
  const mstrUrl=`https://query1.finance.yahoo.com/v8/finance/chart/MSTR?interval=1d&range=${range}`;
  const spyUrl=`https://query1.finance.yahoo.com/v8/finance/chart/SPY?interval=1d&range=${range}`;
  const spyUrl2=`https://query2.finance.yahoo.com/v8/finance/chart/SPY?interval=1d&range=${range}`;

  // Proxies CORS per S&P500 — provats per ordre de fiabilitat
  const proxies=[
    url=>`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url=>`https://corsproxy.io/?${encodeURIComponent(url)}`,
    url=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
    url=>`https://thingproxy.freeboard.io/fetch/${encodeURIComponent(url)}`,
    url=>`https://proxy.cors.sh/${url}`,
    url=>`https://cors-anywhere.herokuapp.com/${url}`,
  ];

  async function fetchYahoo(url){
    // Llançar TOTS els proxies en paral·lel — guanya el primer que respongui
    const attempts=[
      fetch(url,{signal:AbortSignal.timeout(5000)}),
      fetch(url.replace('query1','query2'),{signal:AbortSignal.timeout(5000)}),
      ...proxies.map(p=>fetch(p(url),{signal:AbortSignal.timeout(6000)}))
    ].map(p=>p.then(async r=>{
      if(!r.ok) throw new Error('not ok');
      const j=await r.json();
      const prices=(j.chart?.result?.[0]?.indicators?.quote?.[0]?.close||[]).filter(v=>v!=null&&v>0);
      if(prices.length<5) throw new Error('no data');
      return prices;
    }));
    try{return await Promise.any(attempts);}catch{return[];}
  }

  // Stooq — paral·lel amb timeout global de 8s
  async function fetchStooq(symbol, nDays){
    const alts={'spx.us':['^spx','spy.us'],'xauusd':['^xau','xau.us']};
    const symbols=[symbol,...(alts[symbol]||[])];
    const to=new Date();
    const from=new Date(Date.now()-nDays*86400000*1.6);
    const fmt=d=>`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    const attempts=[];
    for(const s of symbols){
      const baseUrl=`https://stooq.com/q/d/l/?s=${encodeURIComponent(s)}&d1=${fmt(from)}&d2=${fmt(to)}&i=d`;
      // directe + primers 2 proxies en paral·lel
      for(const url of [baseUrl, proxies[0](baseUrl), proxies[1](baseUrl)]){
        attempts.push(fetch(url,{signal:AbortSignal.timeout(6000)}).then(async r=>{
          if(!r.ok) throw new Error('not ok');
          const txt=await r.text();
          if(txt.includes('No data')||txt.trim().length<20) throw new Error('no data');
          const rows=txt.trim().split('\n').slice(1);
          const prices=rows.map(row=>{const cols=row.split(',');return parseFloat(cols[4]||cols[1]);}).filter(v=>!isNaN(v)&&v>0);
          if(prices.length<5) throw new Error('insufficient');
          return prices;
        }));
      }
    }
    try{return await Promise.any(attempts);}catch{return[];}
  }

  // Executar en paral·lel: S&P500 per múltiples fonts
  const [spyYahoo, spyStooq, mstrPrices] = await Promise.all([
    fetchYahoo(spyUrl),
    fetchStooq('spx.us', days),
    fetchYahoo(mstrUrl),
  ]);

  const finalSpy = spyYahoo.length >= spyStooq.length ? spyYahoo : spyStooq;
  // Or: PAXG (Binance) és la font primària, GLD/Stooq de backup
  const [gldYahoo, goldStooq] = paxgPrices.length>=5 ? [[],[] ] : await Promise.all([
    fetchYahoo(`https://query1.finance.yahoo.com/v8/finance/chart/GLD?interval=1d&range=${range}`),
    fetchStooq('xauusd', days),
  ]);
  const finalGold = paxgPrices.length>=5 ? paxgPrices
    : gldYahoo.length>=goldStooq.length ? gldYahoo : goldStooq;
  const goldSource = paxgPrices.length>=5 ? 'PAXG/Binance' : 'GLD/Yahoo';

  if(!finalSpy.length || !finalGold.length){
    // Intentar caché localStorage
    try{
      const cached=localStorage.getItem('sf-corrData');
      if(cached){
        const parsed=JSON.parse(cached);
        S.corrData=parsed.data;
        S.corrError=null;
        S.corrCached=parsed.savedAt;
        renderTab('corr');
        return;
      }
    }catch{}
    S.corrData=null;
    S.corrCached=null;
    const spxFail=!finalSpy.length, goldFail=!finalGold.length;
    S.corrError=(spxFail&&goldFail?'S&P500 i Or':spxFail?'S&P500':'Or')+': no s\'han pogut carregar dades. Totes les fonts estan no disponibles.';
    renderTab('corr');
    return;
  }

  const normalize=arr=>{const base=arr[0]||1;return arr.map(v=>(v/base)*100);};
  const minLen=Math.min(btcPrices.length||999, finalSpy.length, finalGold.length, mstrPrices.length||999);
  const useMstr=mstrPrices.length>=5;
  if(minLen<5){S.corrData=null;S.corrError='Dades insuficients per calcular correlació.';renderTab('corr');return;}
  const btcN=normalize(btcPrices.slice(-minLen));
  const spyN=normalize(finalSpy.slice(-minLen));
  const goldN=normalize(finalGold.slice(-minLen));
  const mstrN=useMstr?normalize(mstrPrices.slice(-minLen)):null;
  const pearson=(a,b)=>{
    if(!a||!b||a.length<2||b.length<2)return 0;
    const n=Math.min(a.length,b.length);
    const an=a.slice(-n),bn=b.slice(-n);
    const ma=an.reduce((s,v)=>s+v,0)/n,mb=bn.reduce((s,v)=>s+v,0)/n;
    const num=an.reduce((s,v,i)=>s+(v-ma)*(bn[i]-mb),0);
    const da=Math.sqrt(an.reduce((s,v)=>s+(v-ma)**2,0));
    const db=Math.sqrt(bn.reduce((s,v)=>s+(v-mb)**2,0));
    return(da&&db)?num/(da*db):0;
  };
  const w=Math.min(14,minLen);
  const rollCorr=(a,b)=>{
    if(!a||!b)return[];
    return a.map((_,i)=>i<w-1?null:pearson(a.slice(i-w+1,i+1),b.slice(i-w+1,i+1)));
  };
  S.corrData={
    btc:btcN,spy:spyN,gold:goldN,mstr:mstrN,
    corrBtcSpy:pearson(btcN,spyN),
    corrBtcGold:pearson(btcN,goldN),
    corrBtcMstr:mstrN?pearson(btcN,mstrN):null,
    corrSpyGold:pearson(spyN,goldN),
    rollBtcSpy:rollCorr(btcN,spyN),
    rollBtcGold:rollCorr(btcN,goldN),
    rollBtcMstr:mstrN?rollCorr(btcN,mstrN):null,
    len:minLen,
    goldSource,
    mstrLastPrice:mstrPrices.length?mstrPrices[mstrPrices.length-1]:null,
    mstrChange:mstrPrices.length>=2?((mstrPrices[mstrPrices.length-1]-mstrPrices[0])/mstrPrices[0]*100):null
  };
  S.corrCached=null;
  try{
    localStorage.setItem('sf-corrData',JSON.stringify({
      data:S.corrData,
      savedAt:new Date().toLocaleDateString(S.lang==='ca'?'ca-ES':'es-ES',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})
    }));
  }catch{}
}

      const parts=geo.type==='Polygon'?[geo.coordinates]:geo.coordinates;
      return parts.map(rings=>rings.map((ring,ri)=>{
        const pts=ring.map(project);
        return pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')+'Z';
      }).join(' ')).join(' ');
    };
    const paths=countries.features.map(f=>'<path d="'+pathStr(f.geometry)+'" fill="#1e3a5f" stroke="#2d5a8e" stroke-width="0.4"/>').join('');
    const svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block" id="world-svg">'
      +'<rect width="'+W+'" height="'+H+'" fill="#0d1b2a"/>'
      +'<line x1="0" y1="125" x2="500" y2="125" stroke="#1a3a5c" stroke-width="0.5" stroke-dasharray="3 3"/>'
      +paths
      +'</svg>';
    svgDiv.innerHTML=svg;
    renderMapDots(W,H);
  }catch(e){
    console.warn('World map CDN failed, using static fallback',e);
    svgDiv.innerHTML=getStaticWorldSVG();
    renderMapDots(500,250);
  }

    const retailInterest=Math.min(100,Math.max(0,(fg*0.5)+(volatility*2)+(priceNorm>1.2?20:priceNorm>1.05?10:0)));
    OC.googleTrends={retailInterest:Math.round(retailInterest),volatility,fg,
      signal:retailInterest>80?'fomo_extreme':retailInterest>60?'fomo_high':retailInterest>40?'moderate':retailInterest>20?'low_interest':'accumulation_phase',

           retailInterest>20?'Bajo interés retail. Mercado en fase silenciosa.':
           'Interés retail mínimo — históricamente zona de acumulación de smart money.'};
  }catch(e){console.warn('GoogleTrends proxy',e);}

}
// ── MEJORA 3: Calcula el sesgo histórico del modelo comparando predicciones pasadas con precio real
async function updateForecastBias(){
  try{
    const log=JSON.parse(localStorage.getItem('sf-pricelog')||'{}');
    const preds=await loadPredictions();
    const now=Date.now();
    const errors=[];
    for(const p of preds){
      if(!p.week||!p.price||!p.ts)continue;
      if(now<p.ts+6*86400000)continue; // horizonte semanal aún no ha vencido
      const targetDate=new Date(p.ts+7*86400000).toISOString().slice(0,10);
      const realPrice=log[targetDate]||getPriceAtDate(targetDate);
      if(!realPrice||realPrice<=0)continue;
      const basePx=p.week.base||p.price;
      if(basePx>0)errors.push((realPrice-basePx)/basePx); // error relativo
    }
    if(errors.length>=3){
      const recent=errors.slice(0,Math.min(10,errors.length));
      const avgErr=recent.reduce((a,b)=>a+b,0)/recent.length;
      S.forecastBias=Math.max(-0.15,Math.min(0.15,avgErr)); // máx ±15% de corrección
      console.log('[SatsFlow] Forecast bias calculado:',S.forecastBias.toFixed(3),'(n='+recent.length+')');
    }else{
      S.forecastBias=0;
    }
  }catch(e){console.warn('updateForecastBias:',e);S.forecastBias=0;}
}

  // ── MEJORA 1: Volatilidad realizada dinámica (vs. valores fijos)

  let realVol=0.65; // fallback: ~65% anualizado (media histórica BTC)

function renderForecastRangeBar(cur, bearP, baseP, bullP){
  const rMin=Math.min(cur,bearP)*0.975;
  const rMax=Math.max(cur,bullP)*1.025;
  const span=rMax-rMin;
  if(span<=0)return'';
  const pct=p=>Math.round(Math.max(1,Math.min(99,(p-rMin)/span*100)));
  const bearX=pct(bearP), baseX=pct(baseP), bullX=pct(bullP), curX=pct(cur);
  const fmt=p=>'$'+(p>=1000?(p/1000).toFixed(0)+'K':p.toFixed(0));
  return '<div style="margin:10px 4px 6px;padding-top:8px">'
    +'<div style="font-size:9px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">📍 Precio en el rango proyectado</div>'
    +'<div style="position:relative;height:8px;background:linear-gradient(90deg,rgba(239,68,68,.25) 0%,rgba(234,179,8,.25) 50%,rgba(16,185,129,.25) 100%);border-radius:999px;margin-bottom:22px">'
    // Marcador Bear
    +'<div style="position:absolute;left:'+bearX+'%;top:-3px;transform:translateX(-50%);width:3px;height:14px;background:#ef4444;border-radius:2px"></div>'
    +'<div style="position:absolute;left:'+bearX+'%;top:17px;transform:translateX(-50%);font-size:8px;color:#ef4444;white-space:nowrap;font-weight:600">'+fmt(bearP)+'</div>'
    // Marcador Base
    +'<div style="position:absolute;left:'+baseX+'%;top:-3px;transform:translateX(-50%);width:3px;height:14px;background:#eab308;border-radius:2px"></div>'
    +'<div style="position:absolute;left:'+baseX+'%;top:17px;transform:translateX(-50%);font-size:8px;color:#eab308;white-space:nowrap;font-weight:600">'+fmt(baseP)+'</div>'
    // Marcador Bull
    +'<div style="position:absolute;left:'+bullX+'%;top:-3px;transform:translateX(-50%);width:3px;height:14px;background:#10b981;border-radius:2px"></div>'
    +'<div style="position:absolute;left:'+bullX+'%;top:17px;transform:translateX(-50%);font-size:8px;color:#10b981;white-space:nowrap;font-weight:600">'+fmt(bullP)+'</div>'
    // Marcador precio actual (círculo naranja)
    +'<div style="position:absolute;left:'+curX+'%;top:-5px;transform:translateX(-50%);width:18px;height:18px;border-radius:50%;background:#f97316;border:2px solid white;box-shadow:0 2px 8px rgba(249,115,22,.5);display:flex;align-items:center;justify-content:center">'
    +'<div style="width:5px;height:5px;border-radius:50%;background:white"></div></div>'
    +'<div style="position:absolute;left:'+curX+'%;top:-22px;transform:translateX(-50%);font-size:8px;font-weight:800;color:#f97316;white-space:nowrap">AHORA</div>'
    +'</div>'
    +'</div>';
}

function exportConfig(){
  const data={
    alerts:S.alerts,
    morningAlert:S.morningAlert,
    lang:S.lang,
    dark:S.dark,
    days:S.days,
    chartType:S.chartType,
    corrPeriod:S.corrPeriod,
    exported:new Date().toISOString()
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='satsflow-config-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
}
function importConfig(){
  const inp=document.createElement('input');
  inp.type='file';
  inp.accept='.json';
  inp.onchange=async e=>{
    const file=e.target.files[0];
    if(!file)return;
    try{
      const txt=await file.text();
      const data=JSON.parse(txt);
      if(data.alerts){S.alerts=data.alerts;saveAlerts();}
      if(data.morningAlert){S.morningAlert=data.morningAlert;localStorage.setItem('sf-morning',JSON.stringify(data.morningAlert));}
      if(data.lang){S.lang=data.lang;localStorage.setItem('sf-lang',data.lang);}
      if(data.dark!==undefined){S.dark=data.dark;localStorage.setItem('sf-theme',data.dark?'dark':'light');document.body.classList.toggle('light',!S.dark);}
      if(data.days){S.days=data.days;}
      if(data.chartType){S.chartType=data.chartType;}
      if(data.corrPeriod){S.corrPeriod=data.corrPeriod;}
      showToast(t().importOk);
      renderTab(S.currentTab);
    }catch(err){
      showToast(t().importErr);
    }
  };
  inp.click();
}
function showToast(msg){
  let t=document.getElementById('sf-toast');
  if(!t){t=document.createElement('div');t.id='sf-toast';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#f1f5f9;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;border:1px solid #334155;box-shadow:0 4px 20px rgba(0,0,0,.4);transition:opacity .4s';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._to);t._to=setTimeout(()=>{t.style.opacity='0';},2500);
}

function calcDCA(){
  const amount=parseFloat(document.getElementById('dca-amount')?.value)||100;
  const months=parseInt(document.getElementById('dca-months')?.value)||12;
  const startPrice=parseFloat(document.getElementById('dca-start')?.value)||50000;
  const currentPrice=S.price.eur||S.price.usd*0.92||65000;
  if(!amount||!months||!startPrice||!currentPrice)return;
  // Simular compra mensual amb preu lineal de startPrice a currentPrice
  let totalInvested=0,totalBTC=0;
  for(let i=0;i<months;i++){
    const monthPrice=startPrice+((currentPrice-startPrice)*(i/(Math.max(1,months-1))));
    const btcBought=amount/monthPrice;
    totalInvested+=amount;
    totalBTC+=btcBought;
  }
  const currentValue=totalBTC*currentPrice;
  const profit=currentValue-totalInvested;
  const profitPct=(profit/totalInvested)*100;
  const avgPrice=totalInvested/totalBTC;
  const el=document.getElementById('dca-result');
  if(!el)return;
  const tr=t();
  el.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div style="background:var(--bg);border-radius:12px;padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);margin-bottom:4px">${tr.dcaTotalInvested}</div>
        <div style="font-size:18px;font-weight:800;color:var(--text)">€${Math.round(totalInvested).toLocaleString()}</div>
      </div>
      <div style="background:var(--bg);border-radius:12px;padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);margin-bottom:4px">${tr.dcaBTCAccum}</div>
        <div style="font-size:18px;font-weight:800;color:#f97316">₿${totalBTC.toFixed(6)}</div>
      </div>
      <div style="background:var(--bg);border-radius:12px;padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);margin-bottom:4px">${tr.dcaCurrentVal}</div>
        <div style="font-size:18px;font-weight:800;color:#3b82f6">€${Math.round(currentValue).toLocaleString()}</div>
      </div>
      <div style="background:${profit>=0?'rgba(16,185,129,.1)':'rgba(239,68,68,.1)'};border:1px solid ${profit>=0?'rgba(16,185,129,.3)':'rgba(239,68,68,.3)'};border-radius:12px;padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);margin-bottom:4px">${tr.dcaProfitLoss}</div>
        <div style="font-size:18px;font-weight:800;color:${profit>=0?'#10b981':'#ef4444'}">${profit>=0?'+':''}€${Math.round(profit).toLocaleString()}</div>
        <div style="font-size:11px;color:${profit>=0?'#10b981':'#ef4444'}">${profitPct>=0?'+':''}${profitPct.toFixed(1)}%</div>
      </div>
    </div>
    <div style="background:var(--bg);border-radius:10px;padding:10px;font-size:11px;color:var(--text2)">
      ${tr.dcaAvgEntry}: <b style="color:var(--text)">€${Math.round(avgPrice).toLocaleString()}</b> ·
      ${tr.dcaCurrentPrice}: <b style="color:#f97316">€${Math.round(currentPrice).toLocaleString()}</b> ·
      ${tr.dcaDiff}: <b style="color:${currentPrice>=avgPrice?'#10b981':'#ef4444'}">${((currentPrice-avgPrice)/avgPrice*100).toFixed(1)}%</b>
    </div>
  `;
}

function chartHover(e){
  const wrap=document.getElementById('chart-wrap');
  const tip=document.getElementById('chart-tooltip');
  if(!wrap||!tip||!S.history.length)return;
  const rect=wrap.getBoundingClientRect();
  const x=e.clientX-rect.left;
  const pct=Math.max(0,Math.min(1,x/rect.width));
  const idx=Math.round(pct*(S.history.length-1));
  const pt=S.history[idx];
  if(!pt)return;
  const d=pt.date||'';
  const p='$'+Math.round(pt.price).toLocaleString();
  const h=pt.high?'↑$'+Math.round(pt.high).toLocaleString():'';
  const l=pt.low?'↓$'+Math.round(pt.low).toLocaleString():'';
  tip.innerHTML=`<span style="color:#94a3b8;font-size:10px">${d}</span><br>${p}${h?' <span style="color:#10b981">'+h+'</span>':''} ${l?'<span style="color:#ef4444">'+l+'</span>':''}`;
  // Posició: seguir cursor però no sortir de pantalla
  const tw=tip.offsetWidth||140;
  let left=e.clientX+12;
  if(left+tw>window.innerWidth-8)left=e.clientX-tw-12;
  tip.style.left=left+'px';
  tip.style.top=(e.clientY-36)+'px';
  tip.style.opacity='1';
  // Línia crosshair vertical al SVG
  const svg=wrap.querySelector('svg');
  if(svg){
    let line=svg.querySelector('#ch-line');
    if(!line){line=document.createElementNS('http://www.w3.org/2000/svg','line');line.id='ch-line';line.setAttribute('stroke','rgba(249,115,22,.6)');line.setAttribute('stroke-width','1');line.setAttribute('stroke-dasharray','4 3');svg.appendChild(line);}
    const svgRect=svg.getBoundingClientRect();
    const svgX=((e.clientX-svgRect.left)/svgRect.width*svg.viewBox.baseVal.width).toFixed(1);
    line.setAttribute('x1',svgX);line.setAttribute('x2',svgX);
    line.setAttribute('y1','0');line.setAttribute('y2',svg.viewBox.baseVal.height||200);
  }
}
function chartLeave(){
  const tip=document.getElementById('chart-tooltip');
  if(tip)tip.style.opacity='0';
  const wrap=document.getElementById('chart-wrap');
  if(wrap){const svg=wrap.querySelector('svg');if(svg){const l=svg.querySelector('#ch-line');if(l)l.remove();}}
}

async function fetchBlockInfo(){
  try{
    const r=await fetch('https://mempool.space/api/blocks/tip/height',{signal:AbortSignal.timeout(6000)});
    if(r.ok){
      const h=await r.json();
      S.blockHeight=h;
      // Halving: cada 210000 blocs
      const nextHalving=Math.ceil(h/210000)*210000;
      S.blocksToHalving=nextHalving-h;
      S.halvingPct=((h%210000)/210000*100).toFixed(1);
      if(S.currentTab==='mempool')renderTab('mempool');
    }
  }catch(e){console.warn('blockInfo:',e);}
}

function renderRSIChart(){
  if(!S.history||S.history.length<14)return'';
  const prices=S.history.map(h=>h.price);
  const rsiArr=calcRSI(prices);
  const valid=rsiArr.filter(v=>v!=null);
  if(valid.length<5)return'';
  const W=320,H=60,P=6;
  const toX=i=>P+(i/(rsiArr.length-1))*(W-P*2);
  const toY=v=>P+(1-((v-0)/100))*(H-P*2);
  const pts=rsiArr.map((v,i)=>v!=null?`${toX(i).toFixed(1)},${toY(v).toFixed(1)}`:null).filter(Boolean).join(' ');
  const last=valid[valid.length-1];
  const rsiColor=last>70?'#ef4444':last<30?'#10b981':'#a855f7';
  const tr=t();
  const rsiLabel=last>70?tr.rsiOverboughtLabel:last<30?tr.rsiOversoldLabel:tr.rsiNeutralLabel;
  return`<div style="background:#0a1628;border-radius:0 0 12px 12px;padding:2px 4px 4px;margin:0 -4px;margin-top:-4px">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:2px 4px;margin-bottom:2px">
      <span style="font-size:9px;color:#a855f7;font-weight:700">RSI (14)</span>
      <span style="font-size:10px;font-weight:800;color:${rsiColor}">${last.toFixed(1)} — ${rsiLabel}</span>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:50px" preserveAspectRatio="none">
      <line x1="${P}" y1="${toY(70)}" x2="${W-P}" y2="${toY(70)}" stroke="#ef444466" stroke-width="1" stroke-dasharray="3 2"/>
      <line x1="${P}" y1="${toY(30)}" x2="${W-P}" y2="${toY(30)}" stroke="#10b98166" stroke-width="1" stroke-dasharray="3 2"/>
      <line x1="${P}" y1="${toY(50)}" x2="${W-P}" y2="${toY(50)}" stroke="#33415566" stroke-width="1"/>
      <polyline points="${pts}" fill="none" stroke="${rsiColor}" stroke-width="1.5" stroke-linejoin="round"/>
      <circle cx="${toX(rsiArr.length-1)}" cy="${toY(last)}" r="3" fill="${rsiColor}"/>
    </svg>
    <div style="padding:8px 4px 2px;display:flex;gap:8px;flex-wrap:wrap">
      <span style="font-size:10px;color:#ef4444">● ${tr.rsiOverbought}</span>
      <span style="font-size:10px;color:#a855f7">● ${tr.rsiNeutral}</span>
      <span style="font-size:10px;color:#10b981">● ${tr.rsiOversold}</span>
    </div>
  </div>`;
}
