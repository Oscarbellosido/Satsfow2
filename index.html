<body>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź STATE ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź */
const S={price:{usd:0,eur:0},change24h:0,marketCap:0,history:[],ohlc:[],mempool:null,marketData:null,miningData:null,news:[],alerts:[],days:'30',chartType:'area',dark:localStorage.getItem('sf-theme')!=='light',notifPerm:window.Notification?.permission||'unsupported',atmLoaded:false,leafletMap:null,lastUpdated:null,feeLevel:'hour',txSize:250,currentTab:'home'};

/* ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź THEME ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź */
function applyTheme(){
  if(S.dark){document.documentElement.classList.remove('light');document.getElementById('html-root').classList.add('dark-mode');document.getElementById('theme-btn').textContent='‚ėÄÔłŹ';}
  else{document.documentElement.classList.add('light');document.getElementById('html-root').classList.remove('dark-mode');document.getElementById('theme-btn').textContent='ūüĆô';}
  document.body.style.background=S.dark?'#0f172a':'#f8fafc';
  document.body.style.color=S.dark?'#f1f5f9':'#0f172a';
}
function toggleTheme(){S.dark=!S.dark;localStorage.setItem('sf-theme',S.dark?'dark':'light');applyTheme();renderCurrentTab();}
applyTheme();

/* ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź TABS ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź */
function switchTab(tab){
  S.currentTab=tab;
  document.querySelectorAll('.tab-content').forEach(el=>el.style.display='none');
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.toggle('active',el.dataset.tab===tab));
  const el=document.getElementById('tab-'+tab);
  el.style.display='block';
  el.classList.remove('fade');void el.offsetWidth;el.classList.add('fade');
  renderTab(tab);
  if(tab==='atm'&&S.leafletMap)setTimeout(()=>S.leafletMap.invalidateSize(),150);
}
function renderCurrentTab(){renderTab(S.currentTab);}

/* ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź UTILS ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź */
const fmtN=(v,d=2)=>isNaN(v)?'‚ÄĒ':Number(v).toLocaleString('en-US',{maximumFractionDigits:d});
const fmtBig=v=>{if(!v)return'‚ÄĒ';if(v>=1e12)return`$${(v/1e12).toFixed(2)}T`;if(v>=1e9)return`$${(v/1e9).toFixed(1)}B`;return`$${v.toLocaleString()}`;};
const timeAgo=d=>{const s=Math.floor((Date.now()-d)/1000);if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';};

/* ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź INDEXEDDB ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź */
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open('satsflow',1);r.onupgradeneeded=e=>{if(!e.target.result.objectStoreNames.contains('alerts'))e.target.result.createObjectStore('alerts',{keyPath:'id'});};r.onsuccess=e=>res(e.target.result);r.onerror=rej;});}
async function saveAlerts(){try{const db=await openDB();const tx=db.transaction('alerts','readwrite');const s=tx.objectStore('alerts');s.clear();S.alerts.forEach(a=>s.put(a));}catch{}}
async function loadAlertsDB(){try{const db=await openDB();const tx=db.transaction('alerts','readonly');return new Promise(res=>{const q=tx.objectStore('alerts').getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=()=>res([]);});}catch{return[];}}

/* ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź SERVICE WORKER ‚ÄĒ ruta relativa ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź */
if('serviceWorker' in navigator){
  window.addEventListener('load',async()=>{
    try{
      const base=window.location.pathname.replace(/\/[^/]*$/,'/');
      const swUrl=base+'sw.js';
      const reg=await navigator.serviceWorker.register(swUrl,{scope:base});
      console.log('[SW] registrado:',reg.scope);
      if('periodicSync' in reg){try{const p=await navigator.permissions.query({name:'periodic-background-sync'});if(p.state==='granted')await reg.periodicSync.register('price-check',{minInterval:15*60*1000});}catch{}}
    }catch(e){console.warn('[SW]',e.message);}
  });
}

/* ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź INSTALL ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź */
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-btn').style.display='flex';});
async function handleInstall(){if(deferredPrompt){deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById('install-btn').style.display='none';}else showInstallModal();}
function showInstallModal(){
  const o=document.createElement('div');o.className='modal-overlay';
  o.innerHTML=`<div class="modal-box"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div style="font-size:16px;font-weight:700">‚¨áÔłŹ Instalar SatsFlow</div><button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2)">‚úē</button></div><div class="modal-step"><div class="step-num">1</div><div style="font-size:13px;color:var(--text2)">Pulsa el men√ļ del navegador (‚čģ o compartir).</div></div><div class="modal-step"><div class="step-num">2</div><div style="font-size:13px;color:var(--text2)">Selecciona <b>"Instalar aplicaci√≥n"</b> o <b>"A√Īadir a pantalla de inicio"</b>.</div></div><div class="modal-step"><div class="step-num">3</div><div style="font-size:13px;color:var(--text2)">Funciona con notificaciones aunque est√© cerrada.</div></div><button class="btn-orange" style="width:100%;margin-top:14px" onclick="this.closest('.modal-overlay').remove()">Entendido</button></div>`;
  document.body.appendChild(o);
}

/* ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź NOTIFICATIONS ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź */
async function requestNotifPerm(){if(!window.Notification)return'unsupported';const r=await Notification.requestPermission();S.notifPerm=r;return r;}
function showNotif(title,body){
  playAlertSound();
  if(Notification.permission!=='granted')return;
  const opts={body,icon:'./icon-192.png',vibrate:[300,100,300,100,300],tag:'sf-alert',renotify:true,silent:false};
  if('serviceWorker' in navigator)navigator.serviceWorker.ready.then(r=>r.showNotification(title,opts));
  else new Notification(title,opts);
}
function playAlertSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    // Secuencia de 3 pitidos ascendentes tipo alerta financiera
    const notes=[523,659,784]; // Do-Mi-Sol
    notes.forEach((freq,i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type='sine';
      osc.frequency.setValueAtTime(freq,ctx.currentTime+i*0.18);
      gain.gain.setValueAtTime(0,ctx.currentTime+i*0.18);
      gain.gain.linearRampToValueAtTime(0.4,ctx.currentTime+i*0.18+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.18+0.18);
      osc.start(ctx.currentTime+i*0.18);
      osc.stop(ctx.currentTime+i*0.18+0.18);
    });
    setTimeout(()=>ctx.close(),1000);
  }catch(e){console.warn('Audio:',e);}
}

/* ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź APIS ‚ÄĒ sin clave, 100% gratuitas ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź */
const MEM='https://mempool.space/api';

// Precio: Binance (sin clave, CORS abierto)
async function fetchPrice(){
  try{
    // Precio BTC/USD y BTC/EUR desde Binance
    const[tickerR,klineR,eurR]=await Promise.all([
      fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT'),
      fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=${S.days==='1'?'1h':S.days==='7'?'4h':S.days==='30'?'1d':S.days==='90'?'3d':'1w'}&limit=${S.days==='1'?'24':S.days==='7'?'42':S.days==='90'?'30':'52'}`),
      fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCEUR'),
    ]);
    const ticker=await tickerR.json();
    const klines=await klineR.json();
    const eur=await eurR.json();
    S.price={usd:parseFloat(ticker.lastPrice),eur:parseFloat(eur.price)};
    S.change24h=parseFloat(ticker.priceChangePercent)||0;
    S.marketCap=0; // Binance no da market cap
    // Historial desde klines [ts, open, high, low, close, ...]
    S.history=klines.map(k=>{
      const d=new Date(k[0]);
      const label=S.days==='1'?d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}):
        S.days==='7'||S.days==='30'?d.toLocaleDateString('es-ES',{month:'numeric',day:'numeric'}):
        d.toLocaleDateString('es-ES',{month:'short',year:'2-digit'});
      return{date:label,price:parseFloat(k[4])}; // close price
    });
    // OHLC para velas
    S.ohlc=klines.map(k=>({
      ts:k[0],
      date:new Date(k[0]).toLocaleDateString('es-ES',{month:'numeric',day:'numeric'}),
      open:parseFloat(k[1]),high:parseFloat(k[2]),low:parseFloat(k[3]),close:parseFloat(k[4])
    }));
    S.lastUpdated=new Date();
    updateHeader();
  }catch(e){console.error('fetchPrice',e);}
}
async function fetchOHLC(){} // ya incluido en fetchPrice con Binance

async function fetchMempool(){
  try{
    const[fr,sr,br]=await Promise.all([fetch(`${MEM}/v1/fees/recommended`),fetch(`${MEM}/mempool`),fetch(`${MEM}/v1/blocks`)]);
    const fees=await fr.json(),stats=await sr.json(),blocks=await br.json();
    const txCount=stats.count||0,last=blocks[0]||{},height=last.height||0,next=Math.ceil(height/210000)*210000;
    S.mempool={fees:{fastest:fees.fastestFee||0,halfHour:fees.halfHourFee||0,hour:fees.hourFee||0,economy:fees.economyFee||0,minimum:fees.minimumFee||1},mempool:{txCount,vsize:Math.round((stats.vsize||0)/1e6),congestion:Math.min(100,Math.round((txCount/150000)*100))},network:{height,nextHalving:next,blocksToHalving:next-height}};
  }catch{}
}

async function fetchMarket(){
  try{
    // Fear & Greed: alternative.me
    const fgR=await fetch('https://api.alternative.me/fng/');
    const fg=await fgR.json();

async function fetchNews(){
  // Fuentes RSS en espa√Īol ‚ÄĒ probadas una a una con fallback
  const feeds=[
    // CoinTelegraph Espa√Īa ‚ÄĒ feed directo
    {url:'https://es.cointelegraph.com/rss',source:'CoinTelegraph ES'},
    // Criptonoticias Venezuela/Global espa√Īol
    {url:'https://www.criptonoticias.com/feed/',source:'CriptoNoticias'},
    // ElMundo Econom√≠a como fallback espa√Īol general
    {url:'https://feeds.elpais.com/mrss-s/pages/ep/site/elpais.com/section/economia/portada',source:'El Pa√≠s Econom√≠a'},
  ];
  const results=[];
  for(const feed of feeds){
    if(results.length>=8)break;
    try{
      // Usamos allorigins como proxy CORS para feeds que bloquean
      const proxyUrl=`https://api.allorigins.win/get?url=${encodeURIComponent(feed.url)}`;
      const r=await fetch(proxyUrl,{signal:AbortSignal.timeout(6000)});
      const j=await r.json();
      const xml=j.contents||'';
      // Parsear RSS manualmente
      const items=xml.match(/<item[^>]*>[\s\S]*?<\/item>/g)||[];
      items.slice(0,6).forEach(item=>{
        const title=(item.match(/<title><!\[CDATA\[(.*?)\]\]><\/title>/)||item.match(/<title>(.*?)<\/title>/))?.[1]||'Sin t√≠tulo';
        const link=(item.match(/<link>(.*?)<\/link>/)||item.match(/<guid[^>]*>(https?[^<]+)<\/guid>/))?.[1]||'#';
        const pubDate=item.match(/<pubDate>(.*?)<\/pubDate>/)?.[1]||new Date().toUTCString();
        const cleanTitle=title.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#\d+;/g,'').trim();
        if(cleanTitle&&link!=='#'){
          results.push({id:link,title:cleanTitle,url:link,source:feed.source,date:new Date(pubDate)});
        }
      });
    }catch(e){console.warn('feed',feed.source,e.message);}
  }
  // Fallback: CoinTelegraph ES directo via rss2json si allorigins fall√≥
  if(results.length===0){
    try{
      const r=await fetch('https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fes.cointelegraph.com%2Frss&count=12',{signal:AbortSignal.timeout(8000)});
      const j=await r.json();
      if(j.status==='ok'&&j.items?.length){
        j.items.slice(0,10).forEach(n=>{
          results.push({id:n.guid||n.link,title:n.title,url:n.link,source:'CoinTelegraph ES',date:new Date(n.pubDate)});
        });
      }
    }catch{}
  }
  S.news=results.sort((a,b)=>b.date-a.date).slice(0,12);
}

/* ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź TECHNICAL ANALYSIS ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź */
function calcEMA(p,k){const m=2/(k+1),e=[];p.forEach((v,i)=>{e.push(i===0?v:v*m+e[i-1]*(1-m));});return e;}
function calcRSI(p,k=14){const r=new Array(k).fill(null);let g=0,l=0;for(let i=1;i<=k;i++){const d=p[i]-p[i-1];d>0?g+=d:l+=Math.abs(d);}let ag=g/k,al=l/k;for(let i=k;i<p.length;i++){const d=p[i]-p[i-1];ag=(ag*(k-1)+(d>0?d:0))/k;al=(al*(k-1)+(d<0?Math.abs(d):0))/k;r.push(100-(100/(1+(al===0?100:ag/al))));}return r;}
function analyze(){
  const prices=S.history.map(h=>h.price);
  if(prices.length<30)return null;
  const last=prices[prices.length-1];
  const rsiArr=calcRSI(prices),lastRSI=rsiArr[rsiArr.length-1];
  const e12=calcEMA(prices,12),e26=calcEMA(prices,26);
  const macd=e12.map((v,i)=>v-e26[i]);
  const sig=calcEMA(macd.slice(26),9);
  const padSig=[...new Array(26).fill(null),...new Array(macd.length-26-sig.length).fill(null),...sig];
  const lMACD=macd[macd.length-1],lSig=padSig[padSig.length-1];
  const sma7=prices.slice(-7).reduce((a,b)=>a+b,0)/7;
  const sma30=prices.slice(-30).reduce((a,b)=>a+b,0)/30;
  const sl20=prices.slice(-20),m20=sl20.reduce((a,b)=>a+b,0)/20;
  const std=Math.sqrt(sl20.reduce((a,b)=>a+(b-m20)**2,0)/sl20.length);
  const bbU=m20+2*std,bbL=m20-2*std;
  const recent=prices.slice(-30);
  const support=Math.min(...recent)*0.98,resistance=Math.max(...recent)*1.02;
  let bull=0,bear=0;
  if(lastRSI<30)bull+=3;else if(lastRSI<45)bull+=1;else if(lastRSI>70)bear+=3;else if(lastRSI>55)bear+=1;
  if(sma7>sma30)bull+=2;else bear+=2;
  if(lMACD>lSig)bull+=2;else bear+=2;
  if(last<bbL)bull+=2;else if(last>bbU)bear+=2;
  const total=bull+bear,bullPct=total>0?Math.round((bull/total)*100):50;
  const signal=bullPct>=65?'COMPRAR':bullPct<=35?'VENDER':'NEUTRAL';
  return{lastRSI,sma7,sma30,lMACD,lSig,bbU,bbL,support,resistance,bullPct,bearPct:100-bullPct,signal,last,rsiData:rsiArr.slice(-40).filter(v=>v!=null),macdData:macd.slice(-40),sigData:padSig.slice(-40)};
}

/* ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź SVG CHARTS ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź */
function miniLine(data,color,h=65,refs=[]){
  const v=data.filter(x=>x!=null);if(!v.length)return'';
  const min=Math.min(...v),max=Math.max(...v),range=max-min||1;
  const W=300,H=h,P=4;
  const pts=data.map((x,i)=>{if(x==null)return null;return`${P+(i/(data.length-1))*(W-P*2)},${P+(1-(x-min)/range)*(H-P*2)}`;}).filter(Boolean).join(' ');
  const rls=refs.map(({val,color:rc})=>{const y=P+(1-(val-min)/range)*(H-P*2);return`<line x1="${P}" y1="${y}" x2="${W-P}" y2="${y}" stroke="${rc}" stroke-dasharray="4 3" stroke-width="1" opacity=".7"/>`;}).join('');
  return`<svg viewBox="0 0 ${W} ${H}" class="mini-chart" preserveAspectRatio="none">${rls}<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/></svg>`;
}
function areaSVG(data){
  if(!data.length)return'';
  const prices=data.map(d=>d.price),min=Math.min(...prices),max=Math.max(...prices),range=max-min||1;
  const W=300,H=100,P=4,last=prices[prices.length-1],first=prices[0],color=last>=first?'#10b981':'#ef4444';
  const pts=data.map((d,i)=>`${P+(i/(data.length-1))*(W-P*2)},${P+(1-(d.price-min)/range)*(H-P*2)}`);
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:120px" preserveAspectRatio="none"><defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".3"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><polygon points="${P},${H} ${pts.join(' ')} ${W-P},${H}" fill="url(#ag)"/><polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/></svg>`;
}
function candleSVG(data){
  if(!data.length)return'';
  const ps=data.flatMap(d=>[d.high,d.low]),min=Math.min(...ps),max=Math.max(...ps),range=max-min||1;
  const W=300,H=120,P=4,cW=Math.max(2,Math.floor((W-P*2)/data.length)-2);
  const toY=v=>P+(1-(v-min)/range)*(H-P*2),toX=i=>P+(i+.5)*((W-P*2)/data.length);
  const c=data.map((d,i)=>{const up=d.close>=d.open,x=toX(i),col=up?'#10b981':'#ef4444';const yH=toY(d.high),yL=toY(d.low),yO=toY(d.open),yC=toY(d.close),bT=Math.min(yO,yC),bH=Math.max(1,Math.abs(yO-yC));return`<line x1="${x}" y1="${yH}" x2="${x}" y2="${yL}" stroke="${col}" stroke-width="1"/><rect x="${x-cW/2}" y="${bT}" width="${cW}" height="${bH}" fill="${col}" rx="1"/>`;}).join('');
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:120px" preserveAspectRatio="none">${c}</svg>`;
}

function calcConv(f,raw){
  const v=parseFloat(raw),ok=!isNaN(v)&&v>=0,pU=S.price.usd,pE=S.price.eur;
  if(!ok){['btc','sats','usd','eur'].filter(x=>x!==f).forEach(x=>{const e=document.getElementById('inp-'+x);if(e)e.value='';});return;}
  let btc=S.conv_btc||1,sats=S.conv_sats||1e8,usd=S.conv_usd||0,eur=S.conv_eur||0;
  if(f==='btc'){btc=v;sats=(v*1e8).toFixed(0);usd=(v*pU).toFixed(2);eur=(v*pE).toFixed(2);}
  else if(f==='sats'){const b=v/1e8;btc=b.toFixed(8).replace(/\.?0+$/,'');sats=v;usd=(b*pU).toFixed(2);eur=(b*pE).toFixed(2);}
  else if(f==='usd'&&pU){const b=v/pU;btc=b.toFixed(8);sats=(b*1e8).toFixed(0);usd=v;eur=(b*pE).toFixed(2);}
  else if(f==='eur'&&pE){const b=v/pE;btc=b.toFixed(8);sats=(b*1e8).toFixed(0);usd=(b*pU).toFixed(2);eur=v;}
  S.conv_btc=btc;S.conv_sats=sats;S.conv_usd=usd;S.conv_eur=eur;
  ['btc','sats','usd','eur'].filter(x=>x!==f).forEach(x=>setI(x,S['conv_'+x]));
}

    <div style="font-size:10px;color:var(--text3);text-align:center;margin-top:4px">Fuente: alternative.me ¬∑ Actualizaci√≥n diaria</div>
  </div>
  <div class="card">
    <div style="font-size:15px;font-weight:700;margin-bottom:12px">ūüĆć Dominancia</div>
    ${[{l:'Bitcoin (BTC)',v:dom.btc,c:'#f97316'},{l:'Ethereum (ETH)',v:dom.eth,c:'#3b82f6'},{l:'Resto',v:others,c:'#64748b'}].map(({l,v,c})=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--text2)">${l}</span><span style="font-weight:700;color:${c}">${v}%</span></div><div class="prog-track"><div class="prog-bar" style="width:${parseFloat(v)||0}%;background:${c}"></div></div></div>`).join('')}
    <div style="font-size:10px;color:var(--text3)">Cap. total: ${fmtBig(m.totalMcap)}</div>
  </div>
  ${mi?`<div class="card"><div style="font-size:15px;font-weight:700;margin-bottom:12px">‚õŹÔłŹ Miner√≠a</div><div class="grid-2" style="margin-bottom:12px"><div class="stat-box"><div class="stat-label">Hashrate</div><div class="stat-val" style="color:#10b981">${mi.hashrate}</div><div style="font-size:9px;color:var(--text3)">EH/s</div></div><div class="stat-box"><div class="stat-label">Cambio dificultad</div><div class="stat-val" style="color:${mi.difficultyChange>=0?'#ef4444':'#10b981'}">${mi.difficultyChange>=0?'+':''}${(mi.difficultyChange||0).toFixed(2)}%</div></div></div><div style="font-size:12px;color:var(--text2);margin-bottom:6px;display:flex;justify-content:space-between"><span>Pr√≥ximo ajuste</span><span style="color:var(--text3)">${mi.remainingBlocks} bloques</span></div><div class="prog-track"><div class="prog-bar" style="width:${mi.progressPercent||0}%;background:#22c55e"></div></div><div style="font-size:10px;color:var(--text3);text-align:right;margin-top:2px">${(mi.progressPercent||0).toFixed(1)}% completado</div></div>`:''}
</div>`;
}

    <div class="grid-4">${cards.map(({l,f,t,ic})=>`<div class="fee-card"><span style="font-size:15px">${ic}</span><span style="font-size:9px;color:var(--text3);text-transform:uppercase">${l}</span><span style="font-size:16px;font-weight:700;font-family:monospace;color:${feeColor(f)}">${f}</span><span style="font-size:9px;color:var(--text3)">s/vB</span><span style="font-size:9px;color:var(--text2)">${t}</span></div>`).join('')}</div>
  </div>

      <div><div style="font-size:10px;color:var(--text3);margin-bottom:4px">Prioridad</div><select id="fee-level" onchange="S.feeLevel=this.value;renderTab('mempool')"><option value="fastest" ${S.feeLevel==='fastest'?'selected':''}>‚ö° R√°pido</option><option value="halfHour" ${S.feeLevel==='halfHour'?'selected':''}>ūüü† 30 min</option><option value="hour" ${S.feeLevel==='hour'?'selected':''}>ūüēź 1 hora</option><option value="economy" ${S.feeLevel==='economy'?'selected':''}>ūüí§ Eco</option><option value="minimum" ${S.feeLevel==='minimum'?'selected':''}>ūüźĘ M√≠nima</option></select></div>
    </div>
    <div class="grid-3"><div class="stat-box"><div class="stat-label">sat/vByte</div><div class="stat-val" style="color:#eab308">${selRate}</div></div><div class="stat-box"><div class="stat-label">Sats</div><div class="stat-val" style="color:#f97316;font-size:12px">${totSats.toLocaleString()}</div></div><div class="stat-box"><div class="stat-label">USD</div><div class="stat-val" style="color:#10b981;font-size:12px">$${totUsd}</div></div></div>

/* ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź ATM ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź */
function renderATM(){
  // Pre-render map container con altura visible
  const alreadyLoaded=S.atmLoaded;
  return`<div class="space-y"><div class="card">
    <div style="font-size:15px;font-weight:700;margin-bottom:12px">ūüŹß Cajeros Bitcoin cercanos</div>
    <div id="atm-status" style="text-align:center;padding:20px;${alreadyLoaded?'display:none':''}">
      <div style="font-size:40px;margin-bottom:12px">ūüďć</div>
      <div style="font-weight:600;margin-bottom:6px">Encuentra cajeros Bitcoin cerca de ti</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:16px">Usaremos tu ubicaci√≥n para buscar en un radio de ~50 km</div>
      <button class="btn-orange" onclick="loadATM()">ūüóļÔłŹ Buscar cerca de m√≠</button>
    </div>
    <div id="atm-count" style="font-size:12px;color:#10b981;margin-bottom:8px;font-weight:600;${alreadyLoaded?'':'display:none'}"></div>
    <div id="map-container" style="height:360px;border-radius:12px;overflow:hidden;${alreadyLoaded?'':'display:none'}"></div>
    <div id="atm-tip" style="font-size:10px;color:var(--text3);text-align:center;margin-top:6px;${alreadyLoaded?'':'display:none'}">ūüü† Cajeros/comercios Bitcoin ¬∑ ūüďć Tu posici√≥n ¬∑ Datos: BTCMap.org</div>
    ${alreadyLoaded?'<button class="btn-ghost" style="width:100%;margin-top:8px" onclick="reloadATM()">ūüĒĄ Actualizar</button>':''}
  </div></div>`;
}
function initATM(){
  if(!S.atmLoaded) return; // espera a que el usuario pulse el bot√≥n
}
async function reloadATM(){
  S.atmLoaded=false;
  if(S.leafletMap){S.leafletMap.remove();S.leafletMap=null;}
  renderTab('atm');
  await loadATM();
}
async function loadATM(){
  const st=document.getElementById('atm-status');
  if(!st)return;
  st.innerHTML=`<div style="font-size:13px;color:var(--text3)"><span class="spin">ūüďć</span> Obteniendo tu ubicaci√≥n...</div>`;
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:15000,enableHighAccuracy:false}));
    const{latitude:lat,longitude:lng}=pos.coords;
    st.innerHTML=`<div style="font-size:13px;color:var(--text3)"><span class="spin">ūüĒć</span> Buscando cajeros Bitcoin...</div>`;

    // Mostrar contenedor del mapa con altura
    const mapDiv=document.getElementById('map-container');
    if(mapDiv){
      mapDiv.style.display='block';
      mapDiv.style.height='360px';
    }

    // Peque√Īa espera para que el DOM pinte el contenedor antes de Leaflet
    await new Promise(r=>setTimeout(r,100));

    if(!S.leafletMap&&mapDiv){
      S.leafletMap=L.map(mapDiv,{zoomControl:true,attributionControl:true}).setView([lat,lng],13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        attribution:'¬© <a href="https://openstreetmap.org">OpenStreetMap</a>',
        maxZoom:19
      }).addTo(S.leafletMap);
    }else if(S.leafletMap){
      S.leafletMap.setView([lat,lng],13);
    }
    S.leafletMap.invalidateSize();

    // Marcador usuario
    const uIcon=L.divIcon({html:`<div style="background:#f97316;width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.5)"></div>`,iconSize:[16,16],iconAnchor:[8,8],className:''});
    L.marker([lat,lng],{icon:uIcon}).addTo(S.leafletMap).bindPopup('<b>ūüďć Tu ubicaci√≥n</b>').openPopup();

    // Cajeros via BTCMap
    let atms=[];
    try{
      const delta=0.4;
      const r=await fetch(`https://api.btcmap.org/v2/elements?lat=${lat-delta}&lon=${lng-delta}&lat2=${lat+delta}&lon2=${lng+delta}`,{signal:AbortSignal.timeout(10000)});
      if(r.ok){
        const j=await r.json();
        atms=(j||[]).filter(e=>{
          const tags=e.osm_json?.tags||{};
          return tags['payment:bitcoin']==='yes'||tags['currency:XBT']==='yes'||tags['bitcoin']==='yes'||tags['amenity']==='atm';
        }).slice(0,50).map(e=>({
          lat:e.osm_json?.lat||e.osm_json?.center?.lat,
          lng:e.osm_json?.lon||e.osm_json?.center?.lon,
          name:e.osm_json?.tags?.name||'Punto Bitcoin',
          op:e.osm_json?.tags?.operator||'',
          type:e.osm_json?.tags?.['amenity']==='atm'?'ūüŹß ATM':'ūüŹ™ Comercio'
        })).filter(e=>e.lat&&e.lng);
      }
    }catch(err){console.warn('BTCMap:',err);}

    const aIcon=L.divIcon({html:`<div style="background:#f59e0b;width:13px;height:13px;border-radius:3px;border:2px solid white;box-shadow:0 2px 5px rgba(0,0,0,.4);font-size:8px;display:flex;align-items:center;justify-content:center;color:white;font-weight:700">‚āŅ</div>`,iconSize:[13,13],iconAnchor:[6,6],className:''});
    atms.forEach(a=>{
      if(S.leafletMap)L.marker([a.lat,a.lng],{icon:aIcon}).addTo(S.leafletMap)
        .bindPopup(`<b>${a.name}</b><br><small>${a.type}${a.op?' ¬∑ '+a.op:''}</small>`);
    });

    setTimeout(()=>S.leafletMap?.invalidateSize(),300);

    // Actualizar UI
    const cnt=document.getElementById('atm-count');
    if(cnt){cnt.textContent=atms.length>0?`‚úÖ ${atms.length} cajeros/comercios encontrados`:'‚ĄĻÔłŹ No se encontraron cajeros Bitcoin en esta zona';cnt.style.display='block';}
    const tip=document.getElementById('atm-tip');if(tip)tip.style.display='block';
    st.style.display='none';
    S.atmLoaded=true;
    // A√Īadir bot√≥n actualizar
    const card=st.closest('.card');
    if(card&&!card.querySelector('.btn-ghost')){
      const btn=document.createElement('button');
      btn.className='btn-ghost';btn.style.cssText='width:100%;margin-top:8px';
      btn.textContent='ūüĒĄ Actualizar';btn.onclick=reloadATM;
      card.appendChild(btn);
    }
  }catch(e){
    const msg=e.code===1?'Permiso de ubicaci√≥n denegado. Ve a los ajustes del navegador y activa la ubicaci√≥n para esta p√°gina.':e.name==='TimeoutError'?'Tiempo de espera agotado. Comprueba tu conexi√≥n.':'No se pudo cargar el mapa. Int√©ntalo de nuevo.';
    if(st)st.innerHTML=`<div style="color:#ef4444;font-size:13px;margin-bottom:14px;line-height:1.5">${msg}</div><button class="btn-orange" onclick="loadATM()">ūüĒĄ Reintentar</button>`;
  }
}

}
async function activateNotifs(){const r=await requestNotifPerm();if(r==='granted')showNotif('‚úÖ SatsFlow','Notificaciones activadas.');renderTab('alerts');}
function addAlert(){const t=document.getElementById('alert-target'),c=document.getElementById('alert-curr');if(!t||!c)return;const val=parseFloat(t.value);if(isNaN(val)||val<=0)return;const curr=c.value,price=curr==='usd'?S.price.usd:S.price.eur;S.alerts.push({id:Date.now().toString(),targetPrice:val,currency:curr,condition:val>price?'above':'below',triggered:false});saveAlerts();navigator.serviceWorker?.ready.then(reg=>reg.active?.postMessage({type:'CHECK_ALERTS',alerts:S.alerts}));renderTab('alerts');}
function removeAlert(id){S.alerts=S.alerts.filter(a=>a.id!==id);saveAlerts();renderTab('alerts');}
function checkAlerts(){if(!S.price.usd)return;let changed=false;S.alerts=S.alerts.map(a=>{if(a.triggered)return a;const p=a.currency==='usd'?S.price.usd:S.price.eur,hit=a.condition==='above'?p>=a.targetPrice:p<=a.targetPrice;if(hit){const sym=a.currency==='usd'?'$':'‚ā¨';showNotif('‚ö° Alerta SatsFlow',`BTC ha ${a.condition==='above'?'subido sobre':'bajado de'} ${sym}${a.targetPrice.toLocaleString()} ‚ÄĒ $${S.price.usd.toLocaleString()}`);changed=true;return{...a,triggered:true};}return a;});if(changed){saveAlerts();if(S.currentTab==='alerts')renderTab('alerts');}}

/* ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź INIT ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź */
async function init(){
  S.alerts=await loadAlertsDB();
  await fetchPrice();
  renderTab('home');
  // Carga el resto en segundo plano
  Promise.all([fetchOHLC(),fetchMempool(),fetchMarket(),fetchMining(),fetchNews()]).then(()=>{renderCurrentTab();});
  setInterval(async()=>{await fetchPrice();checkAlerts();renderCurrentTab();},60000);
  setInterval(async()=>{await fetchMempool();if(S.currentTab==='mempool')renderTab('mempool');},30000);
  setInterval(async()=>{await Promise.all([fetchMarket(),fetchMining()]);if(S.currentTab==='market')renderTab('market');},120000);
  setInterval(async()=>{await fetchNews();if(S.currentTab==='news')renderTab('news');},300000);
}
init();
</script>
