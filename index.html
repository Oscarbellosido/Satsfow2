const t=()=>T[S.lang]||T.es;

function setLang(lang,silent){
  S.lang=lang;
  localStorage.setItem('sf-lang',lang);
  document.documentElement.lang=lang;
  const tabKeys=['home','analysis','market','mempool','atm','news','alerts','corr','global','forecast'];
  const tabIcons={home:'🏠',analysis:'🧠',market:'📊',mempool:'⛓️',atm:'🏧',news:'📰',alerts:'🔔',corr:'📈',global:'🌍',forecast:'🔮'};
  tabKeys.forEach(tab=>{
    const btn=document.querySelector('[data-tab="'+tab+'"]');
    if(btn)btn.innerHTML='<span class="tab-icon">'+tabIcons[tab]+'</span>'+(t()[tab]||tab);
  });
  if(!silent)renderCurrentTab();

/* ══════ RESUMEN / RESUM MATUTINO ══════ */
function saveMorningAlert(hour,minute){
  S.morningAlert={hour,minute,enabled:true};
  localStorage.setItem('sf-morning',JSON.stringify(S.morningAlert));
  scheduleMorningCheck();
}
function disableMorningAlert(){
  S.morningAlert=null;
  localStorage.setItem('sf-morning','null');
  if(window._morningInterval)clearInterval(window._morningInterval);
}
function scheduleMorningCheck(){
  // Comprobar en el momento actual (al abrir la app o al configurar)
  _checkMorningNow();
  // También comprobar cada minuto POR SI la app sigue abierta a la hora exacta
  if(window._morningInterval)clearInterval(window._morningInterval);
  window._morningInterval=setInterval(_checkMorningNow, 60000);
}
async function _checkMorningNow(){
  if(!S.morningAlert?.enabled)return;
  if(S.notifPerm!=='granted')return;
  const now=new Date();
  const todayKey=now.toISOString().slice(0,10);
  const lastSent=localStorage.getItem('sf-morning-sent');
  if(lastSent===todayKey)return; // ya enviado hoy
  // Enviar si ya pasó la hora configurada (con margen de 2h para cuando abren tarde)
  const configH=S.morningAlert.hour, configM=S.morningAlert.minute||0;
  const nowMins=now.getHours()*60+now.getMinutes();
  const cfgMins=configH*60+configM;
  if(nowMins>=cfgMins && nowMins<=cfgMins+120){
    localStorage.setItem('sf-morning-sent',todayKey);
    await sendMorningBriefing();
  }
}
async function sendMorningBriefing(){
  try{await fetchPrice();}catch{}
  try{await fetchMarket();}catch{}

function buildSnapshot(){
  // Genera un snapshot de la predicción actual
  if(!S.price.usd||S.price.usd===0)return null;
  try{
    const{horizons,netScore,taTotal,onChainTotal,macroTotal,regime,wTA,wOC,wMacro}=calcForecast(S.price.usd);
    const week=horizons.find(h=>h.label==='1 semana');
    const month=horizons.find(h=>h.label==='1 mes');
    if(!week)return null;
    const now=new Date();
    const dateKey=now.toISOString().slice(0,10); // YYYY-MM-DD
    return{
      date:dateKey,
      ts:now.getTime(),
      price:Math.round(S.price.usd),
      priceEur:Math.round(S.price.eur||0),
      netScore:parseFloat(netScore.toFixed(4)),
      taTotal:parseFloat(taTotal.toFixed(4)),
      onChainTotal:parseFloat(onChainTotal.toFixed(4)),
      macroTotal:parseFloat(macroTotal.toFixed(4)),
      regime,
      wTA:parseFloat(wTA.toFixed(2)),wOC:parseFloat(wOC.toFixed(2)),wMacro:parseFloat(wMacro.toFixed(2)),
      week:{
        bear:Math.round(week.bear),
        base:Math.round(week.base),
        bull:Math.round(week.bull),
        mostLikely:week.mostLikely,
        signal:week.signal
      },
      month:month?{
        bear:Math.round(month.bear),
        base:Math.round(month.base),
        bull:Math.round(month.bull),
        mostLikely:month.mostLikely,
        signal:month.signal
      }:null,
      fg:S.marketData?.fearGreed?.value||null,
      dom:parseFloat(S.marketData?.dominance?.btc||0)||null,
      manual:false
    };
  }catch(e){console.warn('buildSnapshot:',e);return null;}
}

async function saveSnapshotIfNeeded(manual=false){
  const snap=buildSnapshot();
  if(!snap){console.warn('[snapshot] buildSnapshot devolvió null — precio:',S.price?.usd);return;}
  if(manual){
    snap.manual=true;
    snap.date=snap.date+'_m'+Date.now(); // evitar sobreescribir el auto del mismo día
    await savePrediction(snap);
    if(S.currentTab==='forecast')renderTab('forecast');
    showNotif('📸 SatsFlow','Predicción guardada: BTC $'+snap.price.toLocaleString());
    return;
  }
  // Auto: solo guardar si no existe ya una entrada de hoy
  try{
    const db=await openDB();
    const tx=db.transaction('predictions','readonly');
    const existing=await new Promise(res=>{const q=tx.objectStore('predictions').get(snap.date);q.onsuccess=()=>res(q.result);q.onerror=()=>res(null);});
    if(!existing){
      await savePrediction(snap);
      console.log('[SatsFlow] Snapshot diario guardado:',snap.date,'BTC $'+snap.price.toLocaleString());
      if(S.currentTab==='forecast')renderTab('forecast');
    }
  }catch(e){console.warn('autoSnapshot:',e);}
}

// Scheduler diario a las 9:00
function scheduleDailySnapshot(){
  // Las PWA en Android NO ejecutan código en background — el setTimeout de las 9:00
  // solo funciona si la app está abierta en ese momento.
  // Estrategia robusta: comprobar al arrancar y al volver al primer plano
  // si falta el snapshot de hoy y ya son las 9:00 o más → guardar.

  async function checkAndSave(){
    const now=new Date();
    if(now.getHours()<9)return; // antes de las 9 no guardar
    const dateKey=now.toISOString().slice(0,10);
    try{
      const db=await openDB();
      const tx=db.transaction('predictions','readonly');
      const existing=await new Promise(res=>{
        const q=tx.objectStore('predictions').get(dateKey);
        q.onsuccess=()=>res(q.result);q.onerror=()=>res(null);
      });
      if(!existing){
        // No hay snapshot de hoy todavía → intentar guardar
        // Esperar a que los datos estén listos (precio > 0)
        if(S.price?.usd>0){
          await saveSnapshotIfNeeded(false);
        }
      }
    }catch(e){console.warn('checkAndSave:',e);}
  }

  // Al arrancar: esperar 15s para que fetchPrice y fetchOnChain terminen
  setTimeout(checkAndSave, 15000);

  // También comprobar cada hora mientras la app está abierta
  // Esto captura el caso de que la app esté abierta exactamente a las 9:00
  setInterval(checkAndSave, 3600000);
}

function outcomeIcon(snap,realPrice){
  if(!realPrice||!snap.week)return '';
  const{bear,bull,base,mostLikely}=snap.week;
  if(realPrice>=bear&&realPrice<=bull){
    // Dentro del rango total
    const scenario=realPrice<(bear+base)/2?'📉 Bajista':realPrice<(base+bull)/2?'📊 Base':'📈 Alcista';
    return'<span style="color:#10b981;font-weight:700">✅ Dentro del rango</span> <span style="font-size:10px;color:var(--text3)">('+scenario+')</span>';
  }else if(realPrice<bear){
    const pct=((bear-realPrice)/bear*100).toFixed(1);
    return'<span style="color:#ef4444;font-weight:700">❌ Por debajo</span> <span style="font-size:10px;color:var(--text3)">('+pct+'% bajo el bear)</span>';
  }else{
    const pct=((realPrice-bull)/bull*100).toFixed(1);
    return'<span style="color:#f97316;font-weight:700">🚀 Por encima</span> <span style="font-size:10px;color:var(--text3)">('+pct+'% sobre el bull)</span>';
  }
}

    }catch(e){console.warn('[SW]',e.message);}

async function showNotif(title,body){
  playAlertSound();
  if(Notification.permission!=='granted')return;
  const opts={body,icon:'./icon-192.png',badge:'./icon-96.png',vibrate:[300,100,300,100,300],tag:'sf-alert',renotify:true,silent:false};
  // Android necesita SW para notificaciones — con timeout de seguridad
  if('serviceWorker' in navigator){
    try{
      const swReady=await Promise.race([
        navigator.serviceWorker.ready,

      ]);
      await swReady.showNotification(title,opts);

function playAlertSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const notes=[523,659,784]; // Do-Mi-Sol
    notes.forEach((freq,i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type='sine';
      osc.frequency.setValueAtTime(freq,ctx.currentTime+i*0.18);
      gain.gain.setValueAtTime(0,ctx.currentTime+i*0.18);
      gain.gain.linearRampToValueAtTime(0.4,ctx.currentTime+i*0.18+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.18+0.18);
      osc.start(ctx.currentTime+i*0.18);
      osc.stop(ctx.currentTime+i*0.18+0.18);
    });
    setTimeout(()=>ctx.close(),1000);
  }catch(e){console.warn('Audio:',e);}
}

      try{
        const days=S.days==='1'?1:S.days==='7'?7:S.days==='30'?30:S.days==='90'?90:365;
        const r=await fetch('https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days='+days,{signal:AbortSignal.timeout(10000)});
        if(r.ok){

            const ptsPerCandle=S.days==='1'?1:S.days==='7'?6:S.days==='30'?24:S.days==='90'?72:168;

function isBitcoinNews(title){
  const t=(title||'').toLowerCase();

async function tryFetchRSS(url){
  // rss2json.com: convierte RSS a JSON, sin problemas CORS desde GitHub Pages
  try{
    const r=await fetch('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(url)+'&count=10',{signal:AbortSignal.timeout(8000)});
    if(r.ok){
      const j=await r.json();
      if(j.status==='ok'&&j.items?.length>0){
        // Convertir formato rss2json a XML simulado para parseRSS
        const fakeXml=j.items.map(it=>{
          const d=it.pubDate||new Date().toISOString();
          const link=it.link||'';
          const title=it.title||'';
          const desc=(it.description||it.content||'').replace(/<[^>]+>/g,'').slice(0,200);
          return '<item><title><![CDATA['+title+']]></title><link>'+link+'</link><description><![CDATA['+desc+']]></description><pubDate>'+d+'</pubDate></item>';
        }).join('');
        return '<rss>'+fakeXml+'</rss>';
      }
    }
  }catch{}
  // Fallback: intentar fetch directo (funciona para algunos feeds con CORS abierto)
  try{
    const r=await fetch(url,{signal:AbortSignal.timeout(6000)});
    if(r.ok){const t=await r.text();if(t.includes('<item'))return t;}
  }catch{}
  return '';
}
function parseRSS(xml,source){
  const items=xml.match(/<item[\s\S]*?<\/item>/g)||[];
  const results=[];
  items.forEach(item=>{
    const title=(item.match(/<title><!\[CDATA\[([\s\S]*?)\]\]><\/title>/)||item.match(/<title>([^<]*)<\/title>/))?.[1]||'';
    const link=(item.match(/<link>([^<]*)<\/link>/)||item.match(/<guid[^>]*>(https?[^<]+)<\/guid>/))?.[1]||'';
    const pubDate=item.match(/<pubDate>([^<]*)<\/pubDate>/)?.[1]||'';
    const clean=title.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#\d+;/g,'').replace(/<[^>]+>/g,'').trim();
    if(clean&&link)results.push({id:link,title:clean,url:link,source,date:pubDate?new Date(pubDate):new Date()});
  });
  return results;
}
async function fetchNews(){
  const feeds=[
    {url:'https://news.google.com/rss/search?q=bitcoin&hl=es&gl=ES&ceid=ES:es',source:'Google Noticias ES'},
    {url:'https://news.google.com/rss/search?q=bitcoin&hl=ca&gl=ES&ceid=ES:ca',source:'Google Notícies CA'},
    {url:'https://news.google.com/rss/search?q=bitcoin+precio+adopcion&hl=es&gl=ES&ceid=ES:es',source:'Google Noticias ES'},
    {url:'https://news.google.com/rss/search?q=bitcoin+BTC+halving&hl=es&gl=ES&ceid=ES:es',source:'Google Noticias ES'},
  ];
  const seen=new Set();
  let results=[];
  for(const feed of feeds){
    if(results.length>=12)break;
    try{
      const xml=await tryFetchRSS(feed.url);
      if(!xml)continue;
      const items=parseRSS(xml,feed.source);
      items.forEach(item=>{
        if(!seen.has(item.id)&&isBitcoinNews(item.title)){
          seen.add(item.id);
          results.push(item);
        }
      });
    }catch(e){console.warn('feed error',feed.source,e);}
  }
  if(results.length<3){
    try{
      const urls=[
        'https://news.google.com/rss/search?q=bitcoin&hl=es&gl=ES&ceid=ES:es',
        'https://news.google.com/rss/search?q=bitcoin&hl=ca&gl=ES&ceid=ES:ca',
      ];
      for(const rssUrl of urls){
        if(results.length>=8)break;
        const r=await fetch('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(rssUrl)+'&count=10',{signal:AbortSignal.timeout(8000)});
        const j=await r.json();
        if(j.status==='ok'&&j.items?.length){
          j.items.forEach(n=>{
            if(n.title&&n.link&&!seen.has(n.link)&&isBitcoinNews(n.title)){
              seen.add(n.link);
              results.push({id:n.link,title:n.title,url:n.link,source:j.feed?.title||'Bitcoin News',date:new Date(n.pubDate)});
            }
          });
        }
      }
    }catch(e){console.warn('rss2json fallback',e);}
  }
  results=results.sort((a,b)=>b.date-a.date).slice(0,15);
  if(results.length>0)S.news=results;
  else if(S.news.length===0)S.news=[{id:'err',title:'No se pudieron cargar noticias. Inténtalo de nuevo.',url:'#',source:'Error',date:new Date()}];
}
function calcEMA(p,k){const m=2/(k+1),e=[];p.forEach((v,i)=>{e.push(i===0?v:v*m+e[i-1]*(1-m));});return e;}
function calcRSI(p,k=14){const r=new Array(k).fill(null);let g=0,l=0;for(let i=1;i<=k;i++){const d=p[i]-p[i-1];d>0?g+=d:l+=Math.abs(d);}let ag=g/k,al=l/k;for(let i=k;i<p.length;i++){const d=p[i]-p[i-1];ag=(ag*(k-1)+(d>0?d:0))/k;al=(al*(k-1)+(d<0?Math.abs(d):0))/k;r.push(100-(100/(1+(al===0?100:ag/al))));}return r;}
function analyze(){
  // Usar historial de 60 velas diarias si está disponible — siempre suficiente para TA
  const src=S.historyTA&&S.historyTA.length>=30?S.historyTA:S.history;
  const prices=src.map(h=>h.price);
  if(prices.length<14)return null;
  const last=prices[prices.length-1];
  const rsiArr=calcRSI(prices),lastRSI=rsiArr[rsiArr.length-1];
  const e12=calcEMA(prices,12),e26=calcEMA(prices,26);
  const macd=e12.map((v,i)=>v-e26[i]);
  const sig=calcEMA(macd.slice(26),9);
  const padSig=[...new Array(26).fill(null),...new Array(macd.length-26-sig.length).fill(null),...sig];
  const lMACD=macd[macd.length-1],lSig=padSig[padSig.length-1];
  const sma7=prices.slice(-7).reduce((a,b)=>a+b,0)/7;
  const sma30=prices.slice(-30).reduce((a,b)=>a+b,0)/30;
  const sl20=prices.slice(-20),m20=sl20.reduce((a,b)=>a+b,0)/20;
  const std=Math.sqrt(sl20.reduce((a,b)=>a+(b-m20)**2,0)/sl20.length);
  const bbU=m20+2*std,bbL=m20-2*std;
  const recent=prices.slice(-30);
  const support=Math.min(...recent)*0.98,resistance=Math.max(...recent)*1.02;
  let bull=0,bear=0;
  if(lastRSI<30)bull+=3;else if(lastRSI<45)bull+=1;else if(lastRSI>70)bear+=3;else if(lastRSI>55)bear+=1;
  if(sma7>sma30)bull+=2;else bear+=2;
  if(lMACD>lSig)bull+=2;else bear+=2;
  if(last<bbL)bull+=2;else if(last>bbU)bear+=2;
  const total=bull+bear,bullPct=total>0?Math.round((bull/total)*100):50;
  const signal=bullPct>=65?'COMPRAR':bullPct<=35?'VENDER':'NEUTRAL';
  return{lastRSI,sma7,sma30,lMACD,lSig,bbU,bbL,support,resistance,bullPct,bearPct:100-bullPct,signal,last,rsiData:rsiArr.slice(-40).filter(v=>v!=null),macdData:macd.slice(-40),sigData:padSig.slice(-40)};
}
function miniLine(data,color,h=65,refs=[]){
  const v=data.filter(x=>x!=null);if(!v.length)return'';
  const min=Math.min(...v),max=Math.max(...v),range=max-min||1;
  const W=300,H=h,P=4;
  const pts=data.map((x,i)=>{if(x==null)return null;return`${P+(i/(data.length-1))*(W-P*2)},${P+(1-(x-min)/range)*(H-P*2)}`;}).filter(Boolean).join(' ');
  const rls=refs.map(({val,color:rc})=>{const y=P+(1-(val-min)/range)*(H-P*2);return`<line x1="${P}" y1="${y}" x2="${W-P}" y2="${y}" stroke="${rc}" stroke-dasharray="4 3" stroke-width="1" opacity=".7"/>`;}).join('');
  return`<svg viewBox="0 0 ${W} ${H}" class="mini-chart" preserveAspectRatio="none">${rls}<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/></svg>`;
}
function fmtPrice(v){if(v>=1e6)return(v/1e6).toFixed(2)+'M';if(v>=1e3)return(v/1e3).toFixed(1)+'k';return v.toFixed(0);}

function areaSVG(data){
  if(!data.length)return'';
  const prices=data.map(d=>d.price);
  const min=Math.min(...prices),max=Math.max(...prices),range=max-min||1;
  const W=320,H=180,PL=52,PR=6,PT=14,PB=26;
  const cw=W-PL-PR,ch=H-PT-PB;
  const last=prices[prices.length-1],first=prices[0];
  const color=last>=first?'#10b981':'#ef4444';
  const toX=i=>PL+(i/(data.length-1||1))*cw;
  const toY=v=>PT+ch-((v-min)/range)*ch;
  let gridLines='',yLabels='';
  const levels=4;
  for(let i=0;i<=levels;i++){
    const v=min+(range/levels)*i;
    const y=toY(v);
    gridLines+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#1e293b" stroke-width="1"/>`;
    yLabels+=`<text x="${PL-4}" y="${y+4}" font-size="9" fill="#64748b" text-anchor="end">${fmtPrice(v)}</text>`;
  }
  let xLabels='';
  const nLabels=Math.min(5,data.length);
  const step=Math.floor((data.length-1)/(nLabels-1||1));
  for(let i=0;i<nLabels;i++){
    const idx=Math.min(i*step,data.length-1);
    const d=data[idx];
    const x=toX(idx);
    const label=d.time?new Date(d.time).toLocaleDateString('ca-ES',{day:'2-digit',month:'2-digit'}):d.date||'';
    if(label) xLabels+=`<text x="${x}" y="${H-PB+14}" font-size="8" fill="#64748b" text-anchor="middle">${label}</text>`;
  }
  const pts=data.map((d,i)=>`${toX(i)},${toY(d.price)}`);
  const area=`<polygon points="${PL},${PT+ch} ${pts.join(' ')} ${toX(data.length-1)},${PT+ch}" fill="url(#ag${color==='#10b981'?'g':'r'})"/>`;
  const line=`<polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
  const cx=toX(data.length-1),cy=toY(last);
  const dot=`<circle cx="${cx}" cy="${cy}" r="3.5" fill="${color}" stroke="#0f172a" stroke-width="1.5"><animate attributeName="r" values="3.5;5;3.5" dur="2s" repeatCount="indefinite"/></circle>`;
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:195px;display:block" preserveAspectRatio="none">
    <defs>
      <linearGradient id="agg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10b981" stop-opacity=".25"/><stop offset="100%" stop-color="#10b981" stop-opacity="0"/></linearGradient>
      <linearGradient id="agr" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ef4444" stop-opacity=".25"/><stop offset="100%" stop-color="#ef4444" stop-opacity="0"/></linearGradient>
    </defs>
    ${gridLines}${area}${line}${dot}${yLabels}${xLabels}
  </svg>`;
}

function candleSVG(data){
  if(!data.length)return'';
  const ps=data.flatMap(d=>[d.high,d.low]);
  const min=Math.min(...ps),max=Math.max(...ps),range=max-min||1;
  const W=320,H=210,PL=52,PR=6,PT=14,PB=26;
  const cw=W-PL-PR,ch=H-PT-PB;
  const toY=v=>PT+ch-((v-min)/range)*ch;
  const toX=i=>PL+(i+.5)*(cw/data.length);
  const cW=Math.max(2,Math.floor(cw/data.length)-2);
  let gridLines='',yLabels='';
  const levels=4;
  for(let i=0;i<=levels;i++){
    const v=min+(range/levels)*i;
    const y=toY(v);
    gridLines+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#1e293b" stroke-width="1"/>`;
    yLabels+=`<text x="${PL-4}" y="${y+4}" font-size="9" fill="#64748b" text-anchor="end">${fmtPrice(v)}</text>`;
  }
  let xLabels='';
  const nLabels=Math.min(5,data.length);
  const step=Math.floor((data.length-1)/(nLabels-1||1));
  for(let i=0;i<nLabels;i++){
    const idx=Math.min(i*step,data.length-1);
    const d=data[idx];
    const x=toX(idx);
    const label=d.time?new Date(d.time).toLocaleDateString('ca-ES',{day:'2-digit',month:'2-digit'}):d.date||'';
    if(label) xLabels+=`<text x="${x}" y="${H-PB+14}" font-size="8" fill="#64748b" text-anchor="middle">${label}</text>`;
  }
  const candles=data.map((d,i)=>{
    const up=d.close>=d.open,x=toX(i),col=up?'#10b981':'#ef4444';
    const yH=toY(d.high),yL=toY(d.low),yO=toY(d.open),yC=toY(d.close);
    const bT=Math.min(yO,yC),bH=Math.max(1.5,Math.abs(yO-yC));
    return`<line x1="${x}" y1="${yH}" x2="${x}" y2="${yL}" stroke="${col}" stroke-width="1" opacity=".8"/><rect x="${x-cW/2}" y="${bT}" width="${cW}" height="${bH}" fill="${col}" rx="1"/>`;
  }).join('');
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:225px;display:block" preserveAspectRatio="none">
    ${gridLines}${candles}${yLabels}${xLabels}
  </svg>`;
}

function renderCyclesChart(){

  const day2024=getCycleDay2024();
  const maxDays=Math.max(730,day2024+30);

  // Escala Y: multiplicadores 0.5 → máximo (~35)
  const allMults=[...CYCLE_DATA.c2016.points,...CYCLE_DATA.c2020.points].map(p=>p[1]);

  const yMin=0.5;

  const ty=m=>PY+ch-(((m-yMin)/(yMax-yMin))*ch);

    dot2024=`<circle cx="${cx2}" cy="${cy2}" r="5" fill="#f97316" stroke="#0f172a" stroke-width="2"/>`;

// ─── WebSocket precio en tiempo real ─────────────────────────────────────────
let _ws=null, _wsRetries=0;
function startPriceWS(){
  if(_ws&&(_ws.readyState===0||_ws.readyState===1))return; // ya conectado
  try{
    _ws=new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@miniTicker');
    _ws.onopen=()=>{_wsRetries=0;console.log('[WS] Conectado');
      // Indicador visual
      const d=document.getElementById('ws-dot');if(d){d.style.background='#10b981';d.title='Precio en tiempo real';}
    };
    _ws.onmessage=(e)=>{
      try{
        const t=JSON.parse(e.data);
        const newPrice=parseFloat(t.c);
        if(!newPrice||newPrice<=0)return;
        const prev=S.price.usd;
        S.price.usd=newPrice;
        // Actualizar cambio 24h desde apertura
        if(t.o&&parseFloat(t.o)>0){
          S.change24h=((newPrice-parseFloat(t.o))/parseFloat(t.o))*100;
        }
        // Flash verde/rojo en header
        const hp=document.getElementById('header-price');
        const arrow=document.getElementById('header-arrow');
        if(hp&&prev>0&&prev!==newPrice){
          const up=newPrice>prev;
          const col=up?'#10b981':'#ef4444';
          hp.style.transition='color .4s';
          hp.style.color=col;
          // Animació flash de fons
          hp.style.textShadow=`0 0 12px ${col}88`;
          setTimeout(()=>{hp.style.color='';hp.style.textShadow='';},700);
          // Fletxa direccional
          if(arrow){
            arrow.textContent=up?'▲':'▼';
            arrow.style.color=col;
            arrow.style.opacity='1';
            arrow.style.transform=up?'translateY(-2px)':'translateY(2px)';
            setTimeout(()=>{arrow.style.opacity='0.5';arrow.style.transform='none';},700);
          }
        }
        updateHeader();
        // Actualizar conversor si tab activo
        if(S.currentTab==='home'){
          const el=document.getElementById('tab-home');
          if(el){
            // Solo actualizar los valores del conversor y stats, no redibujar el gráfico
            const upd=new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
            const updEl=document.querySelector('.stat-val[data-upd]');
            if(updEl)updEl.textContent=upd;
          }
        }
      }catch{}
    };
    _ws.onerror=()=>{};
    _ws.onclose=()=>{
      const d=document.getElementById('ws-dot');if(d){d.style.background='#ef4444';d.title='Reconectando...';}
      _wsRetries++;
      const delay=Math.min(30000,2000*Math.pow(2,_wsRetries)); // backoff exponencial
      setTimeout(startPriceWS,delay);
    };
  }catch(e){console.warn('[WS]',e);}
}

function renderTab(tab){
  const el=document.getElementById('tab-'+tab);if(!el)return;
  // Skeleton map — mostra mentre carrega
  const skeletonMap={home:skeletonHome,analysis:skeletonAnalysis,market:skeletonMarket,mempool:skeletonGeneric,news:skeletonGeneric,corr:skeletonGeneric,global:skeletonGeneric,forecast:skeletonGeneric,cycles:skeletonGeneric};
  const map={home:renderHome,analysis:renderAnalysis,market:renderMarket,mempool:renderMempool,atm:renderATM,news:renderNews,alerts:renderAlerts,corr:renderCorr,global:renderGlobal,forecast:renderForecast,cycles:renderCycles,dca:renderDCA};
  // El tab ATM no se re-renderiza si el mapa ya está activo — evita destruir Leaflet
  if(tab==='atm'&&S.leafletMap){
    return;
  }
  if(map[tab]){
    // Mostrar skeleton si la tab no té dades encara
    const needsSkeleton=(tab==='home'&&S.price.usd===0)||(tab==='analysis'&&!S.historyTA?.length)||(tab==='market'&&!S.marketData)||(tab==='mempool'&&!S.mempool)||(tab==='news'&&!S.news.length)||(tab==='cycles'&&!S.cycleHistory);
    if(needsSkeleton&&skeletonMap[tab]){
      el.innerHTML=skeletonMap[tab]();
      // Tornar a renderitzar quan les dades arribin
      const waitAndRender=()=>{
        const stillNeeds=(tab==='home'&&S.price.usd===0)||(tab==='analysis'&&!S.historyTA?.length)||(tab==='market'&&!S.marketData)||(tab==='mempool'&&!S.mempool)||(tab==='news'&&!S.news.length)||(tab==='cycles'&&!S.cycleHistory);
        if(!stillNeeds||S.currentTab!==tab)return;
        setTimeout(waitAndRender,400);
      };
      setTimeout(()=>{if(S.currentTab===tab)try{el.innerHTML=map[tab]();}catch(e){el.innerHTML=skeletonMap[tab]();}},400);
      return;
    }
    try{el.innerHTML=map[tab]();}
    catch(e){
      console.error('renderTab error ['+tab+']:',e);
      el.innerHTML='<div style="padding:30px;text-align:center"><div style="font-size:32px">⚠️</div><br><b style="color:#f97316">Error al carregar</b><br><small style="color:#999">'+e.message+'</small><br><br><button onclick="location.reload()" style="margin-top:12px;padding:10px 20px;background:#f97316;color:white;border:none;border-radius:10px;cursor:pointer">🔄 Reintentar</button></div>';
    }
  }
  if(tab==='atm'&&!S.atmLoaded)initATM();
}

function calcConv(f,raw){
  const v=parseFloat(raw),ok=!isNaN(v)&&v>=0,pU=S.price.usd,pE=S.price.eur;
  if(!ok){['btc','sats','usd','eur'].filter(x=>x!==f).forEach(x=>{const e=document.getElementById('inp-'+x);if(e)e.value='';});return;}
  let btc=S.conv_btc||1,sats=S.conv_sats||1e8,usd=S.conv_usd||0,eur=S.conv_eur||0;
  if(f==='btc'){btc=v;sats=(v*1e8).toFixed(0);usd=(v*pU).toFixed(2);eur=(v*pE).toFixed(2);}
  else if(f==='sats'){const b=v/1e8;btc=b.toFixed(8).replace(/\.?0+$/,'');sats=v;usd=(b*pU).toFixed(2);eur=(b*pE).toFixed(2);}
  else if(f==='usd'&&pU){const b=v/pU;btc=b.toFixed(8);sats=(b*1e8).toFixed(0);usd=v;eur=(b*pE).toFixed(2);}
  else if(f==='eur'&&pE){const b=v/pE;btc=b.toFixed(8);sats=(b*1e8).toFixed(0);usd=(b*pU).toFixed(2);eur=v;}
  S.conv_btc=btc;S.conv_sats=sats;S.conv_usd=usd;S.conv_eur=eur;
  ['btc','sats','usd','eur'].filter(x=>x!==f).forEach(x=>setI(x,S['conv_'+x]));
}

function calcRainbow(price){
  const genesis=new Date('2009-01-03').getTime();
  const days=(Date.now()-genesis)/(1000*60*60*24);
  const log10Days=Math.log10(days); // IMPORTANTE: log10, no logaritmo natural
  const a=5.84,b=-17.01;
  const center=Math.pow(10,a*log10Days+b);
  const step=0.38;
  const bands=[
    {label:'Zona de venta máxima',color:'#ef4444',mult:Math.pow(10,step*4)},
    {label:'Muy caro — vende',color:'#f97316',mult:Math.pow(10,step*3)},
    {label:'FOMO intenso',color:'#fb923c',mult:Math.pow(10,step*2)},
    {label:'Caro',color:'#eab308',mult:Math.pow(10,step*1)},
    {label:'Precio justo',color:'#84cc16',mult:1},
    {label:'Todavía barato',color:'#22c55e',mult:Math.pow(10,-step*1)},
    {label:'Acumula',color:'#10b981',mult:Math.pow(10,-step*2)},
    {label:'Oferta histórica',color:'#06b6d4',mult:Math.pow(10,-step*3)},
    {label:'Compra máximo',color:'#3b82f6',mult:Math.pow(10,-step*4)},
  ];
  const priceBands=bands.map(b=>({...b,price:center*b.mult}));
  let currentBand=priceBands[priceBands.length-1];
  for(let i=0;i<priceBands.length-1;i++){
    if(price>=priceBands[i].price){currentBand=priceBands[i];break;}
  }
  return{bands:priceBands,currentBand,center};
}
function analyzeSentiment(title){
  const t=title.toLowerCase();
  const bull=['sube','subida','máximo','record','supera','alcanza','adopción','aprueba','compra','acumula','bull','rally','verde','crece','positivo','boom','logro','avance','dispara','eleva','histórico','etf','institucional'];
  const bear=['baja','caída','cae','mínimo','pierde','pérdida','bear','rojo','colapso','crash','crisis','prohibe','vende','hackeo','robo','fraude','multa','investigación','prohibición','negativo','desplome','hunde','riesgo','problema'];
  let score=0;
  bull.forEach(w=>{if(t.includes(w))score++;});
  bear.forEach(w=>{if(t.includes(w))score--;});
  if(score>0)return{label:'Alcista',color:'#10b981',icon:'📈',score};
  if(score<0)return{label:'Bajista',color:'#ef4444',icon:'📉',score};
  return{label:'Neutral',color:'#94a3b8',icon:'➖',score};
}

  const arc=(s,e)=>{
    const x1=cx+r*Math.cos(toRad(s)),y1=cy+r*Math.sin(toRad(s));
    const x2=cx+r*Math.cos(toRad(e)),y2=cy+r*Math.sin(toRad(e));

async function fetchCorr(){
  S.corrError=null;
  const days=parseInt(S.corrPeriod)||30;
  const limit=days<=30?35:days<=90?95:370;
  const range=days<=30?'1mo':days<=90?'3mo':'1y';

  // Obtenir BTC de Binance (sempre funciona)
  let btcPrices=[];
  try{
    const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=${limit}`);
    const j=await r.json();
    btcPrices=j.map(k=>parseFloat(k[4]));
  }catch(e){console.warn('BTC klines:',e);}

  // Intentar S&P500 i Or via múltiples proxies en paral·lel
  const spyUrl=`https://query1.finance.yahoo.com/v8/finance/chart/SPY?interval=1d&range=${range}`;
  const gldUrl=`https://query1.finance.yahoo.com/v8/finance/chart/GLD?interval=1d&range=${range}`;
  const mstrUrl=`https://query1.finance.yahoo.com/v8/finance/chart/MSTR?interval=1d&range=${range}`;

  const proxies=[
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?',
    'https://api.codetabs.com/v1/proxy?quest=',
    'https://thingproxy.freeboard.io/fetch/',
    'https://proxy.cors.sh/',
  ];

  async function fetchWithProxies(url){
    // Intentar directe primer (de vegades funciona)
    const attempts=[
      ()=>fetch(url,{signal:AbortSignal.timeout(6000)}),
      ...proxies.map(p=>()=>fetch(p+encodeURIComponent(url),{signal:AbortSignal.timeout(8000)}))
    ];
    for(const attempt of attempts){
      try{
        const r=await attempt();
        if(!r.ok) continue;
        const j=await r.json();
        const prices=(j.chart?.result?.[0]?.indicators?.quote?.[0]?.close||[]).filter(v=>v!=null);
        if(prices.length>=5) return prices;
      }catch{}
    }
    return [];
  }

  // Intentar via Stooq (CSV, sense proxy, CORS obert)
  async function fetchStooq(symbol, nDays){
    const alts={'spx.us':['^spx','spy.us'],'xauusd':['^xau','xau.us']};
    const symbols=[symbol,...(alts[symbol]||[])];
    const to=new Date();
    const from=new Date(Date.now()-nDays*86400000*1.5);
    const fmt=d=>`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    for(const s of symbols){
      try{
        const url=`https://stooq.com/q/d/l/?s=${encodeURIComponent(s)}&d1=${fmt(from)}&d2=${fmt(to)}&i=d`;
        const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
        if(!r.ok) continue;
        const txt=await r.text();
        if(txt.includes('No data')||txt.trim().length<20) continue;
        const rows=txt.trim().split('\n').slice(1);
        const prices=rows.map(row=>{const cols=row.split(',');return parseFloat(cols[4]||cols[1]);}).filter(v=>!isNaN(v)&&v>0);
        if(prices.length>=5) return prices;
      }catch{}
    }
    return [];
  }

  // Executar tot en paral·lel
  const [spyPrices, goldPrices, mstrPrices, spyStooq, goldStooq] = await Promise.all([
    fetchWithProxies(spyUrl),
    fetchWithProxies(gldUrl),
    fetchWithProxies(mstrUrl),
    fetchStooq('spx.us', days),    // S&P500 via Stooq
    fetchStooq('xauusd', days),   // Or via Stooq (XAU/USD)
  ]);

  // Prioritzar la font que tingui més dades
  const finalSpy = spyPrices.length >= spyStooq.length ? spyPrices : spyStooq;
  const finalGold = goldPrices.length >= goldStooq.length ? goldPrices : goldStooq;

  if(!finalSpy.length || !finalGold.length){
    S.corrData=null;
    S.corrError="No s'han pogut carregar dades del S&P500 i Or. Totes les fonts estan no disponibles. Prova-ho mes tard.";
    renderTab('corr');
    return;
  }

  const normalize=arr=>{const base=arr[0]||1;return arr.map(v=>(v/base)*100);};
  const minLen=Math.min(btcPrices.length||999, finalSpy.length, finalGold.length, mstrPrices.length||999);
  const useMstr=mstrPrices.length>=5;
  if(minLen<5){S.corrData=null;S.corrError='Dades insuficients per calcular correlació.';return;}
  const btcN=normalize(btcPrices.slice(-minLen));
  const spyN=normalize(finalSpy.slice(-minLen));
  const goldN=normalize(finalGold.slice(-minLen));
  const mstrN=useMstr?normalize(mstrPrices.slice(-minLen)):null;
  const pearson=(a,b)=>{
    if(!a||!b||a.length<2||b.length<2)return 0;
    const n=Math.min(a.length,b.length);
    const an=a.slice(-n),bn=b.slice(-n);
    const ma=an.reduce((s,v)=>s+v,0)/n,mb=bn.reduce((s,v)=>s+v,0)/n;
    const num=an.reduce((s,v,i)=>s+(v-ma)*(bn[i]-mb),0);
    const da=Math.sqrt(an.reduce((s,v)=>s+(v-ma)**2,0));
    const db=Math.sqrt(bn.reduce((s,v)=>s+(v-mb)**2,0));
    return(da&&db)?num/(da*db):0;
  };
  const w=Math.min(14,minLen);
  const rollCorr=(a,b)=>{
    if(!a||!b)return[];
    return a.map((_,i)=>i<w-1?null:pearson(a.slice(i-w+1,i+1),b.slice(i-w+1,i+1)));
  };
  S.corrData={
    btc:btcN,spy:spyN,gold:goldN,mstr:mstrN,
    corrBtcSpy:pearson(btcN,spyN),
    corrBtcGold:pearson(btcN,goldN),
    corrBtcMstr:mstrN?pearson(btcN,mstrN):null,
    corrSpyGold:pearson(spyN,goldN),
    rollBtcSpy:rollCorr(btcN,spyN),
    rollBtcGold:rollCorr(btcN,goldN),
    rollBtcMstr:mstrN?rollCorr(btcN,mstrN):null,
    len:minLen,
    mstrLastPrice:mstrPrices.length?mstrPrices[mstrPrices.length-1]:null,
    mstrChange:mstrPrices.length>=2?((mstrPrices[mstrPrices.length-1]-mstrPrices[0])/mstrPrices[0]*100):null
  };
}

async function loadWorldMap(){
  const wrap=document.getElementById('world-map-wrap');
  if(!wrap)return;
  const svgDiv=document.getElementById('world-map-svg');
  if(!svgDiv)return;
  try{
    const res=await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json',{signal:AbortSignal.timeout(8000)});
    if(!res.ok)throw new Error('No se pudo cargar');
    const topo=await res.json();
    if(!window.topojson){
      await new Promise((resolve,reject)=>{
        const s=document.createElement('script');
        s.src='https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js';
        s.onload=resolve; s.onerror=reject;
        document.head.appendChild(s);
      });
    }
    const countries=topojson.feature(topo,topo.objects.countries);
    const W=500,H=250;
    const project=([lng,lat])=>[((lng+180)/360)*W, ((90-lat)/180)*H];
    const pathStr=geo=>{
      if(!geo||!geo.coordinates)return'';
      const parts=geo.type==='Polygon'?[geo.coordinates]:geo.coordinates;
      return parts.map(rings=>rings.map((ring,ri)=>{
        const pts=ring.map(project);
        return pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')+'Z';
      }).join(' ')).join(' ');
    };
    const paths=countries.features.map(f=>'<path d="'+pathStr(f.geometry)+'" fill="#1e3a5f" stroke="#2d5a8e" stroke-width="0.4"/>').join('');
    const svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block" id="world-svg">'
      +'<rect width="'+W+'" height="'+H+'" fill="#0d1b2a"/>'
      +'<line x1="0" y1="125" x2="500" y2="125" stroke="#1a3a5c" stroke-width="0.5" stroke-dasharray="3 3"/>'
      +paths
      +'</svg>';
    svgDiv.innerHTML=svg;
    renderMapDots(W,H);
  }catch(e){
    console.warn('World map CDN failed, using static fallback',e);
    svgDiv.innerHTML=getStaticWorldSVG();
    renderMapDots(500,250);
  }
}

    // Índice de interés retail (0-100)

  OC.loaded=true;
  if(S.currentTab==='forecast')renderTab('forecast');
}

    else if(etfBear&&!domHigh){institutionalScore=-0.10;institutionalDesc='ETF flows negativos + dominancia baja. Reducción de exposición institucional.';}
    else if(etfBear){institutionalScore=-0.05;institutionalDesc='ETF flows negativos. Salidas institucionales moderadas.';}
    else{institutionalScore=0.04;institutionalDesc='ETF flows neutrales. Acumulación institucional estable sin señal direccional clara.';}
    if(mstrBull)institutionalScore=Math.min(0.15,institutionalScore+0.03);
  }

  // ── Macro Fed/inflación: derivado de M2 + DXY (ya tenemos datos reales)
  let macroScore=0, macroDesc='';
  {

  const fgScore=fg<25?0.12:fg<40?0.08:fg<55?0.02:fg<70?-0.03:-0.08;
  const fgDesc='Fear & Greed: '+fg+'/100 — '+(fg<40?'Zona de miedo = oportunidad histórica de acumulación.':fg>70?'Codicia alta = precaución, posible corrección.':'Zona neutral.');
  const domScore=dom>58?0.08:dom>50?0.04:dom>42?0.00:-0.04;
  const domDesc='Dominancia BTC: '+dom.toFixed(1)+'%. '+(dom>55?'Alta dominancia: capital en Bitcoin, señal alcista para BTC.':'Altcoins compitiendo por capital.');
  // ── Regulación: derivada de dominancia + tendencia ETF (proxy de clima regulatorio)
  let regulationScore=0, regulationDesc='';

    const etfOk=OC.etfFlows&&OC.etfFlows.trend!=='strong_outflow';

  // ── Riesgo sistémico: derivado de Fear&Greed + S&P correlación + DXY

    let risk=0;

  }
  // ── M2 / Liquidez global
  let m2Score=0, m2Desc='';

    }else if(trend==='contracting'&&change12m>-2){

    }else{
      m2Score=-0.10;
      m2Desc='M2 EE.UU. $'+currentT+' — Contracción significativa ('+change12m.toFixed(1)+'% anual). Históricamente precede correcciones en activos de riesgo incluyendo BTC.';

  }else{
    m2Score=0.03;

  // ── SOPR
  let soprScore=0, soprDesc='';

    else if(signal==='near_breakeven'&&trend==='rising'){soprScore=0.07;soprDesc='SOPR '+value.toFixed(3)+' — Cerca de 1 y subiendo. Mercado saliendo de zona de pérdidas. Señal alcista temprana.';}
    else if(signal==='near_breakeven'){soprScore=0.02;soprDesc='SOPR '+value.toFixed(3)+' — En punto de equilibrio. Holders ni ganando ni perdiendo. Zona de indecisión.';}
    else if(signal==='profit_taking'&&trend==='rising'){soprScore=0.04;soprDesc='SOPR '+value.toFixed(3)+' — Holders en beneficios, tendencia alcista. Mercado sano pero vigilar posible toma de beneficios.';}
    else{soprScore=-0.08;soprDesc='SOPR '+value.toFixed(3)+' — Zona de distribución alta. Holders vendiendo con grandes ganancias. Históricamente precede correcciones.';}
  }else{soprScore=0.02;soprDesc='SOPR: calculando desde datos blockchain...';}

  // ── MVRV-Z Score proxy
  let mvrvScore=0, mvrvDesc='';

    const{value:z,signal}=OC.mvrvZ;
    if(signal==='extreme_undervalued'){mvrvScore=0.15;mvrvDesc='MVRV-Z Score '+z.toFixed(2)+' — Precio muy por debajo de la media histórica. Zona históricamente de compra máxima (similar a suelos de 2018 y 2022).';}
    else if(signal==='undervalued'){mvrvScore=0.09;mvrvDesc='MVRV-Z Score '+z.toFixed(2)+' — Infravalorado respecto al historial. Buena zona de acumulación con riesgo asimétrico favorable.';}
    else if(signal==='fair_value'){mvrvScore=0.03;mvrvDesc='MVRV-Z Score '+z.toFixed(2)+' — Precio en zona de valor justo. Ni sobrecomprado ni sobrevendido. Neutral.';}

  let ssrScore=0, ssrDesc='';

  let dxyScore=0,dxyDesc='';

    else if(trend==='mild_usd'){dxyScore=-0.05;dxyDesc='DXY '+value.toFixed(1)+' — Dólar fortaleciéndose levemente. Viento en contra moderado para BTC.';}

  }else{dxyScore=0;dxyDesc='DXY: cargando datos del índice del dólar...';}

  let lightningScore=0,lightningDesc='';

  }else{rainbowScore=0;rainbowDesc='Rainbow Chart: calculando posición histórica...';}

  let whaleScore=0,whaleDesc='';

    else{whaleScore=0.01;}

  let etfScore=0,etfDesc='';

  let trendsScore=0,trendsDesc='';

  // ── MEJORA 2: Descorelación de factores técnicos
  // RSI, Stoch RSI y taComposite están altamente correlacionados (miden momentum)
  // MACD y OBV también solapan en tendencia
  // Aplicar factor de descuento para evitar doble conteo
  const momentumRaw = rsiScore + stochRsiScore + taCompositeScore; // 3 factores de momentum
  const trendRaw    = macdScore + obvScore + adxScore;             // 3 factores de tendencia
  const priceRaw    = bbScore + smaScore;                          // 2 factores de precio
  // Promedio ponderado en lugar de suma directa — evita que 3 señales iguales pesen x3
  const momentumAdj = momentumRaw / 3 * 1.5; // normalizado pero con peso x1.5 vs uno solo
  const trendAdj    = trendRaw / 3 * 1.2;
  const priceAdj    = priceRaw / 2 * 0.8;
  const taTotal     = momentumAdj + trendAdj + priceAdj;

  const onChainTotal=hashrateScore+addressScore+volumeScore+oiScore+frScore+netflowScore+soprScore+mvrvScore+ssrScore+puellScore+lsScore+whaleScore+lightningScore;
  const macroTotal=halvingScore+institutionalScore+macroScore+fgScore+domScore+regulationScore+riskScore+corrScore+m2Score+dxyScore+etfScore+trendsScore+rainbowScore;

  // ── MEJORA 1: Detectar régimen de mercado y ajustar pesos dinámicamente
  // Régimen basado en: precio vs SMA, dominancia, Fear&Greed, hashrate
  const sma30val=ta?.sma30||0;
  const sma7val=ta?.sma7||0;
  const aboveSMA30=sma30val>0&&currentPrice>sma30val;
  const aboveSMA7=sma7val>0&&currentPrice>sma7val;
  const strongTrend=Math.abs(adxScore)>0.08;

  let regime, regimeDesc, wTA, wOC, wMacro;
  if(aboveSMA30&&aboveSMA7&&fg>55&&dom>52){

  } else if(!aboveSMA30&&fg<40&&dom<50){
    regime='bear';

    wTA=0.25; wOC=0.35; wMacro=0.40; // macro y on-chain dominan en bajadas
  } else if(strongTrend&&aboveSMA30){
    regime='trend_up';
    regimeDesc='Tendencia alcista fuerte (ADX elevado, sobre SMA30)';
    wTA=0.45; wOC=0.25; wMacro=0.30;
  } else if(strongTrend&&!aboveSMA30){

    regimeDesc='Tendencia bajista fuerte (ADX elevado, bajo SMA30)';
    wTA=0.30; wOC=0.35; wMacro=0.35;
  } else {

  }

  const netScore = taTotal*wTA + onChainTotal*wOC + macroTotal*wMacro;

  // BTC en bull sube más de lo que cae; en bear cae más de lo que sube
  const asymBull = regime==='bull'?1.35:regime==='bear'?0.70:regime==='trend_up'?1.20:regime==='trend_down'?0.80:1.0;
  const asymBear = regime==='bull'?0.75:regime==='bear'?1.40:regime==='trend_up'?0.80:regime==='trend_down'?1.25:1.0;
  // Volatilidad ajustada por régimen
  const volAdj = regime==='bull'?1.15:regime==='bear'?1.30:regime==='lateral'?0.85:1.0;
  const volWeek=0.06*volAdj, volMonth=0.18*volAdj, vol6M=0.45*volAdj, volYear=0.75*volAdj;
  const horizons=[
    {
      label:'1 semana', days:7, icon:'📅',

  const factors=[

function exportConfig(){

    alerts:S.alerts,
    morningAlert:S.morningAlert,
    lang:S.lang,
    dark:S.dark,
    days:S.days,
    chartType:S.chartType,
    corrPeriod:S.corrPeriod,
    exported:new Date().toISOString()
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='satsflow-config-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);

function importConfig(){
  const inp=document.createElement('input');
  inp.type='file';
  inp.accept='.json';
  inp.onchange=async e=>{
    const file=e.target.files[0];
    if(!file)return;
    try{
      const txt=await file.text();
      const data=JSON.parse(txt);
      if(data.alerts){S.alerts=data.alerts;saveAlerts();}
      if(data.morningAlert){S.morningAlert=data.morningAlert;localStorage.setItem('sf-morning',JSON.stringify(data.morningAlert));}
      if(data.lang){S.lang=data.lang;localStorage.setItem('sf-lang',data.lang);}
      if(data.dark!==undefined){S.dark=data.dark;localStorage.setItem('sf-theme',data.dark?'dark':'light');document.body.classList.toggle('light',!S.dark);}
      if(data.days){S.days=data.days;}
      if(data.chartType){S.chartType=data.chartType;}
      if(data.corrPeriod){S.corrPeriod=data.corrPeriod;}
      showToast('✅ Config importada correctament!');
      renderTab(S.currentTab);
    }catch(err){
      showToast('❌ Error: fitxer no vàlid');
    }
  };
  inp.click();
}

function calcDCA(){
  const amount=parseFloat(document.getElementById('dca-amount')?.value)||100;
  const months=parseInt(document.getElementById('dca-months')?.value)||12;
  const startPrice=parseFloat(document.getElementById('dca-start')?.value)||50000;
  const currentPrice=S.price.usd*0.92||70000; // EUR approx
  if(!amount||!months||!startPrice||!currentPrice)return;
  // Simular compra mensual amb preu lineal de startPrice a currentPrice
  let totalInvested=0,totalBTC=0;
  for(let i=0;i<months;i++){
    const monthPrice=startPrice+((currentPrice-startPrice)*(i/(Math.max(1,months-1))));
    const btcBought=amount/monthPrice;
    totalInvested+=amount;
    totalBTC+=btcBought;
  }
  const currentValue=totalBTC*currentPrice;
  const profit=currentValue-totalInvested;
  const profitPct=(profit/totalInvested)*100;
  const avgPrice=totalInvested/totalBTC;
  const el=document.getElementById('dca-result');
  if(!el)return;
  el.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div style="background:var(--bg);border-radius:12px;padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);margin-bottom:4px">TOTAL INVERTIT</div>
        <div style="font-size:18px;font-weight:800;color:var(--text)">€${Math.round(totalInvested).toLocaleString()}</div>
      </div>
      <div style="background:var(--bg);border-radius:12px;padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);margin-bottom:4px">BTC ACUMULAT</div>
        <div style="font-size:18px;font-weight:800;color:#f97316">₿${totalBTC.toFixed(6)}</div>
      </div>
      <div style="background:var(--bg);border-radius:12px;padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);margin-bottom:4px">VALOR ACTUAL</div>
        <div style="font-size:18px;font-weight:800;color:#3b82f6">€${Math.round(currentValue).toLocaleString()}</div>
      </div>
      <div style="background:${profit>=0?'rgba(16,185,129,.1)':'rgba(239,68,68,.1)'};border:1px solid ${profit>=0?'rgba(16,185,129,.3)':'rgba(239,68,68,.3)'};border-radius:12px;padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);margin-bottom:4px">GUANY/PÈRDUA</div>
        <div style="font-size:18px;font-weight:800;color:${profit>=0?'#10b981':'#ef4444'}">${profit>=0?'+':''}€${Math.round(profit).toLocaleString()}</div>
        <div style="font-size:11px;color:${profit>=0?'#10b981':'#ef4444'}">${profitPct>=0?'+':''}${profitPct.toFixed(1)}%</div>
      </div>
    </div>
    <div style="background:var(--bg);border-radius:10px;padding:10px;font-size:11px;color:var(--text2)">
      Preu mig d'entrada: <b style="color:var(--text)">€${Math.round(avgPrice).toLocaleString()}</b> · 
      Preu actual: <b style="color:#f97316">€${Math.round(currentPrice).toLocaleString()}</b> · 
      Diferència: <b style="color:${currentPrice>=avgPrice?'#10b981':'#ef4444'}">${((currentPrice-avgPrice)/avgPrice*100).toFixed(1)}%</b>
    </div>
  `;
}

function chartHover(e){
  const wrap=document.getElementById('chart-wrap');
  const tip=document.getElementById('chart-tooltip');
  if(!wrap||!tip||!S.history.length)return;
  const rect=wrap.getBoundingClientRect();
  const x=e.clientX-rect.left;
  const pct=Math.max(0,Math.min(1,x/rect.width));
  const idx=Math.round(pct*(S.history.length-1));
  const pt=S.history[idx];
  if(!pt)return;
  const d=pt.date||'';
  const p='$'+Math.round(pt.price).toLocaleString();
  const h=pt.high?'↑$'+Math.round(pt.high).toLocaleString():'';
  const l=pt.low?'↓$'+Math.round(pt.low).toLocaleString():'';
  tip.innerHTML=`<span style="color:#94a3b8;font-size:10px">${d}</span><br>${p}${h?' <span style="color:#10b981">'+h+'</span>':''} ${l?'<span style="color:#ef4444">'+l+'</span>':''}`;
  // Posició: seguir cursor però no sortir de pantalla
  const tw=tip.offsetWidth||140;
  let left=e.clientX+12;
  if(left+tw>window.innerWidth-8)left=e.clientX-tw-12;
  tip.style.left=left+'px';
  tip.style.top=(e.clientY-36)+'px';
  tip.style.opacity='1';
  // Línia crosshair vertical al SVG
  const svg=wrap.querySelector('svg');
  if(svg){
    let line=svg.querySelector('#ch-line');
    if(!line){line=document.createElementNS('http://www.w3.org/2000/svg','line');line.id='ch-line';line.setAttribute('stroke','rgba(249,115,22,.6)');line.setAttribute('stroke-width','1');line.setAttribute('stroke-dasharray','4 3');svg.appendChild(line);}
    const svgRect=svg.getBoundingClientRect();
    const svgX=((e.clientX-svgRect.left)/svgRect.width*svg.viewBox.baseVal.width).toFixed(1);
    line.setAttribute('x1',svgX);line.setAttribute('x2',svgX);
    line.setAttribute('y1','0');line.setAttribute('y2',svg.viewBox.baseVal.height||200);
  }
}
function chartLeave(){

function renderRSIChart(){
  if(!S.history||S.history.length<14)return'';
  const prices=S.history.map(h=>h.price);
  const rsiArr=calcRSI(prices);
  const valid=rsiArr.filter(v=>v!=null);
  if(valid.length<5)return'';
  const W=320,H=60,P=6;
  const toX=i=>P+(i/(rsiArr.length-1))*(W-P*2);
  const toY=v=>P+(1-((v-0)/100))*(H-P*2);
  const pts=rsiArr.map((v,i)=>v!=null?`${toX(i).toFixed(1)},${toY(v).toFixed(1)}`:null).filter(Boolean).join(' ');
  const last=valid[valid.length-1];
  const rsiColor=last>70?'#ef4444':last<30?'#10b981':'#a855f7';
  return`<div style="background:#0a1628;border-radius:0 0 12px 12px;padding:2px 4px 4px;margin:0 -4px;margin-top:-4px">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:2px 4px;margin-bottom:2px">
      <span style="font-size:9px;color:#a855f7;font-weight:700">RSI (14)</span>
      <span style="font-size:10px;font-weight:800;color:${rsiColor}">${last.toFixed(1)} — ${last>70?'Sobrecomprat':last<30?'Sobrevenut':'Neutral'}</span>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:50px" preserveAspectRatio="none">
      <line x1="${P}" y1="${toY(70)}" x2="${W-P}" y2="${toY(70)}" stroke="#ef444466" stroke-width="1" stroke-dasharray="3 2"/>
      <line x1="${P}" y1="${toY(30)}" x2="${W-P}" y2="${toY(30)}" stroke="#10b98166" stroke-width="1" stroke-dasharray="3 2"/>
      <line x1="${P}" y1="${toY(50)}" x2="${W-P}" y2="${toY(50)}" stroke="#33415566" stroke-width="1"/>
      <polyline points="${pts}" fill="none" stroke="${rsiColor}" stroke-width="1.5" stroke-linejoin="round"/>
      <circle cx="${toX(rsiArr.length-1)}" cy="${toY(last)}" r="3" fill="${rsiColor}"/>
    </svg>
  </div>`;
}

/* ══════ WAKE-UP DETECTION (Android-safe) ══════ */
// El problema en Android: al reabrir la PWA tras una noche, el proceso JS
// arranca en estado "zombie" — sin datos, sin precio. La app queda en blanco.
// Solución: detectar el zombie DESPUÉS de que init() haya tenido tiempo de cargar.
// NO recargar durante el uso normal — solo cuando algo realmente falla.

const _TS_KEY = 'sf-last-active';
const _saveTS = () => { try { localStorage.setItem(_TS_KEY, Date.now().toString()); } catch {} };
const _getTS  = () => { try { return parseInt(localStorage.getItem(_TS_KEY)||'0')||0; } catch { return 0; } };

// Guardar timestamp al usar la app (no muy frecuente para no gastar batería)
_saveTS();
setInterval(_saveTS, 60000); // cada minuto, no cada 10 segundos
document.addEventListener('touchstart', _saveTS, {passive:true});

// ── Detector de zombie al arrancar ──
// Android mata el proceso por la noche → al reabrir el JS arranca sin datos.
// Comprobamos a los 5s, 12s y 20s — si el precio sigue a 0 → recargar.
function _checkZombie(attempt) {
  if (S.price && S.price.usd > 0) {
    sessionStorage.removeItem('sf-reloads');
    return; // OK
  }
  const delays = [5000, 12000, 20000];
  if (attempt < delays.length) {
    setTimeout(() => _checkZombie(attempt + 1), delays[attempt]);
    return;
  }
  // Tras 3 intentos (20s total) precio sigue a 0
  const reloadCount = parseInt(sessionStorage.getItem('sf-reloads')||'0');
  console.log('[SatsFlow] Zombie tras 20s, recarga #' + reloadCount);
  if (reloadCount < 3) {
    sessionStorage.setItem('sf-reloads', reloadCount + 1);
    _saveTS();
    window.location.reload();
  } else {
    sessionStorage.removeItem('sf-reloads');
    // Mostrar error en la pestaña activa en lugar de bucle infinito
    const tabEl = document.getElementById('tab-' + (S.currentTab||'home'));
    const errHTML = '<div style="padding:40px;text-align:center"><div style="font-size:40px">📡</div><br><b style="color:#f97316">Sin conexión</b><br><small style="color:#999;font-size:12px">Comprueba tu conexión a internet</small><br><br><button onclick="location.reload()" style="margin-top:16px;padding:12px 24px;background:#f97316;color:white;border:none;border-radius:10px;font-size:14px;cursor:pointer">🔄 Reintentar</button></div>';
    if (tabEl) tabEl.innerHTML = errHTML;
  }
}
setTimeout(() => _checkZombie(0), 5000);

// ── Visibilitychange: solo refrescar datos, nunca recargar la página ──
// Android mata el proceso por la noche → el zombie detector lo maneja al reabrir
// Aquí solo actualizamos el precio cuando el usuario vuelve a la app durante el día
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { _saveTS(); return; }
  // App visible de nuevo → refrescar precio silenciosamente
  if (S.price?.usd > 0) {
    fetchPrice().then(() => renderCurrentTab()).catch(() => {});
    // Comprobar aviso matutino al volver al primer plano
    setTimeout(()=>{try{_checkMorningNow();}catch{}},2000);
    // Comprobar snapshot diario al volver al primer plano
    // Captura: usuario abre la app a las 9:05 tras tenerla minimizada
    setTimeout(()=>{
      if(typeof scheduleDailySnapshot==='function'){
        const now=new Date();
        if(now.getHours()>=9&&S.price?.usd>0){
          const dateKey=now.toISOString().slice(0,10);
          openDB().then(db=>{
            const tx=db.transaction('predictions','readonly');
            const q=tx.objectStore('predictions').get(dateKey);
            q.onsuccess=()=>{if(!q.result)saveSnapshotIfNeeded(false);};
          }).catch(()=>{});
        }
      }
    }, 5000); // 5s para que fetchPrice termine
  }
  // Si lleva más de 6 horas sin usar Y el precio es 0 → recargar
  const inactiveH = (_getTS() > 0) ? (Date.now() - _getTS()) / 3600000 : 0;
  if (inactiveH > 6 && (!S.price || S.price.usd === 0)) {
    console.log('[SatsFlow] >6h inactiva + precio=0 — recargando');
    _saveTS();
    window.location.reload();
  }
});

init();
