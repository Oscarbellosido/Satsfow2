    {i:'🔮',n:tr.forecast||'Previsión',d:'Predicciones con 29 factores'},
    {i:'🔄',n:tr.cycles||'Ciclos',d:'Comparador de ciclos de halving'},
    {i:'📐',n:tr.dca||'DCA',d:'Calculadora de inversión periódica'},
  ];
  const div=document.createElement('div');
  div.className='modal-overlay';
  div.id='sf-onboard';
  div.innerHTML='<div class="modal-box" style="max-width:400px;max-height:90vh;overflow-y:auto">'
    +'<div style="font-size:22px;font-weight:800;margin-bottom:4px">'+tr.onboardTitle+'</div>'
    +'<div style="font-size:12px;color:var(--text3);margin-bottom:14px">'+tr.onboardSub+'</div>'
    +'<div class="onboard-grid">'
    +tabs.map(tb=>'<div class="onboard-item"><span class="onboard-item-icon">'+tb.i+'</span><div><div style="font-size:11px;font-weight:700">'+tb.n+'</div><div style="font-size:10px;color:var(--text3)">'+tb.d+'</div></div></div>').join('')
    +'</div>'
    +'<button class="btn-orange" style="width:100%;margin-top:14px" onclick="closeOnboarding()">'+tr.onboardStart+'</button>'
    +'</div>';
  document.body.appendChild(div);
}
function closeOnboarding(){
  localStorage.setItem('sf-onboarded','1');
  const m=document.getElementById('sf-onboard');
  if(m)m.remove();
}
async function init(){
  try{
    try{S.alerts=await loadAlertsDB();}catch(e){S.alerts=[];}
    try{renderTab('home');}catch(e){}
    try{await fetchPrice();}catch(e){console.warn('fetchPrice:',e);}
    try{renderTab('home');}catch(e){}
    try{if(S.lang&&S.lang!=='es')setLang(S.lang,true);}catch(e){}
    try{if(S.morningAlert?.enabled)scheduleMorningCheck();}catch(e){}
    setTimeout(async()=>{
      try{await Promise.all([fetchOHLC().catch(()=>{}),fetchMempool().catch(()=>{}),fetchMarket().catch(()=>{}),fetchMining().catch(()=>{}),fetchNews().catch(()=>{}),fetchCycleHistory().catch(()=>{}),fetchBlockInfo().catch(()=>{})]);}catch{}
      try{renderCurrentTab();}catch{}
    },200);
    setInterval(async()=>{try{await fetchPrice();checkAlerts();renderCurrentTab();}catch{}},60000);
    // WebSocket para precio tick a tick
    startPriceWS();
    // Scroll indicator del tabbar
    setTimeout(()=>{
      const nav=document.getElementById('tabbar');
      if(nav){nav.addEventListener('scroll',_updateTabFade,{passive:true});_updateTabFade();}
    },300);
    // Segunda llamada por si el layout aún no estaba listo
    setTimeout(_updateTabFade,1000);
    // Mejora 10: onboarding en primera visita
    setTimeout(showOnboarding, 800);
    // Mejora 11: swipe táctil entre tabs
    let _tx=0,_multiTouch=false;
    const _tabList=['home','analysis','market','mempool','atm','news','alerts','corr','global','forecast','cycles','dca'];
    const _cnt=document.getElementById('content');
    if(_cnt){
      _cnt.addEventListener('touchstart',e=>{_tx=e.changedTouches[0].clientX;_multiTouch=e.touches.length>1;},{passive:true});
      _cnt.addEventListener('touchmove',e=>{if(e.touches.length>1)_multiTouch=true;},{passive:true});
      _cnt.addEventListener('touchend',e=>{
        if(_multiTouch){_multiTouch=false;return;}
        // Ignorar toques que vienen del mapa (Leaflet intercepta el touchstart pero no el touchend)
        if(e.target.closest&&e.target.closest('#map-wrapper'))return;
        const dx=e.changedTouches[0].clientX-_tx;
        if(Math.abs(dx)>55&&Math.abs(dx)<300){
          const idx=_tabList.indexOf(S.currentTab);
          if(dx<0&&idx<_tabList.length-1)switchTab(_tabList[idx+1]);
          else if(dx>0&&idx>0)switchTab(_tabList[idx-1]);
        }
      },{passive:true});
    }
    // Mejora 11: navegación con teclas de flecha
    document.addEventListener('keydown',e=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA')return;
      if(e.key==='ArrowRight'||e.key==='ArrowLeft'){
        const idx=_tabList.indexOf(S.currentTab);
        if(e.key==='ArrowRight'&&idx<_tabList.length-1)switchTab(_tabList[idx+1]);
        else if(e.key==='ArrowLeft'&&idx>0)switchTab(_tabList[idx-1]);
      }
    });
    setInterval(async()=>{try{await fetchMempool();if(S.currentTab==='mempool')renderTab('mempool');}catch{}},30000);
    setInterval(async()=>{try{await Promise.all([fetchMarket(),fetchMining()]);if(S.currentTab==='market')renderTab('market');}catch{}},120000);
    setInterval(async()=>{try{await fetchNews();if(S.currentTab==='news')renderTab('news');}catch{}},300000);
    setInterval(async()=>{try{await fetchBlockInfo();}catch{}},120000);
    // Snapshot diario de predicciones
    try{scheduleDailySnapshot();}catch(e){console.warn('scheduleDailySnapshot:',e);}
  }catch(e){
    console.error('INIT FATAL:',e);
    try{
      const el=document.getElementById('content');
      if(el)el.innerHTML='<div style="padding:40px;text-align:center"><div style="font-size:40px">⚠️</div><br><b style="color:#f97316">Error al iniciar SatsFlow</b><br><small style="color:#999;font-size:11px">'+e.message+'</small><br><br><button onclick="location.reload()" style="margin-top:16px;padding:12px 24px;background:#f97316;color:white;border:none;border-radius:10px;font-size:14px;cursor:pointer">🔄 Reintentar</button></div>';
    }catch{}
  }
}

/* ══════ WAKE-UP DETECTION (Android-safe) ══════ */
// El problema en Android: al reabrir la PWA tras una noche, el proceso JS
// arranca en estado "zombie" — sin datos, sin precio. La app queda en blanco.
// Solución: detectar el zombie DESPUÉS de que init() haya tenido tiempo de cargar.
// NO recargar durante el uso normal — solo cuando algo realmente falla.

const _TS_KEY = 'sf-last-active';
const _saveTS = () => { try { localStorage.setItem(_TS_KEY, Date.now().toString()); } catch {} };
const _getTS  = () => { try { return parseInt(localStorage.getItem(_TS_KEY)||'0')||0; } catch { return 0; } };

// Guardar timestamp al usar la app (no muy frecuente para no gastar batería)
_saveTS();
setInterval(_saveTS, 60000); // cada minuto, no cada 10 segundos
document.addEventListener('touchstart', _saveTS, {passive:true});

// ── Detector de zombie al arrancar ──
// Android mata el proceso por la noche → al reabrir el JS arranca sin datos.
// Comprobamos a los 5s, 12s y 20s — si el precio sigue a 0 → recargar.
function _checkZombie(attempt) {
  if (S.price && S.price.usd > 0) {
    sessionStorage.removeItem('sf-reloads');
    return; // OK
  }
  const delays = [5000, 12000, 20000];
  if (attempt < delays.length) {
    setTimeout(() => _checkZombie(attempt + 1), delays[attempt]);
    return;
  }
  // Tras 3 intentos (20s total) precio sigue a 0
  const reloadCount = parseInt(sessionStorage.getItem('sf-reloads')||'0');
  console.log('[SatsFlow] Zombie tras 20s, recarga #' + reloadCount);
  if (reloadCount < 3) {
    sessionStorage.setItem('sf-reloads', reloadCount + 1);
    _saveTS();
    window.location.reload();
  } else {
    sessionStorage.removeItem('sf-reloads');
    // Mostrar error en la pestaña activa en lugar de bucle infinito
    const tabEl = document.getElementById('tab-' + (S.currentTab||'home'));
    const errHTML = '<div style="padding:40px;text-align:center"><div style="font-size:40px">📡</div><br><b style="color:#f97316">Sin conexión</b><br><small style="color:#999;font-size:12px">Comprueba tu conexión a internet</small><br><br><button onclick="location.reload()" style="margin-top:16px;padding:12px 24px;background:#f97316;color:white;border:none;border-radius:10px;font-size:14px;cursor:pointer">🔄 Reintentar</button></div>';
    if (tabEl) tabEl.innerHTML = errHTML;
  }
}
setTimeout(() => _checkZombie(0), 5000);

// ── Visibilitychange: solo refrescar datos, nunca recargar la página ──
// Android mata el proceso por la noche → el zombie detector lo maneja al reabrir
// Aquí solo actualizamos el precio cuando el usuario vuelve a la app durante el día
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { _saveTS(); return; }
  // App visible de nuevo → SIEMPRE refrescar, independientemente del estado del precio.
  // En Android el proceso puede haber sido matado y S.price quedará a 0 aunque
  // hayan pasado menos de 6h — sin este fetch la pantalla quedaría en blanco.
  fetchPrice().then(() => renderCurrentTab()).catch(() => {
    try { renderCurrentTab(); } catch {} // renderizar con datos locales si falla la red
  });
  // Comprobar aviso matutino al volver al primer plano
  setTimeout(()=>{try{_checkMorningNow();}catch{}},2000);
  // Comprobar snapshot diario al volver al primer plano
  setTimeout(()=>{
    if(typeof scheduleDailySnapshot==='function'){
      const now=new Date();
      if(now.getHours()>=9&&S.price?.usd>0){
        const dateKey=now.toISOString().slice(0,10);
        openDB().then(db=>{
          const tx=db.transaction('predictions','readonly');
          const q=tx.objectStore('predictions').get(dateKey);
          q.onsuccess=()=>{if(!q.result)saveSnapshotIfNeeded(false);};
        }).catch(()=>{});
      }
    }
  }, 5000);
  // Si lleva más de 6 horas inactiva y el precio sigue a 0 tras el reintento → recargar
  const inactiveH = (_getTS() > 0) ? (Date.now() - _getTS()) / 3600000 : 0;
  if (inactiveH > 6) {
    setTimeout(()=>{
      if(!S.price||S.price.usd===0){
        console.log('[SatsFlow] >6h inactiva + precio=0 tras reintento — recargando');
        _saveTS();
        window.location.reload();
      }
    }, 8000); // dar 8s a fetchPrice para recuperar el precio antes de recargar
  }
});

init();
</script>
