const t=()=>T[S.lang]||T.es;

function setLang(lang,silent){
  S.lang=lang;
  localStorage.setItem('sf-lang',lang);
  document.documentElement.lang=lang;
  const tabKeys=['home','analysis','market','mempool','atm','news','alerts','corr','global','forecast'];
  const tabIcons={home:'рҹҸ ',analysis:'рҹ§ ',market:'рҹ“Ҡ',mempool:'вӣ“пёҸ',atm:'рҹҸ§',news:'рҹ“°',alerts:'рҹ””',corr:'рҹ“Ҳ',global:'рҹҢҚ',forecast:'рҹ”®'};
  tabKeys.forEach(tab=>{
    const btn=document.querySelector('[data-tab="'+tab+'"]');
    if(btn)btn.innerHTML='<span class="tab-icon">'+tabIcons[tab]+'</span>'+(t()[tab]||tab);
  });
  if(!silent)renderCurrentTab();
}

/* в•җв•җв•җв•җв•җв•җ RESUMEN / RESUM MATUTINO в•җв•җв•җв•җв•җв•җ */
function saveMorningAlert(hour,minute){
  S.morningAlert={hour,minute,enabled:true};
  localStorage.setItem('sf-morning',JSON.stringify(S.morningAlert));
  scheduleMorningCheck();
}
function disableMorningAlert(){
  S.morningAlert=null;
  localStorage.setItem('sf-morning','null');
  if(window._morningInterval)clearInterval(window._morningInterval);
}
function scheduleMorningCheck(){
  if(window._morningInterval)clearInterval(window._morningInterval);
  window._morningInterval=setInterval(async()=>{
    if(!S.morningAlert?.enabled)return;
    if(S.notifPerm!=='granted')return;
    const now=new Date();
    if(now.getHours()===S.morningAlert.hour&&now.getMinutes()===S.morningAlert.minute){
      await sendMorningBriefing();
    }
  },60000);
}
async function sendMorningBriefing(){
  try{await fetchPrice();}catch{}
  try{await fetchMarket();}catch{}
  const tr=t();
  const price=S.price.usd||0;
  const change=S.change24h||0;
  const fg=S.marketData?.fearGreed?.value||50;
  const dom=parseFloat(S.marketData?.dominance?.btc)||0;
  const ta=typeof analyze==='function'?analyze():null;
  const sigKey=ta?.signal==='COMPRAR'?'buy':ta?.signal==='VENDER'?'sell':'neutral';
  const sig=tr[sigKey]||tr.neutral;
  const title=S.lang==='ca'?'вҳҖпёҸ Resum matinal BTC':'вҳҖпёҸ Resumen matutino BTC';
  const body=tr.morningMsg(Math.round(price),change,fg,sig);
  const detail=tr.morningDetail(dom,change);
  showNotif(title,body+'\n'+detail);
}
function saveMorningFromUI(){
  const h=parseInt(document.getElementById('morning-h')?.value??8);
  const m=parseInt(document.getElementById('morning-m')?.value??0);
  saveMorningAlert(Math.min(23,Math.max(0,h||0)),Math.min(59,Math.max(0,m||0)));
  renderTab('alerts');
}

function renderSettings(){
  const tr=t();
  const ma=S.morningAlert;
  const hh=ma?.hour??8;
  const mm=ma?.minute??0;
  const enabled=!!ma?.enabled;
  const notifOk=(S.notifPerm||'default')==='granted';
  return '<div class="card" style="margin-bottom:10px">'
    +'<div style="font-size:15px;font-weight:700;margin-bottom:16px">вҡҷпёҸ '+tr.settings+'</div>'

    +'<div style="margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border)">'

function buildSnapshot(){
  // Genera un snapshot de la predicciГіn actual
  if(!S.price.usd||S.price.usd===0)return null;
  try{
    const{horizons,netScore,taTotal,onChainTotal,macroTotal,regime,wTA,wOC,wMacro}=calcForecast(S.price.usd);
    const week=horizons.find(h=>h.label==='1 semana');
    const month=horizons.find(h=>h.label==='1 mes');
    if(!week)return null;
    const now=new Date();
    const dateKey=now.toISOString().slice(0,10); // YYYY-MM-DD
    return{
      date:dateKey,
      ts:now.getTime(),
      price:Math.round(S.price.usd),
      priceEur:Math.round(S.price.eur||0),
      netScore:parseFloat(netScore.toFixed(4)),
      taTotal:parseFloat(taTotal.toFixed(4)),
      onChainTotal:parseFloat(onChainTotal.toFixed(4)),
      macroTotal:parseFloat(macroTotal.toFixed(4)),
      regime,
      wTA:parseFloat(wTA.toFixed(2)),wOC:parseFloat(wOC.toFixed(2)),wMacro:parseFloat(wMacro.toFixed(2)),
      week:{
        bear:Math.round(week.bear),
        base:Math.round(week.base),
        bull:Math.round(week.bull),
        mostLikely:week.mostLikely,
        signal:week.signal
      },
      month:month?{
        bear:Math.round(month.bear),
        base:Math.round(month.base),
        bull:Math.round(month.bull),
        mostLikely:month.mostLikely,
        signal:month.signal
      }:null,
      fg:S.marketData?.fearGreed?.value||null,
      dom:parseFloat(S.marketData?.dominance?.btc||0)||null,
      manual:false
    };
  }catch(e){console.warn('buildSnapshot:',e);return null;}
}

async function saveSnapshotIfNeeded(manual=false){
  const snap=buildSnapshot();
  if(!snap){console.warn('[snapshot] buildSnapshot devolviГі null вҖ” precio:',S.price?.usd);return;}
  if(manual){
    snap.manual=true;
    snap.date=snap.date+'_m'+Date.now(); // evitar sobreescribir el auto del mismo dГӯa
    await savePrediction(snap);
    if(S.currentTab==='forecast')renderTab('forecast');
    showNotif('рҹ“ё SatsFlow','PredicciГіn guardada: BTC $'+snap.price.toLocaleString());
    return;
  }
  // Auto: solo guardar si no existe ya una entrada de hoy
  try{
    const db=await openDB();
    const tx=db.transaction('predictions','readonly');
    const existing=await new Promise(res=>{const q=tx.objectStore('predictions').get(snap.date);q.onsuccess=()=>res(q.result);q.onerror=()=>res(null);});
    if(!existing){
      await savePrediction(snap);
      console.log('[SatsFlow] Snapshot diario guardado:',snap.date,'BTC $'+snap.price.toLocaleString());
      if(S.currentTab==='forecast')renderTab('forecast');
    }
  }catch(e){console.warn('autoSnapshot:',e);}
}

// Scheduler diario a las 9:00
function scheduleDailySnapshot(){
  // Las PWA en Android NO ejecutan cГіdigo en background вҖ” el setTimeout de las 9:00
  // solo funciona si la app estГЎ abierta en ese momento.
  // Estrategia robusta: comprobar al arrancar y al volver al primer plano
  // si falta el snapshot de hoy y ya son las 9:00 o mГЎs вҶ’ guardar.

  async function checkAndSave(){
    const now=new Date();
    if(now.getHours()<9)return; // antes de las 9 no guardar
    const dateKey=now.toISOString().slice(0,10);
    try{
      const db=await openDB();
      const tx=db.transaction('predictions','readonly');
      const existing=await new Promise(res=>{
        const q=tx.objectStore('predictions').get(dateKey);
        q.onsuccess=()=>res(q.result);q.onerror=()=>res(null);
      });
      if(!existing){
        // No hay snapshot de hoy todavГӯa вҶ’ intentar guardar
        // Esperar a que los datos estГ©n listos (precio > 0)
        if(S.price?.usd>0){
          await saveSnapshotIfNeeded(false);
        }
      }
    }catch(e){console.warn('checkAndSave:',e);}
  }

  // Al arrancar: esperar 15s para que fetchPrice y fetchOnChain terminen
  setTimeout(checkAndSave, 15000);

  // TambiГ©n comprobar cada hora mientras la app estГЎ abierta
  // Esto captura el caso de que la app estГ© abierta exactamente a las 9:00
  setInterval(checkAndSave, 3600000);
}

function outcomeIcon(snap,realPrice){
  if(!realPrice||!snap.week)return '';
  const{bear,bull,base,mostLikely}=snap.week;
  if(realPrice>=bear&&realPrice<=bull){
    // Dentro del rango total
    const scenario=realPrice<(bear+base)/2?'рҹ“ү Bajista':realPrice<(base+bull)/2?'рҹ“Ҡ Base':'рҹ“Ҳ Alcista';
    return'<span style="color:#10b981;font-weight:700">вң… Dentro del rango</span> <span style="font-size:10px;color:var(--text3)">('+scenario+')</span>';
  }else if(realPrice<bear){
    const pct=((bear-realPrice)/bear*100).toFixed(1);
    return'<span style="color:#ef4444;font-weight:700">вқҢ Por debajo</span> <span style="font-size:10px;color:var(--text3)">('+pct+'% bajo el bear)</span>';
  }else{
    const pct=((realPrice-bull)/bull*100).toFixed(1);
    return'<span style="color:#f97316;font-weight:700">рҹҡҖ Por encima</span> <span style="font-size:10px;color:var(--text3)">('+pct+'% sobre el bull)</span>';
  }
}

function playAlertSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const notes=[523,659,784]; // Do-Mi-Sol
    notes.forEach((freq,i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type='sine';
      osc.frequency.setValueAtTime(freq,ctx.currentTime+i*0.18);
      gain.gain.setValueAtTime(0,ctx.currentTime+i*0.18);
      gain.gain.linearRampToValueAtTime(0.4,ctx.currentTime+i*0.18+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.18+0.18);
      osc.start(ctx.currentTime+i*0.18);
      osc.stop(ctx.currentTime+i*0.18+0.18);
    });

async function tryFetchRSS(url){

  ];

      if(!r.ok)continue;

function parseRSS(xml,source){
  const items=xml.match(/<item[\s\S]*?<\/item>/g)||[];
  const results=[];
  items.forEach(item=>{
    const title=(item.match(/<title><!\[CDATA\[([\s\S]*?)\]\]><\/title>/)||item.match(/<title>([^<]*)<\/title>/))?.[1]||'';
    const link=(item.match(/<link>([^<]*)<\/link>/)||item.match(/<guid[^>]*>(https?[^<]+)<\/guid>/))?.[1]||'';
    const pubDate=item.match(/<pubDate>([^<]*)<\/pubDate>/)?.[1]||'';
    const clean=title.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#\d+;/g,'').replace(/<[^>]+>/g,'').trim();
    if(clean&&link)results.push({id:link,title:clean,url:link,source,date:pubDate?new Date(pubDate):new Date()});
  });
  return results;
}

function calcEMA(p,k){const m=2/(k+1),e=[];p.forEach((v,i)=>{e.push(i===0?v:v*m+e[i-1]*(1-m));});return e;}
function calcRSI(p,k=14){const r=new Array(k).fill(null);let g=0,l=0;for(let i=1;i<=k;i++){const d=p[i]-p[i-1];d>0?g+=d:l+=Math.abs(d);}let ag=g/k,al=l/k;for(let i=k;i<p.length;i++){const d=p[i]-p[i-1];ag=(ag*(k-1)+(d>0?d:0))/k;al=(al*(k-1)+(d<0?Math.abs(d):0))/k;r.push(100-(100/(1+(al===0?100:ag/al))));}return r;}
function analyze(){
  // Usar historial de 60 velas diarias si estГЎ disponible вҖ” siempre suficiente para TA
  const src=S.historyTA&&S.historyTA.length>=30?S.historyTA:S.history;
  const prices=src.map(h=>h.price);
  if(prices.length<14)return null;
  const last=prices[prices.length-1];
  const rsiArr=calcRSI(prices),lastRSI=rsiArr[rsiArr.length-1];
  const e12=calcEMA(prices,12),e26=calcEMA(prices,26);
  const macd=e12.map((v,i)=>v-e26[i]);
  const sig=calcEMA(macd.slice(26),9);
  const padSig=[...new Array(26).fill(null),...new Array(macd.length-26-sig.length).fill(null),...sig];
  const lMACD=macd[macd.length-1],lSig=padSig[padSig.length-1];
  const sma7=prices.slice(-7).reduce((a,b)=>a+b,0)/7;
  const sma30=prices.slice(-30).reduce((a,b)=>a+b,0)/30;
  const sl20=prices.slice(-20),m20=sl20.reduce((a,b)=>a+b,0)/20;
  const std=Math.sqrt(sl20.reduce((a,b)=>a+(b-m20)**2,0)/sl20.length);
  const bbU=m20+2*std,bbL=m20-2*std;
  const recent=prices.slice(-30);
  const support=Math.min(...recent)*0.98,resistance=Math.max(...recent)*1.02;
  let bull=0,bear=0;
  if(lastRSI<30)bull+=3;else if(lastRSI<45)bull+=1;else if(lastRSI>70)bear+=3;else if(lastRSI>55)bear+=1;
  if(sma7>sma30)bull+=2;else bear+=2;
  if(lMACD>lSig)bull+=2;else bear+=2;
  if(last<bbL)bull+=2;else if(last>bbU)bear+=2;
  const total=bull+bear,bullPct=total>0?Math.round((bull/total)*100):50;
  const signal=bullPct>=65?'COMPRAR':bullPct<=35?'VENDER':'NEUTRAL';
  return{lastRSI,sma7,sma30,lMACD,lSig,bbU,bbL,support,resistance,bullPct,bearPct:100-bullPct,signal,last,rsiData:rsiArr.slice(-40).filter(v=>v!=null),macdData:macd.slice(-40),sigData:padSig.slice(-40)};
}
function miniLine(data,color,h=65,refs=[]){
  const v=data.filter(x=>x!=null);if(!v.length)return'';
  const min=Math.min(...v),max=Math.max(...v),range=max-min||1;
  const W=300,H=h,P=4;
  const pts=data.map((x,i)=>{if(x==null)return null;return`${P+(i/(data.length-1))*(W-P*2)},${P+(1-(x-min)/range)*(H-P*2)}`;}).filter(Boolean).join(' ');

  return`<svg viewBox="0 0 ${W} ${H}" class="mini-chart" preserveAspectRatio="none">${rls}<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/></svg>`;
}
function areaSVG(data){

  const pts=data.map((d,i)=>`${P+(i/(data.length-1))*(W-P*2)},${P+(1-(d.price-min)/range)*(H-P*2)}`);

}
function candleSVG(data){
  if(!data.length)return'';
  const ps=data.flatMap(d=>[d.high,d.low]),min=Math.min(...ps),max=Math.max(...ps),range=max-min||1;
  const W=300,H=120,P=4,cW=Math.max(2,Math.floor((W-P*2)/data.length)-2);

}

function calcConv(f,raw){
  const v=parseFloat(raw),ok=!isNaN(v)&&v>=0,pU=S.price.usd,pE=S.price.eur;
  if(!ok){['btc','sats','usd','eur'].filter(x=>x!==f).forEach(x=>{const e=document.getElementById('inp-'+x);if(e)e.value='';});return;}
  let btc=S.conv_btc||1,sats=S.conv_sats||1e8,usd=S.conv_usd||0,eur=S.conv_eur||0;
  if(f==='btc'){btc=v;sats=(v*1e8).toFixed(0);usd=(v*pU).toFixed(2);eur=(v*pE).toFixed(2);}
  else if(f==='sats'){const b=v/1e8;btc=b.toFixed(8).replace(/\.?0+$/,'');sats=v;usd=(b*pU).toFixed(2);eur=(b*pE).toFixed(2);}
  else if(f==='usd'&&pU){const b=v/pU;btc=b.toFixed(8);sats=(b*1e8).toFixed(0);usd=v;eur=(b*pE).toFixed(2);}
  else if(f==='eur'&&pE){const b=v/pE;btc=b.toFixed(8);sats=(b*1e8).toFixed(0);usd=(b*pU).toFixed(2);eur=v;}
  S.conv_btc=btc;S.conv_sats=sats;S.conv_usd=usd;S.conv_eur=eur;
  ['btc','sats','usd','eur'].filter(x=>x!==f).forEach(x=>setI(x,S['conv_'+x]));
}

function calcRainbow(price){
  const genesis=new Date('2009-01-03').getTime();
  const days=(Date.now()-genesis)/(1000*60*60*24);
  const log10Days=Math.log10(days); // IMPORTANTE: log10, no logaritmo natural
  const a=5.84,b=-17.01;
  const center=Math.pow(10,a*log10Days+b);
  const step=0.38;
  const bands=[
    {label:'Zona de venta mГЎxima',color:'#ef4444',mult:Math.pow(10,step*4)},
    {label:'Muy caro вҖ” vende',color:'#f97316',mult:Math.pow(10,step*3)},
    {label:'FOMO intenso',color:'#fb923c',mult:Math.pow(10,step*2)},
    {label:'Caro',color:'#eab308',mult:Math.pow(10,step*1)},
    {label:'Precio justo',color:'#84cc16',mult:1},
    {label:'TodavГӯa barato',color:'#22c55e',mult:Math.pow(10,-step*1)},
    {label:'Acumula',color:'#10b981',mult:Math.pow(10,-step*2)},
    {label:'Oferta histГіrica',color:'#06b6d4',mult:Math.pow(10,-step*3)},
    {label:'Compra mГЎximo',color:'#3b82f6',mult:Math.pow(10,-step*4)},
  ];
  const priceBands=bands.map(b=>({...b,price:center*b.mult}));
  let currentBand=priceBands[priceBands.length-1];
  for(let i=0;i<priceBands.length-1;i++){
    if(price>=priceBands[i].price){currentBand=priceBands[i];break;}
  }
  return{bands:priceBands,currentBand,center};
}
function analyzeSentiment(title){
  const t=title.toLowerCase();
  const bull=['sube','subida','mГЎximo','record','supera','alcanza','adopciГіn','aprueba','compra','acumula','bull','rally','verde','crece','positivo','boom','logro','avance','dispara','eleva','histГіrico','etf','institucional'];
  const bear=['baja','caГӯda','cae','mГӯnimo','pierde','pГ©rdida','bear','rojo','colapso','crash','crisis','prohibe','vende','hackeo','robo','fraude','multa','investigaciГіn','prohibiciГіn','negativo','desplome','hunde','riesgo','problema'];
  let score=0;
  bull.forEach(w=>{if(t.includes(w))score++;});
  bear.forEach(w=>{if(t.includes(w))score--;});
  if(score>0)return{label:'Alcista',color:'#10b981',icon:'рҹ“Ҳ',score};
  if(score<0)return{label:'Bajista',color:'#ef4444',icon:'рҹ“ү',score};
  return{label:'Neutral',color:'#94a3b8',icon:'вһ–',score};
}

async function loadATM(){
  const st=document.getElementById('atm-status');
  if(!st)return;
  st.innerHTML=`<div style="font-size:13px;color:var(--text3)"><span class="spin">рҹ“Қ</span> Obteniendo tu ubicaciГіn...</div>`;
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:15000,enableHighAccuracy:false}));
    const{latitude:lat,longitude:lng}=pos.coords;
    st.innerHTML=`<div style="font-size:13px;color:var(--text3)"><span class="spin">рҹ”Қ</span> Buscando cajeros Bitcoin...</div>`;

    // Destruir mapa anterior si existe
    if(S.leafletMap){S.leafletMap.remove();S.leafletMap=null;}

    // Mostrar contenedor ANTES de crear el mapa
    const mapWrapper=document.getElementById('map-wrapper');
    const mapDiv=document.getElementById('map-container');
    if(!mapDiv||!mapWrapper)return;
    mapWrapper.style.display='block';
    mapDiv.style.width='100%';
    mapDiv.style.height='100%';
    mapDiv.innerHTML=''; // limpiar cualquier mapa zombie

    // Esperar dos frames para que el DOM pinte el contenedor con sus dimensiones reales
    await new Promise(r=>setTimeout(r,50));
    await new Promise(r=>requestAnimationFrame(r));
    await new Promise(r=>requestAnimationFrame(r));

    // Crear mapa fresco
    S.leafletMap=L.map(mapDiv,{
      zoomControl:true,
      attributionControl:true,
      preferCanvas:true  // mГЎs rendimiento en mГіvil
    }).setView([lat,lng],13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'В© <a href="https://openstreetmap.org">OpenStreetMap</a>',
      maxZoom:19,
      keepBuffer:4
    }).addTo(S.leafletMap);

    // Forzar que el mapa sepa su tamaГұo real
    S.leafletMap.invalidateSize({animate:false});

    const uIcon=L.divIcon({html:`<div style="background:#f97316;width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.5)"></div>`,iconSize:[16,16],iconAnchor:[8,8],className:''});
    L.marker([lat,lng],{icon:uIcon}).addTo(S.leafletMap).bindPopup('<b>рҹ“Қ Tu ubicaciГіn</b>').openPopup();
    let atms=[];
    try{
      const delta=0.5;
      const url='https://api.btcmap.org/v2/elements?lat='+(lat-delta).toFixed(4)+'&lon='+(lng-delta).toFixed(4)+'&lat2='+(lat+delta).toFixed(4)+'&lon2='+(lng+delta).toFixed(4);
      const r=await fetch(url,{signal:AbortSignal.timeout(12000)});
      if(r.ok){
        const j=await r.json();
        const items=Array.isArray(j)?j:(j?.elements||j?.data||[]);
        console.log('BTCMap raw count:',items.length);
        atms=items.filter(e=>{
          const tags=e.osm_json?.tags||e.tags||{};
          return tags['payment:bitcoin']==='yes'||tags['payment:lightning']==='yes'||
                 tags['currency:XBT']==='yes'||tags['bitcoin']==='yes'||
                 tags['payment:onchain']==='yes'||tags['payment:lightning_contactless']==='yes';
        }).slice(0,100).map(e=>{
          const tags=e.osm_json?.tags||e.tags||{};
          const osm=e.osm_json||e;
          const elat=osm.lat??osm.center?.lat??null;
          const elng=osm.lon??osm.center?.lon??null;
          const amenity=tags.amenity||'';
          let type=amenity==='atm'?'рҹҸ§ ATM':amenity==='bank'?'рҹҸҰ Banco':'рҹҸӘ Comercio';
          return{lat:elat,lng:elng,name:tags.name||tags.operator||'Punto Bitcoin',op:tags.operator||tags.brand||'',type,lightning:tags['payment:lightning']==='yes'};
        }).filter(e=>e.lat!=null&&e.lng!=null);
        console.log('BTCMap filtered:',atms.length);
      }
    }catch(err){console.warn('BTCMap:',err);}
    if(atms.length===0){
      try{
        const q='[out:json][timeout:15];(node["payment:bitcoin"="yes"]('+( lat-0.5).toFixed(4)+','+(lng-0.5).toFixed(4)+','+(lat+0.5).toFixed(4)+','+(lng+0.5).toFixed(4)+');node["currency:XBT"="yes"]('+( lat-0.5).toFixed(4)+','+(lng-0.5).toFixed(4)+','+(lat+0.5).toFixed(4)+','+(lng+0.5).toFixed(4)+'););out body;';
        const r2=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:q,signal:AbortSignal.timeout(15000)});
        if(r2.ok){
          const j2=await r2.json();
          atms=(j2.elements||[]).map(e=>({lat:e.lat,lng:e.lon,name:e.tags?.name||e.tags?.operator||'Punto Bitcoin',op:e.tags?.operator||'',type:e.tags?.amenity==='atm'?'рҹҸ§ ATM':'рҹҸӘ Comercio',lightning:e.tags?.['payment:lightning']==='yes'})).filter(e=>e.lat&&e.lng);
          console.log('Overpass results:',atms.length);
        }
      }catch(err2){console.warn('Overpass:',err2);}
    }
    atms.forEach(a=>{
      const bg=a.type.includes('ATM')?'#f97316':a.type.includes('Banco')?'#3b82f6':'#10b981';
      const shape=a.type.includes('ATM')?'3px':'50%';
      const aIcon=L.divIcon({html:'<div style="background:'+bg+';width:14px;height:14px;border-radius:'+shape+';border:2px solid white;box-shadow:0 2px 5px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;color:white;font-size:8px;font-weight:700">вӮҝ</div>',iconSize:[14,14],iconAnchor:[7,7],className:''});
      if(S.leafletMap)L.marker([a.lat,a.lng],{icon:aIcon})
        .addTo(S.leafletMap)
        .bindPopup('<b>'+a.name+'</b><br><small>'+a.type+(a.op?' В· '+a.op:'')+'</small>'+(a.lightning?'<br><small style="color:#f97316">вҡЎ Lightning</small>':''));
    });
    // Forzar re-render del mapa despuГ©s de aГұadir todos los marcadores
    setTimeout(()=>{
      if(S.leafletMap){
        S.leafletMap.invalidateSize({animate:false});
        // Ajustar vista para mostrar todos los marcadores si los hay
        if(atms.length>0){
          try{
            const group=L.featureGroup(
              atms.slice(0,50).map(a=>L.marker([a.lat,a.lng]))
            );
            const bounds=group.getBounds().pad(0.1);
            S.leafletMap.fitBounds(bounds,{maxZoom:14});
          }catch{}
        }
      }
    },400);
    const cnt=document.getElementById('atm-count');
    if(cnt){cnt.textContent=atms.length>0?`вң… ${atms.length} cajeros/comercios encontrados`:'в„№пёҸ No se encontraron cajeros Bitcoin en esta zona';cnt.style.display='block';}
    const tip=document.getElementById('atm-tip');if(tip)tip.style.display='block';
    st.style.display='none';
    S.atmLoaded=true;
    const card=st.closest('.card');
    if(card&&!card.querySelector('.btn-ghost')){
      const btn=document.createElement('button');
      btn.className='btn-ghost';btn.style.cssText='width:100%;margin-top:8px';
      btn.textContent='рҹ”„ Actualizar';btn.onclick=reloadATM;
      card.appendChild(btn);
    }
  }catch(e){
    const msg=e.code===1?'Permiso de ubicaciГіn denegado. Ve a los ajustes del navegador y activa la ubicaciГіn para esta pГЎgina.':e.name==='TimeoutError'?'Tiempo de espera agotado. Comprueba tu conexiГіn.':'No se pudo cargar el mapa. IntГ©ntalo de nuevo.';
    if(st)st.innerHTML=`<div style="color:#ef4444;font-size:13px;margin-bottom:14px;line-height:1.5">${msg}</div><button class="btn-orange" onclick="loadATM()">рҹ”„ Reintentar</button>`;
  }
}

async function activateNotifs(){const r=await requestNotifPerm();if(r==='granted')showNotif('вң… SatsFlow','Notificaciones activadas.');renderTab('alerts');}
function addAlert(){const t=document.getElementById('alert-target'),c=document.getElementById('alert-curr');if(!t||!c)return;const val=parseFloat(t.value);if(isNaN(val)||val<=0)return;const curr=c.value,price=curr==='usd'?S.price.usd:S.price.eur;S.alerts.push({id:Date.now().toString(),targetPrice:val,currency:curr,condition:val>price?'above':'below',triggered:false});saveAlerts();navigator.serviceWorker?.ready.then(reg=>reg.active?.postMessage({type:'CHECK_ALERTS',alerts:S.alerts}));renderTab('alerts');}
function removeAlert(id){S.alerts=S.alerts.filter(a=>a.id!==id);saveAlerts();renderTab('alerts');}

async function fetchCorr(){
  S.corrError=null;
  try{
    const days=parseInt(S.corrPeriod)||30;
    const limit=days<=30?35:days<=90?95:370;
    const btcR=await fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=${limit}`);
    const btcJ=await btcR.json();
    const btcPrices=btcJ.map(k=>parseFloat(k[4]));
    const range=days<=30?'1mo':days<=90?'3mo':'1y';
    const proxy='https://corsproxy.io/?';
    const spyUrl=`https://query1.finance.yahoo.com/v8/finance/chart/SPY?interval=1d&range=${range}`;
    const gldUrl=`https://query1.finance.yahoo.com/v8/finance/chart/GLD?interval=1d&range=${range}`;
    const mstrUrl=`https://query1.finance.yahoo.com/v8/finance/chart/MSTR?interval=1d&range=${range}`;
    const[spyR,goldR,mstrR]=await Promise.all([
      fetch(proxy+encodeURIComponent(spyUrl),{signal:AbortSignal.timeout(12000)}),
      fetch(proxy+encodeURIComponent(gldUrl),{signal:AbortSignal.timeout(12000)}),
      fetch(proxy+encodeURIComponent(mstrUrl),{signal:AbortSignal.timeout(12000)})
    ]);
    const spyJ=await spyR.json();
    const goldJ=await goldR.json();
    const mstrJ=await mstrR.json();
    const spyPrices=(spyJ.chart?.result?.[0]?.indicators?.quote?.[0]?.close||[]).filter(v=>v!=null);
    const goldPrices=(goldJ.chart?.result?.[0]?.indicators?.quote?.[0]?.close||[]).filter(v=>v!=null);
    const mstrPrices=(mstrJ.chart?.result?.[0]?.indicators?.quote?.[0]?.close||[]).filter(v=>v!=null);
    if(!spyPrices.length||!goldPrices.length) throw new Error('Sin datos de mercado');
    const normalize=arr=>{const base=arr[0]||1;return arr.map(v=>(v/base)*100);};
    const minLen=Math.min(btcPrices.length,spyPrices.length,goldPrices.length,mstrPrices.length||999);
    if(minLen<5){S.corrData=null;S.corrError='Datos insuficientes';return;}
    const btcN=normalize(btcPrices.slice(-minLen));
    const spyN=normalize(spyPrices.slice(-minLen));
    const goldN=normalize(goldPrices.slice(-minLen));
    const mstrN=mstrPrices.length>=5?normalize(mstrPrices.slice(-minLen)):null;
    const pearson=(a,b)=>{
      if(!a||!b||a.length<2||b.length<2)return 0;
      const n=Math.min(a.length,b.length);
      const an=a.slice(-n),bn=b.slice(-n);
      const ma=an.reduce((s,v)=>s+v,0)/n,mb=bn.reduce((s,v)=>s+v,0)/n;
      const num=an.reduce((s,v,i)=>s+(v-ma)*(bn[i]-mb),0);
      const da=Math.sqrt(an.reduce((s,v)=>s+(v-ma)**2,0));
      const db=Math.sqrt(bn.reduce((s,v)=>s+(v-mb)**2,0));
      return(da&&db)?num/(da*db):0;
    };
    const w=Math.min(14,minLen);
    const rollCorr=(a,b)=>{
      if(!a||!b)return[];
      return a.map((_,i)=>i<w-1?null:pearson(a.slice(i-w+1,i+1),b.slice(i-w+1,i+1)));
    };
    S.corrData={
      btc:btcN,spy:spyN,gold:goldN,mstr:mstrN,
      corrBtcSpy:pearson(btcN,spyN),
      corrBtcGold:pearson(btcN,goldN),
      corrBtcMstr:mstrN?pearson(btcN,mstrN):null,
      corrSpyGold:pearson(spyN,goldN),
      rollBtcSpy:rollCorr(btcN,spyN),
      rollBtcGold:rollCorr(btcN,goldN),
      rollBtcMstr:mstrN?rollCorr(btcN,mstrN):null,
      len:minLen,
      mstrLastPrice:mstrPrices.length?mstrPrices[mstrPrices.length-1]:null,
      mstrChange:mstrPrices.length>=2?((mstrPrices[mstrPrices.length-1]-mstrPrices[0])/mstrPrices[0]*100):null
    };
  }catch(e){
    console.error('fetchCorr',e);
    S.corrData=null;
    await fetchCorrFallback();
  }
}

async function loadWorldMap(){
  const wrap=document.getElementById('world-map-wrap');
  if(!wrap)return;
  const svgDiv=document.getElementById('world-map-svg');
  if(!svgDiv)return;
  try{
    const res=await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json',{signal:AbortSignal.timeout(8000)});
    if(!res.ok)throw new Error('No se pudo cargar');
    const topo=await res.json();
    if(!window.topojson){
      await new Promise((resolve,reject)=>{
        const s=document.createElement('script');
        s.src='https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js';
        s.onload=resolve; s.onerror=reject;
        document.head.appendChild(s);
      });
    }
    const countries=topojson.feature(topo,topo.objects.countries);
    const W=500,H=250;
    const project=([lng,lat])=>[((lng+180)/360)*W, ((90-lat)/180)*H];
    const pathStr=geo=>{
      if(!geo||!geo.coordinates)return'';
      const parts=geo.type==='Polygon'?[geo.coordinates]:geo.coordinates;
      return parts.map(rings=>rings.map((ring,ri)=>{
        const pts=ring.map(project);
        return pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')+'Z';
      }).join(' ')).join(' ');
    };
    const paths=countries.features.map(f=>'<path d="'+pathStr(f.geometry)+'" fill="#1e3a5f" stroke="#2d5a8e" stroke-width="0.4"/>').join('');
    const svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block" id="world-svg">'
      +'<rect width="'+W+'" height="'+H+'" fill="#0d1b2a"/>'
      +'<line x1="0" y1="125" x2="500" y2="125" stroke="#1a3a5c" stroke-width="0.5" stroke-dasharray="3 3"/>'
      +paths
      +'</svg>';
    svgDiv.innerHTML=svg;
    renderMapDots(W,H);
  }catch(e){
    console.warn('World map CDN failed, using static fallback',e);
    svgDiv.innerHTML=getStaticWorldSVG();
    renderMapDots(500,250);
  }
}

function calcForecast(currentPrice){

    if(rsi<25){rsiScore=0.18;rsiDesc='RSI '+rsi.toFixed(0)+' вҖ” Sobrevendido extremo. Zona histГіrica de rebote.';}
    else if(rsi<35){rsiScore=0.12;rsiDesc='RSI '+rsi.toFixed(0)+' вҖ” Sobrevendido. SeГұal de compra tГ©cnica.';}
    else if(rsi<45){rsiScore=0.06;rsiDesc='RSI '+rsi.toFixed(0)+' вҖ” Por debajo de 50. Tendencia dГ©bil pero sin seГұal extrema.';}
    else if(rsi<55){rsiScore=0.02;rsiDesc='RSI '+rsi.toFixed(0)+' вҖ” Zona neutral.';}
    else if(rsi<65){rsiScore=-0.02;rsiDesc='RSI '+rsi.toFixed(0)+' вҖ” Por encima de 50. Tendencia positiva controlada.';}
    else if(rsi<75){rsiScore=-0.08;rsiDesc='RSI '+rsi.toFixed(0)+' вҖ” Sobrecomprado. Posible correcciГіn tГ©cnica.';}
    else{rsiScore=-0.15;rsiDesc='RSI '+rsi.toFixed(0)+' вҖ” Sobrecomprado extremo. Alto riesgo de correcciГіn.';}
  }
  let macdScore=0, macdDesc='';
  if(ta){
    const diff=ta.lMACD-ta.lSig;
    const diffPct=currentPrice>0?Math.abs(diff/currentPrice)*100:0;
    if(diff>0&&diffPct>0.5){macdScore=0.10;macdDesc='MACD alcista con separaciГіn fuerte (+'+diffPct.toFixed(2)+'%). Momentum positivo confirmado.';}
    else if(diff>0){macdScore=0.05;macdDesc='MACD alcista pero dГ©bil. Momentum positivo incipiente.';}
    else if(diff<0&&diffPct>0.5){macdScore=-0.10;macdDesc='MACD bajista con separaciГіn fuerte (-'+diffPct.toFixed(2)+'%). Momentum negativo.';}
    else{macdScore=-0.04;macdDesc='MACD bajista leve. Tendencia negativa dГ©bil.';}
  }
  let bbScore=0, bbDesc='';
  if(ta){
    const pos=(currentPrice-ta.bbL)/(ta.bbU-ta.bbL);
    if(pos<0.1){bbScore=0.15;bbDesc='Precio en banda inferior de Bollinger. Zona de soporte extremo, histГіricamente alcista.';}
    else if(pos<0.3){bbScore=0.08;bbDesc='Precio en zona baja de Bollinger. Soporte tГ©cnico cercano.';}
    else if(pos<0.7){bbScore=0.02;bbDesc='Precio en zona central de Bollinger. Equilibrio tГ©cnico.';}
    else if(pos<0.9){bbScore=-0.05;bbDesc='Precio en zona alta de Bollinger. Resistencia tГ©cnica cercana.';}
    else{bbScore=-0.12;bbDesc='Precio en banda superior de Bollinger. Zona de sobreextensiГіn.';}
  }
  let smaScore=0, smaDesc='';
  if(ta){
    const smaDiff=((ta.sma7-ta.sma30)/ta.sma30)*100;
    if(smaDiff>5){smaScore=0.08;smaDesc='SMA7 un '+smaDiff.toFixed(1)+'% sobre SMA30. Tendencia alcista fuerte (Golden Cross confirmado).';}
    else if(smaDiff>1){smaScore=0.05;smaDesc='SMA7 sobre SMA30 (+'+smaDiff.toFixed(1)+'%). Tendencia alcista moderada.';}
    else if(smaDiff>-1){smaScore=0.01;smaDesc='SMA7 y SMA30 prГЎcticamente iguales. Mercado lateral.';}
    else if(smaDiff>-5){smaScore=-0.05;smaDesc='SMA7 bajo SMA30 ('+smaDiff.toFixed(1)+'%). Tendencia bajista moderada.';}
    else{smaScore=-0.09;smaDesc='SMA7 muy por debajo de SMA30 ('+smaDiff.toFixed(1)+'%). Death Cross вҖ” seГұal bajista fuerte.';}
  }
  let taCompositeScore=0, taCompositeDesc='';
  if(ta){

    if(signal==='extreme_undervalued'){mvrvScore=0.15;mvrvDesc='MVRV-Z Score '+z.toFixed(2)+' вҖ” Precio muy por debajo de la media histГіrica. Zona histГіricamente de compra mГЎxima (similar a suelos de 2018 y 2022).';}
    else if(signal==='undervalued'){mvrvScore=0.09;mvrvDesc='MVRV-Z Score '+z.toFixed(2)+' вҖ” Infravalorado respecto al historial. Buena zona de acumulaciГіn con riesgo asimГ©trico favorable.';}
    else if(signal==='fair_value'){mvrvScore=0.03;mvrvDesc='MVRV-Z Score '+z.toFixed(2)+' вҖ” Precio en zona de valor justo. Ni sobrecomprado ni sobrevendido. Neutral.';}
    else if(signal==='overvalued'){mvrvScore=-0.06;mvrvDesc='MVRV-Z Score '+z.toFixed(2)+' вҖ” Por encima de la media histГіrica. Mercado caliente, reducir exposiciГіn gradualmente.';}
    else{mvrvScore=-0.13;mvrvDesc='MVRV-Z Score '+z.toFixed(2)+' вҖ” Zona de euforia extrema. HistГіricamente los ciclos terminan aquГӯ. Alto riesgo de correcciГіn fuerte.';}
  }else{mvrvScore=0.02;mvrvDesc='MVRV-Z: calculando con historial de precio disponible...';}

  // в”Җв”Җ Stablecoin Supply Ratio (SSR)
  let ssrScore=0, ssrDesc='';
  if(OC.stablecoinRatio){
    const{ssr,stableMcapB,signal}=OC.stablecoinRatio;
    if(signal==='high_buying_power'){ssrScore=0.10;ssrDesc='SSR '+ssr.toFixed(1)+' вҖ” $'+stableMcapB.toFixed(0)+'B en stablecoins vs BTC market cap. Ratio bajo = mucho capital listo para entrar en BTC. SeГұal alcista estructural.';}
    else if(signal==='moderate_buying_power'){ssrScore=0.05;ssrDesc='SSR '+ssr.toFixed(1)+' вҖ” Buena cantidad de stablecoins disponibles. Poder de compra moderado. SeГұal positiva.';}
    else if(signal==='neutral'){ssrScore=0.01;ssrDesc='SSR '+ssr.toFixed(1)+' вҖ” Equilibrio entre stablecoins y market cap BTC. Sin seГұal clara de acumulaciГіn masiva.';}
    else{ssrScore=-0.04;ssrDesc='SSR '+ssr.toFixed(1)+' вҖ” Pocas stablecoins relativo al market cap. Menos pГіlvora seca para nuevas compras. PresiГіn limitada al alza.';}
  }else{ssrScore=0.02;ssrDesc='SSR: cargando datos de stablecoins (USDT, USDC, DAI)...';}

  // в”Җв”Җ Puell Multiple proxy
  let puellScore=0, puellDesc='';
  if(OC.puellMultiple){
    const{signal,hashChange,priceChange30,differential}=OC.puellMultiple;
    if(signal==='miner_capitulation'){puellScore=0.14;puellDesc='Puell proxy: capitulaciГіn minera (hashrate '+hashChange.toFixed(1)+'%). Los mineros venden a pГ©rdidas. HistГіricamente uno de los mejores momentos de compra de todo el ciclo.';}
    else if(signal==='miner_stress'){puellScore=0.07;puellDesc='Puell proxy: estrГ©s minero (hashrate '+hashChange.toFixed(1)+'%). PresiГіn vendedora de mineros. Suele preceder suelos.';}
    else if(signal==='miner_accumulation'){puellScore=0.08;puellDesc='Puell proxy: mineros acumulando (hashrate +'+hashChange.toFixed(1)+'% vs precio '+priceChange30.toFixed(1)+'%). Invierten en mГЎs mГЎquinas вҶ’ confГӯan en precio futuro.';}
    else if(signal==='miner_confidence'){puellScore=0.05;puellDesc='Puell proxy: mineros en zona cГіmoda (hashrate +'+hashChange.toFixed(1)+'%). Sin presiГіn de venta forzada. SeГұal positiva.';}
    else{puellScore=0.02;puellDesc='Puell proxy: rentabilidad minera neutral. Sin seГұal extrema en ninguna direcciГіn.';}
  }else{puellScore=0.02;puellDesc='Puell Multiple: calculando con datos de hashrate...';}

  // в”Җв”Җ Long/Short Ratio
  let lsScore=0, lsDesc='';
  if(OC.longShortRatio){
    const{ratio,longPct,shortPct,signal}=OC.longShortRatio;
    if(signal==='extreme_long'){lsScore=-0.10;lsDesc='L/S Ratio '+ratio.toFixed(2)+' ('+longPct.toFixed(1)+'% largos). Demasiados optimistas apalancados. Mercado susceptible a short squeeze y liquidaciones en cascada. SeГұal contraria bajista.';}
    else if(signal==='long_biased'){lsScore=-0.04;lsDesc='L/S Ratio '+ratio.toFixed(2)+' вҖ” MayorГӯa larga. Sesgo alcista en futuros. Cierta precauciГіn ante posibles liquidaciones.';}
    else if(signal==='neutral'){lsScore=0.03;lsDesc='L/S Ratio '+ratio.toFixed(2)+' ('+longPct.toFixed(1)+'% largos / '+shortPct.toFixed(1)+'% cortos). Equilibrio saludable. Sin exceso de apalancamiento en ninguna direcciГіn.';}
    else if(signal==='short_biased'){lsScore=0.06;lsDesc='L/S Ratio '+ratio.toFixed(2)+' вҖ” MayorГӯa corta. Mercado pesimista apalancado. SeГұal contraria alcista: posible short squeeze.';}
    else{lsScore=0.11;lsDesc='L/S Ratio '+ratio.toFixed(2)+' ('+shortPct.toFixed(1)+'% cortos). Pesimismo extremo en futuros. HistГіricamente precede rallies fuertes por cierre masivo de cortos.';}
  }else{lsScore=0.01;lsDesc='Long/Short Ratio: cargando desde Binance Futures...';}

  // в”Җв”Җ DXY (dГіlar fuerte = BTC baja, correlaciГіn inversa)
  let dxyScore=0,dxyDesc='';
  if(OC.dxy){
    const{value,change20d,trend}=OC.dxy;
    if(trend==='strong_usd'){dxyScore=-0.10;dxyDesc='DXY '+value.toFixed(1)+' вҖ” DГіlar muy fuerte ('+change20d.toFixed(1)+'% en 20 dГӯas). HistГіricamente presiГіn bajista sobre BTC y activos de riesgo.';}
    else if(trend==='mild_usd'){dxyScore=-0.05;dxyDesc='DXY '+value.toFixed(1)+' вҖ” DГіlar fortaleciГ©ndose levemente. Viento en contra moderado para BTC.';}
    else if(trend==='flat'){dxyScore=0.02;dxyDesc='DXY '+value.toFixed(1)+' вҖ” DГіlar estable. Sin presiГіn cambiaria sobre BTC.';}
    else if(trend==='mild_weak'){dxyScore=0.06;dxyDesc='DXY '+value.toFixed(1)+' вҖ” DГіlar debilitГЎndose. Favorable para activos alternativos como BTC.';}
    else{dxyScore=0.11;dxyDesc='DXY '+value.toFixed(1)+' вҖ” DГіlar muy dГ©bil ('+change20d.toFixed(1)+'% en 20 dГӯas). HistГіricamente impulso alcista fuerte para BTC.';}
  }else{dxyScore=0;dxyDesc='DXY: cargando datos del Гӯndice del dГіlar...';}

  // в”Җв”Җ Lightning Network (adopciГіn real de Bitcoin como medio de pago)
  let lightningScore=0,lightningDesc='';
  if(OC.lightning){
    const{capacityBTC,nodeCount,channelCount}=OC.lightning;
    if(capacityBTC>6000){lightningScore=0.06;lightningDesc='Lightning: '+capacityBTC.toFixed(0)+' BTC de capacidad, '+nodeCount.toLocaleString()+' nodos. Red madura con adopciГіn sГіlida.';}
    else if(capacityBTC>4000){lightningScore=0.04;lightningDesc='Lightning: '+capacityBTC.toFixed(0)+' BTC, '+nodeCount.toLocaleString()+' nodos. Crecimiento sostenido de la red de pagos.';}
    else if(capacityBTC>2000){lightningScore=0.02;lightningDesc='Lightning: '+capacityBTC.toFixed(0)+' BTC. Red en crecimiento moderado.';}
    else{lightningScore=0.01;lightningDesc='Lightning: '+capacityBTC.toFixed(0)+' BTC. Red aГәn en fase inicial de adopciГіn.';}
  }else{lightningScore=0.02;lightningDesc='Lightning Network: cargando datos de mempool.space...';}

  // в”Җв”Җ Rainbow Chart position
  let rainbowScore=0,rainbowDesc='';
  if(OC.rainbow){
    const{ratio,band,bandDesc,fairValue}=OC.rainbow;
    rainbowDesc='Rainbow Chart вҖ” Fair value histГіrico: $'+fairValue.toLocaleString()+' ('+ratio.toFixed(2)+'x). '+bandDesc;
    if(band<=2){rainbowScore=0.15;}
    else if(band===3){rainbowScore=0.09;}
    else if(band===4){rainbowScore=0.04;}
    else if(band===5){rainbowScore=-0.02;}
    else if(band===6){rainbowScore=-0.08;}
    else if(band===7){rainbowScore=-0.13;}
    else{rainbowScore=-0.18;}
  }else{rainbowScore=0;rainbowDesc='Rainbow Chart: calculando posiciГіn histГіrica...';}

  // в”Җв”Җ Whale Activity
  let whaleScore=0,whaleDesc='';
  if(OC.whales){
    const{signal,volumeChange,desc}=OC.whales;
    whaleDesc='Ballenas: '+desc+' (volumen on-chain '+volumeChange.toFixed(1)+'% vs semana anterior).';
    if(signal==='accumulation'){whaleScore=0.12;}
    else if(signal==='high_activity'){whaleScore=-0.06;}
    else if(signal==='low_activity'){whaleScore=0.03;}
    else{whaleScore=0.01;}
  }else{whaleScore=0.02;whaleDesc='Whale activity: cargando datos on-chain de grandes wallets...';}

  // в”Җв”Җ ETF Flows
  let etfScore=0,etfDesc='';
  if(OC.etfFlows){
    const{trend,totalFlow7d,estimated}=OC.etfFlows;
    const flowStr=totalFlow7d!=null?'$'+Math.abs(totalFlow7d).toFixed(0)+'M':'estimado';
    const est=estimated?' (estimado por dominancia)':'';
    if(trend==='strong_inflow'){etfScore=0.13;etfDesc='ETF Bitcoin: entrada fuerte de capital institucional ('+flowStr+' 7 dГӯas'+est+'). BlackRock/Fidelity comprando activamente.';}
    else if(trend==='inflow'){etfScore=0.07;etfDesc='ETF Bitcoin: flujo positivo ('+flowStr+' 7 dГӯas'+est+'). Demanda institucional sostenida.';}
    else if(trend==='neutral'){etfScore=0.02;etfDesc='ETF Bitcoin: flujos equilibrados'+est+'. Sin seГұal direccional clara.';}
    else if(trend==='outflow'){etfScore=-0.07;etfDesc='ETF Bitcoin: salidas de capital ('+flowStr+' 7 dГӯas'+est+'). ReducciГіn de exposiciГіn institucional.';}
    else{etfScore=-0.12;etfDesc='ETF Bitcoin: salidas fuertes ('+flowStr+' 7 dГӯas'+est+'). Venta institucional relevante.';}
  }else{etfScore=0.03;etfDesc='ETF Flows: cargando datos de flujos institucionales...';}

  // в”Җв”Җ Google Trends / InterГ©s Retail proxy
  let trendsScore=0,trendsDesc='';
  if(OC.googleTrends){
    const{retailInterest,signal,desc}=OC.googleTrends;
    trendsDesc='InterГ©s retail: '+retailInterest+'/100 вҖ” '+desc;
    if(signal==='fomo_extreme'){trendsScore=-0.12;}       // FOMO = techo
    else if(signal==='fomo_high'){trendsScore=-0.06;}
    else if(signal==='moderate'){trendsScore=0.03;}
    else if(signal==='low_interest'){trendsScore=0.07;}
    else{trendsScore=0.12;}  // nadie habla de BTC = fondo
  }else{trendsScore=0.02;trendsDesc='InterГ©s retail: calculando proxy...';}

  // в”Җв”Җ MEJORA 2: DescorelaciГіn de factores tГ©cnicos
  // RSI, Stoch RSI y taComposite estГЎn altamente correlacionados (miden momentum)
  // MACD y OBV tambiГ©n solapan en tendencia
  // Aplicar factor de descuento para evitar doble conteo
  const momentumRaw = rsiScore + stochRsiScore + taCompositeScore; // 3 factores de momentum
  const trendRaw    = macdScore + obvScore + adxScore;             // 3 factores de tendencia
  const priceRaw    = bbScore + smaScore;                          // 2 factores de precio
  // Promedio ponderado en lugar de suma directa вҖ” evita que 3 seГұales iguales pesen x3
  const momentumAdj = momentumRaw / 3 * 1.5; // normalizado pero con peso x1.5 vs uno solo
  const trendAdj    = trendRaw / 3 * 1.2;
  const priceAdj    = priceRaw / 2 * 0.8;
  const taTotal     = momentumAdj + trendAdj + priceAdj;

  const onChainTotal=hashrateScore+addressScore+volumeScore+oiScore+frScore+netflowScore+soprScore+mvrvScore+ssrScore+puellScore+lsScore+whaleScore+lightningScore;
  const macroTotal=halvingScore+institutionalScore+macroScore+fgScore+domScore+regulationScore+riskScore+corrScore+m2Score+dxyScore+etfScore+trendsScore+rainbowScore;

  // в”Җв”Җ MEJORA 1: Detectar rГ©gimen de mercado y ajustar pesos dinГЎmicamente
  // RГ©gimen basado en: precio vs SMA, dominancia, Fear&Greed, hashrate
  const sma30val=ta?.sma30||0;
  const sma7val=ta?.sma7||0;
  const aboveSMA30=sma30val>0&&currentPrice>sma30val;
  const aboveSMA7=sma7val>0&&currentPrice>sma7val;
  const strongTrend=Math.abs(adxScore)>0.08;

  let regime, regimeDesc, wTA, wOC, wMacro;
  if(aboveSMA30&&aboveSMA7&&fg>55&&dom>52){
    regime='bull';
    regimeDesc='Bull market confirmado (precio>SMA30/7, F&G '+fg+', dom '+dom.toFixed(1)+'%)';
    wTA=0.40; wOC=0.25; wMacro=0.35; // tГ©cnico mГЎs relevante en tendencia alcista
  } else if(!aboveSMA30&&fg<40&&dom<50){
    regime='bear';
    regimeDesc='Bear market / correcciГіn (precio<SMA30, F&G '+fg+', dom '+dom.toFixed(1)+'%)';
    wTA=0.25; wOC=0.35; wMacro=0.40; // macro y on-chain dominan en bajadas
  } else if(strongTrend&&aboveSMA30){
    regime='trend_up';
    regimeDesc='Tendencia alcista fuerte (ADX elevado, sobre SMA30)';
    wTA=0.45; wOC=0.25; wMacro=0.30;
  } else if(strongTrend&&!aboveSMA30){
    regime='trend_down';
    regimeDesc='Tendencia bajista fuerte (ADX elevado, bajo SMA30)';
    wTA=0.30; wOC=0.35; wMacro=0.35;
  } else {
    regime='lateral';
    regimeDesc='Mercado lateral/indeciso (F&G '+fg+', dom '+dom.toFixed(1)+'%)';
    wTA=0.30; wOC=0.35; wMacro=0.35; // on-chain mГЎs fiable en laterales
  }

  const netScore = taTotal*wTA + onChainTotal*wOC + macroTotal*wMacro;

  // в”Җв”Җ MEJORA 3: AsimetrГӯa Bear/Bull segГәn rГ©gimen histГіrico de BTC
  // BTC en bull sube mГЎs de lo que cae; en bear cae mГЎs de lo que sube
  const asymBull = regime==='bull'?1.35:regime==='bear'?0.70:regime==='trend_up'?1.20:regime==='trend_down'?0.80:1.0;
  const asymBear = regime==='bull'?0.75:regime==='bear'?1.40:regime==='trend_up'?0.80:regime==='trend_down'?1.25:1.0;
  // Volatilidad ajustada por rГ©gimen
  const volAdj = regime==='bull'?1.15:regime==='bear'?1.30:regime==='lateral'?0.85:1.0;
  const volWeek=0.06*volAdj, volMonth=0.18*volAdj, vol6M=0.45*volAdj, volYear=0.75*volAdj;
  const horizons=[
    {
      label:'1 semana', days:7, icon:'рҹ“…',
      localScore: taTotal*0.70 + (fgScore+domScore)*0.30,
      vol: volWeek,
      note:'Basado principalmente en RSI, MACD y Bollinger. Horizonte muy sensible a noticias.'
    },
    {
      label:'1 mes', days:30, icon:'рҹ“Ҷ',
      localScore: taTotal*0.40 + onChainTotal*0.35 + macroTotal*0.25,
      vol: volMonth,
      note:'Equilibrio entre tГ©cnico, on-chain y macro. Ciclo halving y ETFs empiezan a pesar.'
    },
    {
      label:'6 meses', days:180, icon:'рҹ—“пёҸ',
      localScore: taTotal*0.10 + onChainTotal*0.40 + macroTotal*0.50,
      vol: vol6M,
      note:'El ciclo post-halving, adopciГіn institucional y on-chain dominan sobre el TA.'
    },
    {
      label:'1 aГұo', days:365, icon:'рҹ“Ҡ',
      localScore: taTotal*0.05 + onChainTotal*0.35 + macroTotal*0.60,
      vol: volYear,
      note:'Factores estructurales y ciclo de 4 aГұos son los determinantes principales.'
    }
  ];
  const factors=[
    {group:'рҹ“җ TГ©cnico',name:'RSI',score:rsiScore,desc:rsiDesc},
    {group:'рҹ“җ TГ©cnico',name:'Stochastic RSI',score:stochRsiScore,desc:stochRsiDesc},
    {group:'рҹ“җ TГ©cnico',name:'MACD',score:macdScore,desc:macdDesc},
    {group:'рҹ“җ TГ©cnico',name:'OBV (Volumen)',score:obvScore,desc:obvDesc},
    {group:'рҹ“җ TГ©cnico',name:'ADX (Tendencia)',score:adxScore,desc:adxDesc},
    {group:'рҹ“җ TГ©cnico',name:'Bollinger Bands',score:bbScore,desc:bbDesc},
    {group:'рҹ“җ TГ©cnico',name:'Medias mГіviles SMA',score:smaScore,desc:smaDesc},
    {group:'рҹ“җ TГ©cnico',name:'SeГұal compuesta',score:taCompositeScore,desc:taCompositeDesc},
    {group:'вӣ“пёҸ On-chain & Futuros',name:'Hashrate mineros',score:hashrateScore,desc:hashrateDesc},
    {group:'вӣ“пёҸ On-chain & Futuros',name:'Direcciones activas',score:addressScore,desc:addressDesc},
    {group:'вӣ“пёҸ On-chain & Futuros',name:'Volumen on-chain',score:volumeScore,desc:volumeDesc},
    {group:'вӣ“пёҸ On-chain & Futuros',name:'Exchange Netflow',score:netflowScore,desc:netflowDesc},
    {group:'вӣ“пёҸ On-chain & Futuros',name:'Open Interest',score:oiScore,desc:oiDesc},
    {group:'вӣ“пёҸ On-chain & Futuros',name:'Funding Rate',score:frScore,desc:frDesc},
    {group:'вӣ“пёҸ On-chain & Futuros',name:'SOPR',score:soprScore,desc:soprDesc},
    {group:'вӣ“пёҸ On-chain & Futuros',name:'MVRV-Z Score',score:mvrvScore,desc:mvrvDesc},
    {group:'вӣ“пёҸ On-chain & Futuros',name:'Stablecoin Supply Ratio',score:ssrScore,desc:ssrDesc},
    {group:'вӣ“пёҸ On-chain & Futuros',name:'Puell Multiple',score:puellScore,desc:puellDesc},
    {group:'вӣ“пёҸ On-chain & Futuros',name:'Long/Short Ratio',score:lsScore,desc:lsDesc},
    {group:'рҹҢҗ Macro/Ciclo',name:'Ciclo Halving',score:halvingScore,desc:halvingDesc},
    {group:'рҹҢҗ Macro/Ciclo',name:'Institucional',score:institutionalScore,desc:institutionalDesc},
    {group:'рҹҢҗ Macro/Ciclo',name:'Macro global',score:macroScore,desc:macroDesc},
    {group:'рҹҢҗ Macro/Ciclo',name:'Fear & Greed',score:fgScore,desc:fgDesc},
    {group:'рҹҢҗ Macro/Ciclo',name:'Dominancia BTC',score:domScore,desc:domDesc},
    {group:'рҹҢҗ Macro/Ciclo',name:'RegulaciГіn',score:regulationScore,desc:regulationDesc},
    {group:'рҹҢҗ Macro/Ciclo',name:'CorrelaciГіn S&P/Oro',score:corrScore,desc:corrDesc},
    {group:'рҹҢҗ Macro/Ciclo',name:'Riesgos sistГ©micos',score:riskScore,desc:riskDesc},
    {group:'рҹҢҗ Macro/Ciclo',name:'M2 / Liquidez global',score:m2Score,desc:m2Desc},
    {group:'рҹҢҗ Macro/Ciclo',name:'DXY (ГҚndice del dГіlar)',score:dxyScore,desc:dxyDesc},
    {group:'рҹҢҗ Macro/Ciclo',name:'ETF Flows institucionales',score:etfScore,desc:etfDesc},
    {group:'рҹҢҗ Macro/Ciclo',name:'InterГ©s retail / FOMO',score:trendsScore,desc:trendsDesc},
    {group:'рҹҢҗ Macro/Ciclo',name:'Rainbow Chart (valoraciГіn)',score:rainbowScore,desc:rainbowDesc},
    {group:'вӣ“пёҸ On-chain & Futuros',name:'Whale Activity (ballenas)',score:whaleScore,desc:whaleDesc},
    {group:'вӣ“пёҸ On-chain & Futuros',name:'Lightning Network',score:lightningScore,desc:lightningDesc},
  ];
  // Calcular precios bear/base/bull para cada horizonte (misma lГіgica que renderForecast)
  horizons.forEach(h=>{
    const bias=h.localScore;
    const bullMult=1+h.vol*(1+bias*2);
    const baseMult=1+h.vol*0.3*bias;
    const bearMult=1-h.vol*(1-bias*1.5);
    const bullMultA=1+h.vol*asymBull*(1+bias*2);
    const bearMultA=1-h.vol*asymBear*(1-bias*1.5);
    const baseMultA=1+h.vol*0.3*bias;
    h.bull=Math.round(currentPrice*Math.max(bullMultA,1.01));
    h.base=Math.round(currentPrice*Math.max(Math.min(baseMultA,bullMultA*0.9),bearMultA*1.1));
    h.bear=Math.round(currentPrice*Math.min(bearMultA,0.99));
    h.mostLikely=bias>0.05?'bull':bias<-0.05?'bear':'base';
    h.signal=bias>0.1?'COMPRAR':bias<-0.1?'VENDER':'NEUTRAL';
  });
  return{horizons,factors,netScore,taTotal,onChainTotal,macroTotal,ta,regime,regimeDesc,wTA,wOC,wMacro,asymBull,asymBear};
}
function renderForecast(){
  try{
  const price=S.price.usd;
  if(!price)return'<div class="card" style="text-align:center;padding:40px;color:var(--text3)"><span class="spin">вҸі</span><br><br>Esperando precio...</div>';
  if(S.history.length<10)return'<div class="card" style="text-align:center;padding:40px;color:var(--text3)"><span class="spin">рҹ“Ҡ</span><br><br>Cargando datos...<br><small style="color:var(--text3);font-size:11px">Esperando historial de precio</small></div>';
  const{horizons,factors,netScore,taTotal,onChainTotal,macroTotal,ta,regime,regimeDesc,wTA,wOC,wMacro,asymBull,asymBear}=calcForecast(price);
  if(!OC.loaded)fetchOnChain();
  const fmt=p=>'$'+(p>=1e6?(p/1e6).toFixed(2)+'M':p>=1000?(p/1000).toFixed(0)+'K':p.toFixed(0));
  const fmtPct=p=>(p>=0?'+':'')+p.toFixed(1)+'%';
  const horizonCards=horizons.map(h=>{
    const bias=h.localScore;
    const bullMult=1+h.vol*asymBull*(1+bias*2);
    const baseMult=1+h.vol*0.3*bias;
    const bearMult=1-h.vol*asymBear*(1-bias*1.5);
    const bullP=Math.round(price*Math.max(bullMult,1.01));
    const baseP=Math.round(price*Math.max(Math.min(baseMult,bullMult*0.9),bearMult*1.1));
    const bearP=Math.round(price*Math.min(bearMult,0.99));
    const bullPct=(bullMult-1)*100;
    const basePct=(baseMult-1)*100;
    const bearPct=(bearMult-1)*100;
    const biasColor=bias>0.05?'#10b981':bias<-0.05?'#ef4444':'#eab308';
    const biasLabel=bias>0.1?'Alcista':bias>0.02?'Lev. alcista':bias<-0.1?'Bajista':bias<-0.02?'Lev. bajista':'Neutral';

/* в•җв•җв•җв•җв•җв•җ WAKE-UP DETECTION (Android-safe) в•җв•җв•җв•җв•җв•җ */
// El problema en Android: al reabrir la PWA tras una noche, el proceso JS
// arranca en estado "zombie" вҖ” sin datos, sin precio. La app queda en blanco.
// SoluciГіn: detectar el zombie DESPUГүS de que init() haya tenido tiempo de cargar.
// NO recargar durante el uso normal вҖ” solo cuando algo realmente falla.

const _TS_KEY = 'sf-last-active';
const _saveTS = () => { try { localStorage.setItem(_TS_KEY, Date.now().toString()); } catch {} };
const _getTS  = () => { try { return parseInt(localStorage.getItem(_TS_KEY)||'0')||0; } catch { return 0; } };

// Guardar timestamp al usar la app (no muy frecuente para no gastar baterГӯa)
_saveTS();
setInterval(_saveTS, 60000); // cada minuto, no cada 10 segundos
document.addEventListener('touchstart', _saveTS, {passive:true});

// в”Җв”Җ Detector de zombie al arrancar в”Җв”Җ
// Android mata el proceso por la noche вҶ’ al reabrir el JS arranca sin datos.
// Comprobamos a los 5s, 12s y 20s вҖ” si el precio sigue a 0 вҶ’ recargar.
function _checkZombie(attempt) {
  if (S.price && S.price.usd > 0) {
    sessionStorage.removeItem('sf-reloads');
    return; // OK
  }
  const delays = [5000, 12000, 20000];
  if (attempt < delays.length) {
    setTimeout(() => _checkZombie(attempt + 1), delays[attempt]);
    return;
  }
  // Tras 3 intentos (20s total) precio sigue a 0
  const reloadCount = parseInt(sessionStorage.getItem('sf-reloads')||'0');
  console.log('[SatsFlow] Zombie tras 20s, recarga #' + reloadCount);
  if (reloadCount < 3) {
    sessionStorage.setItem('sf-reloads', reloadCount + 1);
    _saveTS();
    window.location.reload();
  } else {
    sessionStorage.removeItem('sf-reloads');
    // Mostrar error en la pestaГұa activa en lugar de bucle infinito
    const tabEl = document.getElementById('tab-' + (S.currentTab||'home'));
    const errHTML = '<div style="padding:40px;text-align:center"><div style="font-size:40px">рҹ“Ў</div><br><b style="color:#f97316">Sin conexiГіn</b><br><small style="color:#999;font-size:12px">Comprueba tu conexiГіn a internet</small><br><br><button onclick="location.reload()" style="margin-top:16px;padding:12px 24px;background:#f97316;color:white;border:none;border-radius:10px;font-size:14px;cursor:pointer">рҹ”„ Reintentar</button></div>';
    if (tabEl) tabEl.innerHTML = errHTML;
  }
}
setTimeout(() => _checkZombie(0), 5000);

// в”Җв”Җ Visibilitychange: solo refrescar datos, nunca recargar la pГЎgina в”Җв”Җ
// Android mata el proceso por la noche вҶ’ el zombie detector lo maneja al reabrir
// AquГӯ solo actualizamos el precio cuando el usuario vuelve a la app durante el dГӯa
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { _saveTS(); return; }
  // App visible de nuevo вҶ’ refrescar precio silenciosamente
  if (S.price?.usd > 0) {
    fetchPrice().then(() => renderCurrentTab()).catch(() => {});
    // Comprobar snapshot diario al volver al primer plano
    // Captura: usuario abre la app a las 9:05 tras tenerla minimizada
    setTimeout(()=>{
      if(typeof scheduleDailySnapshot==='function'){
        const now=new Date();
        if(now.getHours()>=9&&S.price?.usd>0){
          const dateKey=now.toISOString().slice(0,10);
          openDB().then(db=>{
            const tx=db.transaction('predictions','readonly');
            const q=tx.objectStore('predictions').get(dateKey);
            q.onsuccess=()=>{if(!q.result)saveSnapshotIfNeeded(false);};
          }).catch(()=>{});
        }
      }
    }, 5000); // 5s para que fetchPrice termine
  }
  // Si lleva mГЎs de 6 horas sin usar Y el precio es 0 вҶ’ recargar
  const inactiveH = (_getTS() > 0) ? (Date.now() - _getTS()) / 3600000 : 0;
  if (inactiveH > 6 && (!S.price || S.price.usd === 0)) {
    console.log('[SatsFlow] >6h inactiva + precio=0 вҖ” recargando');
    _saveTS();
    window.location.reload();
  }
});

init();
</script>
