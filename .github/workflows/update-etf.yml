name: Update ETF Flows

on:
  schedule:
    # Every day at 20:00 UTC (farside usually has the day's data by then)
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-etf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape ETF data
        run: python scripts/scrape_etf.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/etf-flows.json
          git diff --cached --quiet || (
            git commit -m "chore: update ETF flows $(date -u +%Y-%m-%d) [skip ci]" &&
            git push
          )
