<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </radialGradient>
  </defs>
  <!-- Círculo de fondo -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- Sombra sutil -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#c2410c" stroke-width="1" opacity="0.3"/>
  <!-- Símbolo Bitcoin ₿ -->
  <!-- Palo vertical -->
  <rect x="38" y="20" width="8" height="60" fill="white" rx="1"/>
  <!-- Semicírculo superior -->
  <path d="M 46 28 Q 68 28 68 40 Q 68 52 46 52" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- Semicírculo inferior (más grande) -->
  <path d="M 46 48 Q 72 48 72 62 Q 72 76 46 76" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- Barras horizontales -->
  <rect x="38" y="27" width="20" height="7" fill="white" rx="1"/>
  <rect x="38" y="47" width="20" height="7" fill="white" rx="1"/>
  <rect x="38" y="67" width="20" height="7" fill="white" rx="1"/>
  <!-- Palitos del símbolo ₿ (diagonales arriba) -->
  <line x1="42" y1="14" x2="44" y2="21" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="52" y1="14" x2="54" y2="21" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Palitos del símbolo ₿ (diagonales abajo) -->
  <line x1="42" y1="79" x2="44" y2="86" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="52" y1="79" x2="54" y2="86" stroke="white" stroke-width="4" stroke-linecap="round"/>
</svg>